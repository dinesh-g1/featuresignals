# FeatureSignals — Lefthook Configuration
#
# Pre-commit hooks that run before every commit.
# Install:  lefthook install
# Run all:  lefthook run pre-commit
# Skip:     LEFTHOOK=0 git commit -m "..."
#
# All commands run in parallel where possible. Each command is scoped to
# the files it cares about (glob filter) so you don't pay for what you
# didn't change.
# ---------------------------------------------------------------------------

pre-commit:
  parallel: true
  commands:
    # ── Block secret files (.env, .pem, .key, credentials) ──────────────────
    block-secret-files:
      label: "[secrets] block .env / .pem / .key files"
      glob: "*"
      run: |
        STAGED=$(git diff --cached --name-only --diff-filter=ACM)
        BLOCKED=$(echo "$STAGED" | grep -E '\.env$|\.env\.[^e]|credentials|\.pem$|\.key$' | grep -vE '\.example$' || true)
        if [ -n "$BLOCKED" ]; then
          echo "ERROR: Potential secret file staged for commit:"
          echo "$BLOCKED" | sed 's/^/       /'
          echo "       Remove with: git reset HEAD <file>"
          exit 1
        fi

    # ── Inline secret patterns ──────────────────────────────────────────────
    inline-secrets:
      label: "[secrets] inline pattern scan"
      glob: "*"
      run: |
        STAGED=$(git diff --cached --name-only --diff-filter=ACM)
        PATTERN='(PRIVATE.KEY|BEGIN RSA|sk_live_|sk_test_|Zoho-enczapikey\s+[A-Za-z0-9+/=]{20,})'
        for f in $STAGED; do
          if [ -f "$f" ] && echo "$f" | grep -qvE '\.example$|\.toml$|gitleaks|_test\.(go|ts|tsx)$|mock|testdata|__tests__|node_modules|vendor'; then
            if git show ":$f" 2>/dev/null | grep -qEi "$PATTERN"; then
              echo "WARNING: Possible secret pattern in $f"
            fi
          fi
        done

    # ── Secrets Detection (gitleaks) ─────────────────────────────────────────
    gitleaks:
      label: "[secrets] gitleaks protect"
      glob: "*"
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --config .gitleaks.toml --verbose 2>&1 | sed 's/^/  /'
        else
          echo "  gitleaks not installed — skipping secret scan"
          echo "  Install: brew install gitleaks  (or see https://github.com/gitleaks/gitleaks)"
        fi

    # ── Go: Static Analysis ──────────────────────────────────────────────────
    go-vet:
      label: "[server] go vet"
      glob: "server/**/*.go"
      run: |
        echo "  go vet ./..."
        (cd server && go vet ./...)

    # ── TypeScript: Type Checking ────────────────────────────────────────────
    dashboard-tsc:
      label: "[dashboard] tsc --noEmit"
      glob: "dashboard/**/*.{ts,tsx}"
      run: |
        echo "  tsc --noEmit"
        (cd dashboard && npx tsc --noEmit)

    # ── Dashboard: ESLint ────────────────────────────────────────────────────
    dashboard-lint:
      label: "[dashboard] npm run lint"
      glob: "dashboard/**/*.{ts,tsx}"
      run: |
        echo "  npm run lint"
        (cd dashboard && npm run lint)

# ---------------------------------------------------------------------------
# Future hooks (add as needed):
#
#   commit-msg:     Validate conventional commit format
#   post-commit:    Notify CI, update changelog draft
#   pre-push:       Run full test suite before pushing
# ---------------------------------------------------------------------------
