# Local full-stack development overrides.
# Automatically applied by `docker compose up` (Docker Compose convention).
# Usage: make local-up  (or: docker compose up --build -d)
#
# Reads from .env.local when present. Copy deploy/local/.env.local.example to
# .env.local and adjust values as needed.
#
# Optional profiles:
#   --profile seed   : Pre-load demo data (org, project, flags, environments)
#   --profile caddy  : Caddy reverse proxy at http://localhost (API + dashboard)

services:
  postgres:
    env_file:
      - path: .env.local
        required: false
    ports:
      - "${DB_PORT:-5432}:5432"

  server:
    env_file:
      - path: .env.local
        required: false
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-cloud}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-none}
      ZEPTOMAIL_TOKEN: ${ZEPTOMAIL_TOKEN:-}
      ZEPTOMAIL_FROM_EMAIL: ${ZEPTOMAIL_FROM_EMAIL:-noreply@featuresignals.com}
      ZEPTOMAIL_FROM_NAME: ${ZEPTOMAIL_FROM_NAME:-FeatureSignals (Local)}
      ZEPTOMAIL_BASE_URL: ${ZEPTOMAIL_BASE_URL:-https://api.zeptomail.in}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3000}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-ingest.in2.signoz.cloud:443}
      OTEL_INGESTION_KEY: ${OTEL_INGESTION_KEY:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-featuresignals-api-local}
      OTEL_TRACES_ENABLED: ${OTEL_TRACES_ENABLED:-true}
      OTEL_METRICS_ENABLED: ${OTEL_METRICS_ENABLED:-true}
      OTEL_LOGS_ENABLED: ${OTEL_LOGS_ENABLED:-true}
      OTEL_LOG_LEVEL: ${OTEL_LOG_LEVEL:-debug}
      OTEL_TRACE_SAMPLE_RATE: ${OTEL_TRACE_SAMPLE_RATE:-1.0}

  dashboard:
    env_file:
      - path: .env.local
        required: false
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      WATCHPACK_POLLING: "true"

  seed:
    image: postgres:16-alpine
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./server/scripts/seed.sql:/seed.sql:ro
    entrypoint:
      [
        "sh",
        "-c",
        "PGPASSWORD=fsdev psql -h postgres -U fs -d featuresignals -f /seed.sql",
      ]
    profiles: ["seed"]

  caddy:
    image: caddy:2-alpine
    depends_on:
      server:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/Caddyfile.local:/etc/caddy/Caddyfile:ro
    profiles: ["caddy"]
