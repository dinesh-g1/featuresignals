name: "Auto-Label Pull Requests"

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: "Apply labels based on branch and files"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get changed files
        id: files
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null || echo "")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine labels
        id: labels
        run: |
          LABELS=""
          BRANCH="${{ github.head_ref }}"
          FILES="${{ steps.files.outputs.files }}"

          # Branch prefix -> type label
          case "$BRANCH" in
            story/*)  LABELS="type: story" ;;
            bug/*)    LABELS="type: bug" ;;
            hotfix/*) LABELS="type: bug,priority: critical" ;;
            task/*)   LABELS="type: task" ;;
            docs/*)   LABELS="type: docs" ;;
            chore/*)  LABELS="type: task" ;;
          esac

          # File paths -> area labels
          if echo "$FILES" | grep -q '^server/'; then
            LABELS="${LABELS:+$LABELS,}area: server"
          fi
          if echo "$FILES" | grep -q '^dashboard/'; then
            LABELS="${LABELS:+$LABELS,}area: dashboard"
          fi
          if echo "$FILES" | grep -qE '^(deploy/|\.github/workflows/)'; then
            LABELS="${LABELS:+$LABELS,}area: infra"
          fi
          if echo "$FILES" | grep -q '^sdks/'; then
            LABELS="${LABELS:+$LABELS,}area: sdks"
          fi
          if echo "$FILES" | grep -q '^website/'; then
            LABELS="${LABELS:+$LABELS,}area: website"
          fi
          if echo "$FILES" | grep -q '^docs/'; then
            LABELS="${LABELS:+$LABELS,}area: docs"
          fi

          echo "labels=$LABELS" >> $GITHUB_OUTPUT

      - name: Apply labels
        if: steps.labels.outputs.labels != ''
        run: |
          IFS=',' read -ra LABEL_LIST <<< "${{ steps.labels.outputs.labels }}"
          for label in "${LABEL_LIST[@]}"; do
            label=$(echo "$label" | xargs)
            gh pr edit ${{ github.event.pull_request.number }} --add-label "$label" 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
