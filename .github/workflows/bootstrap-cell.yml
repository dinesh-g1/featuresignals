# Bootstrap Cell — One-time Setup
#
# Installs Docker + Docker Compose on the cell VPS, uploads compose files,
# starts the application stack, and registers a temporary deploy key.
# Run this ONCE after provisioning a new cell.
#
# Usage:
#   gh workflow run bootstrap-cell.yml -f cell-ip=46.224.31.37
#
# Required secrets:
#   HETZNER_API_TOKEN — Hetzner Cloud API token
#   GHCR_TOKEN        — GitHub PAT with read:packages

name: Bootstrap Cell

on:
  workflow_dispatch:
    inputs:
      cell-ip:
        description: "Cell public IP address"
        required: true
        type: string
        default: "46.224.31.37"
      cell-server-id:
        description: "Hetzner server ID"
        required: true
        type: string
        default: "128090728"
      cell-name:
        description: "Cell name (for labels)"
        required: true
        type: string
        default: prod-eu-001

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reset root password via Hetzner API
        id: reset
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          echo "Resetting root password for server ${{ inputs.cell-server-id }}..."
          RESP=$(curl -sf -X POST \
            "https://api.hetzner.cloud/v1/servers/${{ inputs.cell-server-id }}/actions/reset_password" \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json")
          PASSWORD=$(echo "$RESP" | jq -r '.action.root_password // .root_password')
          if [ -z "$PASSWORD" ] || [ "$PASSWORD" = "null" ]; then
            echo "❌ Failed to extract password. Response:"
            echo "$RESP" | jq .
            exit 1
          fi
          # Mask the password in logs
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"
          echo "✅ Root password reset"

      - name: Install Docker + Docker Compose
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ inputs.cell-ip }}
          username: root
          password: ${{ steps.reset.outputs.password }}
          script: |
            set -e

            # Install Docker if not present
            if ! command -v docker &>/dev/null; then
              apt-get update -qq
              apt-get install -y -qq docker.io docker-compose-v2 curl
              systemctl enable docker
              systemctl start docker
              echo "✅ Docker installed"
            else
              echo "✅ Docker already installed"
            fi

            # Verify docker compose v2
            docker compose version

            # Create app directory
            mkdir -p /opt/featuresignals
            echo "✅ /opt/featuresignals ready"

      - name: Upload compose files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ inputs.cell-ip }}
          username: root
          password: ${{ steps.reset.outputs.password }}
          source: "deploy/docker-compose.cell.yml,deploy/Caddyfile"
          target: "/opt/featuresignals"
          strip_components: 1

      - name: Rename compose file
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ inputs.cell-ip }}
          username: root
          password: ${{ steps.reset.outputs.password }}
          script: |
            mv /opt/featuresignals/docker-compose.cell.yml /opt/featuresignals/docker-compose.yml
            echo "✅ Files placed"

      - name: Start the application stack
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ inputs.cell-ip }}
          username: root
          password: ${{ steps.reset.outputs.password }}
          envs: GHCR_TOKEN
        script: |
          set -e

          cd /opt/featuresignals

          # Log in to GHCR
          echo "$GHCR_TOKEN" | docker login ghcr.io -u dinesh-g1 --password-stdin
          echo "✅ Logged in to GHCR"

          # Pull latest images
          docker pull ghcr.io/dinesh-g1/featuresignals-server:latest
          docker pull ghcr.io/dinesh-g1/featuresignals-dashboard:latest
          echo "✅ Images pulled"

          # Start the stack
          FEATURESIGNALS_VERSION=latest docker compose up -d
          echo "✅ Stack started"

          # Wait for health
          echo "Waiting for health check..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              echo "✅ Cell is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Health check timed out"
          exit 1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: External smoke test
        run: |
          echo "Checking https://api.featuresignals.com/health..."
          for i in $(seq 1 15); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 "https://api.featuresignals.com/health")
            if [ "$HTTP" = "200" ]; then
              echo "✅ API healthy via LB (HTTP $HTTP)"
              exit 0
            fi
            echo "  Waiting for LB... ($i/15, HTTP $HTTP)"
            sleep 4
          done
          echo "⚠️  API not yet reachable via LB. This is OK if DNS/ LB not configured."
          echo "   Direct cell health: http://${{ inputs.cell-ip }}:8080/health"

      - name: Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║           CELL BOOTSTRAP COMPLETE                          ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  Cell:      ${{ inputs.cell-name }}"
          echo "  IP:        ${{ inputs.cell-ip }}"
          echo "  Server ID: ${{ inputs.cell-server-id }}"
          echo ""
          echo "  What's on the cell:"
          echo "    /opt/featuresignals/docker-compose.yml"
          echo "    /opt/featuresignals/Caddyfile"
          echo "    Docker + Docker Compose installed"
          echo "    Stack: postgres → server → dashboard → caddy"
          echo ""
          echo "  Next steps:"
          echo "    1. gh workflow run ci.yml -f version=v1.0.0   (build images)"
          echo "    2. gh workflow run cd.yml -f version=v1.0.0   (deploy to cell)"
          echo ""
