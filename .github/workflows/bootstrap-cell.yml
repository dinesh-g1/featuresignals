# Bootstrap Cell — One-time Setup
#
# Generates an SSH deploy key (or reuses existing one from GitHub Variables),
# installs Docker + Docker Compose on the cell VPS, uploads compose files,
# and starts the application stack.
#
# Usage:
#   First run — generates key, prints command to add it:
#     gh workflow run bootstrap-cell.yml -f cell-ip=46.224.31.37
#
#   Add the SSH public key to the cell, then re-run (same command):
#     → The same key is reused (stored in GitHub Variables)
#     → SSH works, Docker gets installed, stack starts
#
# Required secrets:
#   GHCR_TOKEN   — GitHub PAT with read:packages (for image pulls)
#   GH_TOKEN     — GitHub PAT with repo scope (for gh variable set/get)

name: Bootstrap Cell

on:
  workflow_dispatch:
    inputs:
      cell-ip:
        description: "Cell public IP address"
        required: true
        type: string
        default: "46.224.31.37"
      cell-name:
        description: "Cell name"
        required: true
        type: string
        default: prod-eu-001

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Step 1: Get or generate SSH key ────────────────────────────────
      - name: Get or generate SSH deploy key
        id: ssh-key
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -e
          mkdir -p /tmp/ssh-key

          # Check if a key already exists in GitHub Variables (readable across runs)
          EXISTING_KEY=$(gh variable get CELL_SSH_KEY --repo ${{ github.repository }} 2>/dev/null || echo "")

          if [ -n "$EXISTING_KEY" ]; then
            # Reuse existing key
            echo "$EXISTING_KEY" | base64 -d > /tmp/ssh-key/deploy-key
            chmod 600 /tmp/ssh-key/deploy-key
            echo "✅ Reusing existing SSH key from CELL_SSH_KEY variable"
          else
            # Generate new key pair
            ssh-keygen -t ed25519 -f /tmp/ssh-key/deploy-key -N "" \
              -C "deploy-${{ inputs.cell-name }}" >/dev/null 2>&1
            chmod 600 /tmp/ssh-key/deploy-key
            echo "✅ Generated new SSH deploy key"

            # Store private key as GitHub Variable (readable via API)
            gh variable set CELL_SSH_KEY --repo ${{ github.repository }} \
              --body "$(cat /tmp/ssh-key/deploy-key | base64 -w0)" 2>/dev/null && \
              echo "   ✅ Private key saved as CELL_SSH_KEY variable" || \
              echo "   ⚠️  Could not save CELL_SSH_KEY variable"
          fi

          # Always store/update the public key for reference
          gh variable set CELL_SSH_KEY_PUBLIC --repo ${{ github.repository }} \
            --body "$(cat /tmp/ssh-key/deploy-key.pub)" 2>/dev/null && \
            echo "   ✅ Public key saved as CELL_SSH_KEY_PUBLIC variable"

          echo "pubkey<<GITHUB_EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/ssh-key/deploy-key.pub >> "$GITHUB_OUTPUT"
          echo "GITHUB_EOF" >> "$GITHUB_OUTPUT"

      # ── Step 2: Try SSH — if fails, print add-key command and exit ─────
      - name: Try SSH with deploy key
        id: try-ssh
        continue-on-error: true
        run: |
          echo "Trying SSH to root@${{ inputs.cell-ip }}..."
          if ssh -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=10 \
            -i /tmp/ssh-key/deploy-key \
            "root@${{ inputs.cell-ip }}" "echo ssh-ok" 2>/dev/null; then
            echo "✅ SSH successful — deploy key is active"
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ SSH failed — key not yet added to this cell"
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Step 3: Print command to add key ───────────────────────────────
      - name: Add SSH key to cell
        if: steps.try-ssh.outputs.success != 'true'
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║   ADD THIS SSH KEY TO THE CELL VPS                        ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  SSH into the cell at ${{ inputs.cell-ip }} and run:"
          echo ""
          echo "    mkdir -p ~/.ssh && chmod 700 ~/.ssh"
          echo "    echo '$(cat /tmp/ssh-key/deploy-key.pub)' \\"
          echo "      >> ~/.ssh/authorized_keys"
          echo "    chmod 600 ~/.ssh/authorized_keys"
          echo ""
          echo "  ──── Or append this public key to ~/.ssh/authorized_keys ────"
          echo ""
          cat /tmp/ssh-key/deploy-key.pub
          echo ""
          echo "  ──────────────────────────────────────────────────────────────"
          echo ""
          echo "  After adding the key, re-run this workflow with the SAME"
          echo "  inputs. The key is saved in GitHub Variables and won't change."
          echo ""
          echo "  To view the saved public key later:"
          echo "    gh variable get CELL_SSH_KEY_PUBLIC --repo ${{ github.repository }}"
          echo ""
          exit 1

      # ── Step 4: Install Docker + Docker Compose ────────────────────────
      - name: Install Docker
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i /tmp/ssh-key/deploy-key "root@${{ inputs.cell-ip }}" bash -s << 'REMOTE'
            set -eux
            if ! command -v docker &>/dev/null; then
              apt-get update -qq
              apt-get install -y -qq docker.io docker-compose-v2 curl
              systemctl enable docker
              systemctl start docker
              echo "✅ Docker installed"
            else
              echo "✅ Docker already present: $(docker --version)"
            fi
            docker compose version
            mkdir -p /opt/featuresignals
            echo "✅ /opt/featuresignals ready"
          REMOTE

      # ── Step 5: Upload compose files ────────────────────────────────────
      - name: Upload compose files
        run: |
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i /tmp/ssh-key/deploy-key \
            deploy/docker-compose.cell.yml \
            "root@${{ inputs.cell-ip }}:/opt/featuresignals/docker-compose.yml"

          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i /tmp/ssh-key/deploy-key \
            deploy/Caddyfile \
            "root@${{ inputs.cell-ip }}:/opt/featuresignals/Caddyfile"

          echo "✅ Compose files uploaded"

      # ── Step 6: Pull images and start the stack ────────────────────────
      - name: Start application stack
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i /tmp/ssh-key/deploy-key "root@${{ inputs.cell-ip }}" \
            "GHCR_TOKEN=$GHCR_TOKEN" bash -s << 'REMOTE'
            set -eux
            cd /opt/featuresignals
            echo "$GHCR_TOKEN" | docker login ghcr.io -u dinesh-g1 --password-stdin
            echo "✅ Logged in to GHCR"
            docker pull ghcr.io/dinesh-g1/featuresignals-server:latest
            docker pull ghcr.io/dinesh-g1/featuresignals-dashboard:latest
            echo "✅ Images pulled"
            FEATURESIGNALS_VERSION=latest docker compose up -d
            echo "✅ Stack started"
            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
                echo "✅ Cell is healthy"
                exit 0
              fi
              sleep 2
            done
            echo "❌ Health check failed after 60s"
            exit 1
          REMOTE

      # ── Step 7: External smoke test ─────────────────────────────────────
      - name: Smoke test via public API
        run: |
          echo "Checking https://api.featuresignals.com/health..."
          for i in $(seq 1 15); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
              "https://api.featuresignals.com/health")
            if [ "$HTTP" = "200" ]; then
              echo "✅ API healthy via load balancer"
              exit 0
            fi
            echo "  Waiting for LB... ($i/15, HTTP $HTTP)"
            sleep 4
          done
          echo "ℹ️  API not yet reachable via LB (DNS may need time)"
          echo "   Direct: http://${{ inputs.cell-ip }}:8080/health"

      # ── Step 8: Summary ────────────────────────────────────────────────
      - name: Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║           CELL BOOTSTRAP COMPLETE                          ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  Cell:      ${{ inputs.cell-name }} (${{ inputs.cell-ip }})"
          echo "  SSH key:   CELL_SSH_KEY (GitHub Variable — readable by CD)"
          echo ""
          echo "  On the cell:"
          echo "    /opt/featuresignals/docker-compose.yml"
          echo "    /opt/featuresignals/Caddyfile"
          echo "    Stack: postgres → server → dashboard → caddy"
          echo ""
          echo "  Workflow (manual, in order):"
          echo "    1. gh workflow run ci.yml -f version=v1.0.0"
          echo "    2. gh workflow run cd.yml -f version=v1.0.0"
          echo ""
