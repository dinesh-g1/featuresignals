# =============================================================================
# FeatureSignals — Main CI/CD Pipeline
# =============================================================================
# This workflow delegates ALL build, test, and deploy operations to the Dagger
# Go module in ci/. The self-hosted runner (on the same k3s cluster) executes
# Dagger containers with no external runner minutes cost.
#
# Trigger matrix:
#   pull_request   → Validate (server, dashboard)
#   push to main   → FullTest → BuildImages → DeployStaging
#   tags v*        → ClaimVerification
#   workflow_dispatch → DeployProduction (manual)
# =============================================================================

name: CI
on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      deploy_to:
        description: "Deploy to environment"
        type: choice
        options:
          - staging
          - production
        default: staging

# Only one production deploy at a time — staging and PR validations can run
# concurrently. This prevents conflicting Helm upgrades.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.deploy_to || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

jobs:
  # =========================================================================
  # Dagger — all pipeline steps execute via the Dagger Go module
  # =========================================================================
  dagger:
    runs-on: [self-hosted, k3s]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v6
        with:
          version: latest
          workdir: ci/
          # Dagger Cloud telemetry (optional, no cost)
          # cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      # ---- Validate (PRs) ----
      - name: Validate Server
        if: github.event_name == 'pull_request'
        run: dagger call validate --filter=server
        env:
          DAGGER_LOG_FORMAT: plain

      - name: Validate Dashboard
        if: github.event_name == 'pull_request'
        run: dagger call validate --filter=dashboard
        env:
          DAGGER_LOG_FORMAT: plain

      # ---- Full Test (merge to main) ----
      - name: Full Test Suite
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: dagger call full-test --source=..
        env:
          DAGGER_LOG_FORMAT: plain
          DAGGER_PROGRESS: plain

      # ---- Build & Push Images (merge to main) ----
      - name: Build and Push Images
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: dagger call build-images --source=.. --version=sha-${GITHUB_SHA::8}
        env:
          DAGGER_LOG_FORMAT: plain
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Deploy to Staging (merge to main, automatic) ----
      - name: Deploy to Staging
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: dagger call deploy-promote --source=.. --version=sha-${GITHUB_SHA::8} --env=staging
        env:
          DAGGER_LOG_FORMAT: plain
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      # ---- Smoke Test Staging (after deploy) ----
      - name: Smoke Test Staging
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: dagger call smoke-test --url=https://api.staging.featuresignals.com
        env:
          DAGGER_LOG_FORMAT: plain

      # ---- Claim Verification (tag push, e.g. v1.2.3) ----
      - name: Claims Verification
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: dagger call claim-verification --source=..
        env:
          DAGGER_LOG_FORMAT: plain

      # ---- Deploy Production (manual workflow_dispatch) ----
      - name: Deploy to Production
        if: github.event_name == 'workflow_dispatch' && inputs.deploy_to == 'production'
        run: dagger call deploy-promote --source=.. --version=sha-${GITHUB_SHA::8} --env=production
        env:
          DAGGER_LOG_FORMAT: plain
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      # ---- Smoke Test Production (after deploy) ----
      - name: Smoke Test Production
        if: github.event_name == 'workflow_dispatch' && inputs.deploy_to == 'production'
        run: dagger call smoke-test --url=https://api.featuresignals.com
        env:
          DAGGER_LOG_FORMAT: plain

  # =========================================================================
  # Notifications & Summary
  # =========================================================================
  summary:
    runs-on: [self-hosted, k3s]
    needs: [dagger]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Event** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dagger status** | ${{ needs.dagger.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "| **Deploy target** | ${{ inputs.deploy_to }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
