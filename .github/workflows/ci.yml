name: CI
on: [push, pull_request]
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.changes.outputs.server }}
      dashboard: ${{ steps.changes.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            server:
              - 'server/**'
            dashboard:
              - 'dashboard/**'
  validate:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Go
        if: needs.detect.outputs.server == 'true'
        run: |
          cd server && go vet ./... && go build ./...
      - name: Validate Dashboard
        if: needs.detect.outputs.dashboard == 'true'
        run: |
          cd dashboard && npm ci && npm run lint
  test:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run Go tests
        if: needs.detect.outputs.server == 'true'
        run: |
          cd server && go test ./... -count=1 -timeout 120s -race -coverprofile=coverage.out
      - name: Run Dashboard tests
        if: needs.detect.outputs.dashboard == 'true'
        run: |
          cd dashboard && npm ci && npm run test -- --run
  build-and-push:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push server
        if: needs.detect.outputs.server == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./deploy/docker/Dockerfile.server
          push: true
          platforms: linux/amd64
          tags: ghcr.io/dinesh-g1/featuresignals-server:${{ github.sha }}
      - name: Build and push dashboard
        if: needs.detect.outputs.dashboard == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./deploy/docker/Dockerfile.dashboard
          push: true
          platforms: linux/amd64
          tags: ghcr.io/dinesh-g1/featuresignals-dashboard:${{ github.sha }}
      - name: Build and push global-router
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/global-router
          file: ./deploy/global-router/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/dinesh-g1/featuresignals-global-router:${{ github.sha }}
