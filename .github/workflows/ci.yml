name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fs
          POSTGRES_PASSWORD: fsdev
          POSTGRES_DB: featuresignals
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum
      - name: Run migrations
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path server/migrations -database "postgres://fs:fsdev@localhost:5432/featuresignals?sslmode=disable" up
      - name: Run tests with coverage
        working-directory: server
        run: go test ./... -count=1 -timeout 120s -v -coverprofile=coverage.out -covermode=atomic
        env:
          TEST_DATABASE_URL: postgres://fs:fsdev@localhost:5432/featuresignals?sslmode=disable
      - name: Print coverage summary
        working-directory: server
        run: |
          echo "=== Server Test Coverage ==="
          go tool cover -func=coverage.out | tail -1
          echo ""
          go tool cover -func=coverage.out
      - name: Build
        working-directory: server
        run: go build -o bin/server ./cmd/server
      - name: Schema snapshot check
        run: |
          PGPASSWORD=fsdev pg_dump -h localhost -U fs -d featuresignals --schema-only --no-owner --no-acl | \
            grep -v '^--' | grep -v '^$' | grep -v '^SET ' | grep -v '^SELECT ' > /tmp/schema-current.sql
          if [ -f server/schema.snapshot.sql ]; then
            if ! diff -q server/schema.snapshot.sql /tmp/schema-current.sql > /dev/null 2>&1; then
              echo "::warning::Schema snapshot is out of date. Run 'make schema-snapshot' to update."
              diff server/schema.snapshot.sql /tmp/schema-current.sql || true
            else
              echo "Schema snapshot is up to date."
            fi
          else
            echo "::notice::No schema snapshot found. Consider committing server/schema.snapshot.sql."
          fi

  server-lint:
    name: Server Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum
      - name: Vet
        working-directory: server
        run: go vet ./...

  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Go vulnerability check (server)
        working-directory: server
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Go vulnerability check (Go SDK)
        working-directory: sdks/go
        run: govulncheck ./...

      - name: npm audit (dashboard)
        working-directory: dashboard
        run: npm install && npm audit --audit-level=high || true

      - name: npm audit (docs)
        working-directory: docs
        run: npm install && npm audit --audit-level=high || true

      - name: npm audit (Node SDK)
        working-directory: sdks/node
        run: npm install && npm audit --audit-level=high || true

      - name: npm audit (React SDK)
        working-directory: sdks/react
        run: npm install && npm audit --audit-level=high || true

      - name: npm audit (Vue SDK)
        working-directory: sdks/vue
        run: npm install && npm audit --audit-level=high || true

  go-sdk-test:
    name: Go SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: sdks/go/go.sum
      - name: Test with coverage
        working-directory: sdks/go
        run: |
          go test ./... -count=1 -v -coverprofile=coverage.out -covermode=atomic
          echo "=== Go SDK Coverage ==="
          go tool cover -func=coverage.out | tail -1
      - name: Build
        working-directory: sdks/go
        run: go build ./...

  node-sdk-test:
    name: Node SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        working-directory: sdks/node
        run: npm install
      - name: Test with coverage
        working-directory: sdks/node
        run: |
          node --test --experimental-strip-types --experimental-test-coverage src/__tests__/client.test.ts
          echo "=== Node SDK Coverage printed above ==="

  python-sdk-test:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        working-directory: sdks/python
        run: pip install -e ".[dev]" pytest-cov
      - name: Test with coverage
        working-directory: sdks/python
        run: python -m pytest tests/ -v --cov=featuresignals --cov-report=term-missing

  java-sdk-test:
    name: Java SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven
      - name: Test
        working-directory: sdks/java
        run: mvn -B test

  dashboard-test:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        working-directory: dashboard
        run: npm ci
      - name: Test with coverage
        working-directory: dashboard
        run: npm run test:coverage
      - name: Build
        working-directory: dashboard
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        working-directory: docs
        run: npm install
      - name: Build
        working-directory: docs
        run: npm run build

  stalescan-build:
    name: Stale Flag Scanner Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum
      - name: Build
        working-directory: server
        run: go build -o bin/stalescan ./cmd/stalescan

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [server-test, go-sdk-test, node-sdk-test, python-sdk-test, java-sdk-test, dashboard-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -f deploy/docker/Dockerfile.server -t featuresignals-server:ci ./server
      - name: Build dashboard image
        run: docker build -f deploy/docker/Dockerfile.dashboard -t featuresignals-dashboard:ci ./dashboard
