# CI — Build & Push Images to GHCR
#
# Manual workflow. Provide a commit SHA and select which services to build.
# Images are tagged with the full commit SHA and pushed to GHCR.
#
# Usage:
#   gh workflow run ci.yml -f sha=<full-or-short-commit-sha>
#
# Required secrets:
#   GHCR_TOKEN — GitHub PAT with write:packages scope

name: CI - Build Images

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to build (full or short, must exist in repo)"
        required: true
        type: string
      services:
        description: "Services to build (comma-separated: server,dashboard,router,website,docs or 'all')"
        required: true
        default: "all"
        type: string

env:
  REGISTRY: ghcr.io/dinesh-g1

jobs:
  resolve-sha:
    name: Resolve SHA
    runs-on: ubuntu-latest
    outputs:
      full_sha: ${{ steps.resolve.outputs.full_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve full commit SHA
        id: resolve
        run: |
          # Accept short or full SHA — resolve to full SHA
          FULL_SHA=$(git rev-parse "${{ inputs.sha }}"^{commit} 2>/dev/null || echo "")
          if [ -z "$FULL_SHA" ]; then
            echo "❌ Invalid SHA: ${{ inputs.sha }}"
            exit 1
          fi
          echo "full_sha=$FULL_SHA" >> "$GITHUB_OUTPUT"
          echo "✅ Resolved ${{ inputs.sha }} → $FULL_SHA"

  build:
    name: Build ${{ matrix.service }}
    needs: resolve-sha
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.resolve-sha.outputs.services_json) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-sha.outputs.full_sha }}

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u dinesh-g1 --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Server (Go) ──────────────────────────────────────────
      - name: Build and push server
        if: matrix.service == 'server'
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./deploy/docker/Dockerfile.server
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/featuresignals-server:${{ needs.resolve-sha.outputs.full_sha }}

      # ── Dashboard (Next.js) ─────────────────────────────────
      - name: Build and push dashboard
        if: matrix.service == 'dashboard'
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./deploy/docker/Dockerfile.dashboard
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/featuresignals-dashboard:${{ needs.resolve-sha.outputs.full_sha }}

      # ── Global Router (Go) ──────────────────────────────────
      - name: Build and push global-router
        if: matrix.service == 'router'
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/global-router
          file: ./deploy/global-router/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/featuresignals-global-router:${{ needs.resolve-sha.outputs.full_sha }}

      # ── Website (Next.js static export) ─────────────────────
      - name: Build website
        if: matrix.service == 'website'
        run: |
          cd website
          npm ci
          npm run build
          tar czf /tmp/website.tar.gz -C out .
          mkdir -p /tmp/content-img
          cp /tmp/website.tar.gz /tmp/content-img/
          cat > /tmp/content-img/Dockerfile << 'DOCKEREOF'
          FROM scratch
          COPY website.tar.gz /content.tar.gz
          DOCKEREOF
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ env.REGISTRY }}/featuresignals-website:${{ needs.resolve-sha.outputs.full_sha }} \
            -f /tmp/content-img/Dockerfile \
            --push \
            /tmp/content-img

      # ── Docs (Docusaurus) ───────────────────────────────────
      - name: Build docs
        if: matrix.service == 'docs'
        run: |
          cd docs
          npm ci
          npm run build
          tar czf /tmp/docs.tar.gz -C build .
          mkdir -p /tmp/content-img
          cp /tmp/docs.tar.gz /tmp/content-img/
          cat > /tmp/content-img/Dockerfile << 'DOCKEREOF'
          FROM scratch
          COPY docs.tar.gz /content.tar.gz
          DOCKEREOF
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ env.REGISTRY }}/featuresignals-docs:${{ needs.resolve-sha.outputs.full_sha }} \
            -f /tmp/content-img/Dockerfile \
            --push \
            /tmp/content-img

  generate-matrix:
    name: Select services
    needs: resolve-sha
    runs-on: ubuntu-latest
    outputs:
      services_json: ${{ steps.matrix.outputs.services_json }}
    steps:
      - id: matrix
        run: |
          INPUT="${{ inputs.services }}"
          if [ "$INPUT" = "all" ]; then
            echo 'services_json=["server","dashboard","router","website","docs"]' >> "$GITHUB_OUTPUT"
          else
            # Convert comma-separated to JSON array
            JSON="["
            IFS=',' read -ra SVC <<< "$INPUT"
            first=true
            for s in "${SVC[@]}"; do
              s=$(echo "$s" | xargs)  # trim
              if [ "$first" = true ]; then first=false; else JSON+=","; fi
              JSON+="\"$s\""
            done
            JSON+="]"
            echo "services_json=$JSON" >> "$GITHUB_OUTPUT"
          fi
          echo "Building: ${{ steps.matrix.outputs.services_json }}"

  verify:
    name: Verify images exist
    needs: [resolve-sha, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check built images
        run: |
          SHA="${{ needs.resolve-sha.outputs.full_sha }}"
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u dinesh-g1 --password-stdin
          for img in featuresignals-server featuresignals-dashboard featuresignals-global-router featuresignals-website featuresignals-docs; do
            if docker manifest inspect ghcr.io/dinesh-g1/$img:$SHA >/dev/null 2>&1; then
              echo "✅ $img:$SHA"
            else
              echo "⚠️  $img:$SHA not built (not requested or skipped)"
            fi
          done

      - name: Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║           CI BUILD COMPLETE                               ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  SHA:      ${{ needs.resolve-sha.outputs.full_sha }}"
          echo "  Services: ${{ inputs.services }}"
          echo ""
          echo "  Trigger CD with:"
          echo "    gh workflow run cd.yml -f version=${{ needs.resolve-sha.outputs.full_sha }}"
