# CI — Build & Push Images to GHCR
#
# Manual workflow. Provide a commit SHA and select which services to build.
# Images are tagged with the full commit SHA and pushed to GHCR.
#
# Usage:
#   gh workflow run ci.yml -f sha=6cc7fdb34190 -f services=all
#
# Required secrets:
#   GHCR_TOKEN — GitHub PAT with write:packages scope

name: CI - Build Images

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA (full or short — must exist in repo)"
        required: true
        type: string
      services:
        description: "Services to build (comma-separated: server,dashboard,router,website,docs) or 'all'"
        required: true
        default: "all"
        type: string

env:
  REGISTRY: ghcr.io/dinesh-g1

jobs:
  resolve:
    name: Resolve SHA
    runs-on: ubuntu-latest
    outputs:
      full_sha: ${{ steps.out.outputs.full_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: out
        run: |
          FULL=$(git rev-parse "${{ inputs.sha }}" 2>/dev/null || true)
          if [ -z "$FULL" ]; then
            echo "Invalid SHA: ${{ inputs.sha }}"
            exit 1
          fi
          echo "full_sha=$FULL" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.service }}
    needs: [resolve, matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.matrix.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.full_sha }}

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u dinesh-g1 --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Server ──────────────────────────────────────────────
      - name: Build + push server
        if: matrix.service == 'server'
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./deploy/docker/Dockerfile.server
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/featuresignals-server:${{ needs.resolve.outputs.full_sha }}

      # ── Dashboard ───────────────────────────────────────────
      - name: Build + push dashboard
        if: matrix.service == 'dashboard'
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./deploy/docker/Dockerfile.dashboard
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/featuresignals-dashboard:${{ needs.resolve.outputs.full_sha }}

      # ── Global Router ───────────────────────────────────────
      - name: Build + push global-router
        if: matrix.service == 'router'
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/global-router
          file: ./deploy/global-router/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/featuresignals-global-router:${{ needs.resolve.outputs.full_sha }}

      # ── Website (static export) ─────────────────────────────
      - name: Build + push website
        if: matrix.service == 'website'
        run: |
          cd website
          npm ci
          npm run build
          tar czf /tmp/content.tar.gz -C out .
          mkdir -p /tmp/img
          cp /tmp/content.tar.gz /tmp/img/
          cat > /tmp/img/Dockerfile << 'DEOF'
          FROM scratch
          COPY content.tar.gz /content.tar.gz
          DEOF
          docker buildx build --platform linux/amd64 \
            -t ${{ env.REGISTRY }}/featuresignals-website:${{ needs.resolve.outputs.full_sha }} \
            -f /tmp/img/Dockerfile --push /tmp/img

      # ── Docs (Docusaurus) ───────────────────────────────────
      - name: Build + push docs
        if: matrix.service == 'docs'
        run: |
          cd docs
          npm ci
          npm run build
          tar czf /tmp/content.tar.gz -C build .
          mkdir -p /tmp/img
          cp /tmp/content.tar.gz /tmp/img/
          cat > /tmp/img/Dockerfile << 'DEOF'
          FROM scratch
          COPY content.tar.gz /content.tar.gz
          DEOF
          docker buildx build --platform linux/amd64 \
            -t ${{ env.REGISTRY }}/featuresignals-docs:${{ needs.resolve.outputs.full_sha }} \
            -f /tmp/img/Dockerfile --push /tmp/img

  matrix:
    name: Build matrix
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.svc.outputs.services }}
    steps:
      - id: svc
        run: |
          INPUT="${{ inputs.services }}"
          if [ "$INPUT" = "all" ]; then
            echo 'services=["server","dashboard","router","website","docs"]' >> "$GITHUB_OUTPUT"
          else
            echo -n 'services=[' > /tmp/svc.txt
            FIRST=true
            for s in $(echo "$INPUT" | tr ',' ' '); do
              s=$(echo "$s" | xargs)
              [ "$FIRST" = true ] && FIRST=false || echo -n ',' >> /tmp/svc.txt
              echo -n "\"$s\"" >> /tmp/svc.txt
            done
            echo ']' >> /tmp/svc.txt
            echo "services=$(cat /tmp/svc.txt)" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: Verify
    needs: [matrix, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check images
        run: |
          SHA="${{ needs.resolve.outputs.full_sha }}"
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u dinesh-g1 --password-stdin
          for img in server dashboard global-router website docs; do
            TAG="${{ env.REGISTRY }}/featuresignals-$img:$SHA"
            docker manifest inspect "$TAG" >/dev/null 2>&1 && echo "✅ $TAG" || echo "⚠️  $TAG not built"
          done
