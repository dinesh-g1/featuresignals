# CI — Build & Push Images to GHCR
#
# Manual trigger. You provide a version tag, it builds server + dashboard
# images for linux/amd64 and pushes them to GHCR.
#
# Usage:
#   gh workflow run ci.yml -f version=v1.0.0
#
# Required secrets:
#   GHCR_TOKEN — GitHub PAT with write:packages scope

name: CI - Build Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g., v1.0.0 or main-a1b2c3d)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io/dinesh-g1

jobs:
  build-server:
    name: Build & push server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u dinesh-g1 --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./deploy/docker/Dockerfile.server
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/featuresignals-server:${{ inputs.version }}
            ${{ env.REGISTRY }}/featuresignals-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dashboard:
    name: Build & push dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u dinesh-g1 --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dashboard
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./deploy/docker/Dockerfile.dashboard
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.featuresignals.com
          tags: |
            ${{ env.REGISTRY }}/featuresignals-dashboard:${{ inputs.version }}
            ${{ env.REGISTRY }}/featuresignals-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
