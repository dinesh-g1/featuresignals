name: "CI"

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_sdk_tests:
        description: "Skip SDK tests (faster feedback for server/dashboard-only changes)"
        type: boolean
        default: false
      skip_security_scan:
        description: "Skip dependency security scan"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ── Change Detection ─────────────────────────────────────────────────────
  detect-changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      website: ${{ steps.filter.outputs.website }}
      docs: ${{ steps.filter.outputs.docs }}
      sdk-go: ${{ steps.filter.outputs.sdk-go }}
      sdk-node: ${{ steps.filter.outputs.sdk-node }}
      sdk-python: ${{ steps.filter.outputs.sdk-python }}
      sdk-java: ${{ steps.filter.outputs.sdk-java }}
      deploy: ${{ steps.filter.outputs.deploy }}
      ops: ${{ steps.filter.outputs.ops }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changed paths (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: filter-push
        run: |
          PARENT=$(git rev-parse HEAD^ 2>/dev/null || echo "")
          if [ -z "$PARENT" ]; then
            FILES="FULL"
          else
            FILES=$(git diff --name-only "$PARENT" HEAD)
          fi

          has_match() { [ "$FILES" = "FULL" ] && echo "true" || (echo "$FILES" | grep -qE "$1" && echo "true" || echo "false"); }

          {
            echo "server=$(has_match '^server/')"
            echo "dashboard=$(has_match '^dashboard/')"
            echo "website=$(has_match '^website/')"
            echo "docs=$(has_match '^docs/')"
            echo "sdk-go=$(has_match '^sdks/go/')"
            echo "sdk-node=$(has_match '^sdks/node/')"
            echo "sdk-python=$(has_match '^sdks/python/')"
            echo "sdk-java=$(has_match '^sdks/java/')"
            echo "deploy=$(has_match '^deploy/')"
            echo "ops=$(has_match '^ops/')"
          } >> "$GITHUB_OUTPUT"

          echo "### Detected Changes (push to main)" >> "$GITHUB_STEP_SUMMARY"
          echo "| Area | Changed |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|" >> "$GITHUB_STEP_SUMMARY"
          for pair in "Server:$(has_match '^server/')" "Dashboard:$(has_match '^dashboard/')" "Website:$(has_match '^website/')" "Docs:$(has_match '^docs/')" \
                      "SDK Go:$(has_match '^sdks/go/')" "SDK Node:$(has_match '^sdks/node/')" "SDK Python:$(has_match '^sdks/python/')" \
                      "SDK Java:$(has_match '^sdks/java/')" "Deploy:$(has_match '^deploy/')" "Ops:$(has_match '^ops/')"; do
            name="${pair%%:*}"
            val="${pair##*:}"
            echo "| $name | $val |" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Detect changed paths (pull_request)
        if: github.event_name == 'pull_request'
        id: filter-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --paginate -q '.[].filename')

          has_match() { echo "$FILES" | grep -qE "$1" && echo "true" || echo "false"; }

          {
            echo "server=$(has_match '^server/')"
            echo "dashboard=$(has_match '^dashboard/')"
            echo "website=$(has_match '^website/')"
            echo "docs=$(has_match '^docs/')"
            echo "sdk-go=$(has_match '^sdks/go/')"
            echo "sdk-node=$(has_match '^sdks/node/')"
            echo "sdk-python=$(has_match '^sdks/python/')"
            echo "sdk-java=$(has_match '^sdks/java/')"
            echo "deploy=$(has_match '^deploy/')"
            echo "ops=$(has_match '^ops/')"
          } >> "$GITHUB_OUTPUT"

          echo "### Detected Changes (pull request)" >> "$GITHUB_STEP_SUMMARY"
          echo "| Area | Changed |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|" >> "$GITHUB_STEP_SUMMARY"
          for pair in "Server:$(has_match '^server/')" "Dashboard:$(has_match '^dashboard/')" "Website:$(has_match '^website/')" "Docs:$(has_match '^docs/')" \
                      "SDK Go:$(has_match '^sdks/go/')" "SDK Node:$(has_match '^sdks/node/')" "SDK Python:$(has_match '^sdks/python/')" \
                      "SDK Java:$(has_match '^sdks/java/')" "Deploy:$(has_match '^deploy/')" "Ops:$(has_match '^ops/')"; do
            name="${pair%%:*}"
            val="${pair##*:}"
            echo "| $name | $val |" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Merge outputs
        id: filter
        run: |
          echo "server=${{ steps.filter-push.outputs.server || steps.filter-pr.outputs.server || 'true' }}" >> $GITHUB_OUTPUT
          echo "dashboard=${{ steps.filter-push.outputs.dashboard || steps.filter-pr.outputs.dashboard || 'true' }}" >> $GITHUB_OUTPUT
          echo "website=${{ steps.filter-push.outputs.website || steps.filter-pr.outputs.website || 'true' }}" >> $GITHUB_OUTPUT
          echo "docs=${{ steps.filter-push.outputs.docs || steps.filter-pr.outputs.docs || 'true' }}" >> $GITHUB_OUTPUT
          echo "sdk-go=${{ steps.filter-push.outputs.sdk-go || steps.filter-pr.outputs.sdk-go || 'true' }}" >> $GITHUB_OUTPUT
          echo "sdk-node=${{ steps.filter-push.outputs.sdk-node || steps.filter-pr.outputs.sdk-node || 'true' }}" >> $GITHUB_OUTPUT
          echo "sdk-python=${{ steps.filter-push.outputs.sdk-python || steps.filter-pr.outputs.sdk-python || 'true' }}" >> $GITHUB_OUTPUT
          echo "sdk-java=${{ steps.filter-push.outputs.sdk-java || steps.filter-pr.outputs.sdk-java || 'true' }}" >> $GITHUB_OUTPUT
          echo "deploy=${{ steps.filter-push.outputs.deploy || steps.filter-pr.outputs.deploy || 'true' }}" >> $GITHUB_OUTPUT
          echo "ops=${{ steps.filter-push.outputs.ops || steps.filter-pr.outputs.ops || 'true' }}" >> $GITHUB_OUTPUT

  # ── Server ─────────────────────────────────────────────────────────────────
  server-tests:
    name: "Server: Test & Coverage"
    needs: detect-changes
    if: >-
      github.event_name == 'workflow_dispatch'
      || needs.detect-changes.outputs.server == 'true'
      || needs.detect-changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fs
          POSTGRES_PASSWORD: fsdev
          POSTGRES_DB: featuresignals
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache-dependency-path: server/go.sum
      - name: Run migrations (test setup)
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path server/internal/migrate/migrations -database "postgres://fs:fsdev@localhost:5432/featuresignals?sslmode=disable" up
      - name: Run tests with coverage
        working-directory: server
        run: go test ./... -count=1 -timeout 120s -v -coverprofile=coverage.out -covermode=atomic
        env:
          TEST_DATABASE_URL: postgres://fs:fsdev@localhost:5432/featuresignals?sslmode=disable
      - name: Print coverage summary
        working-directory: server
        run: |
          echo "=== Server Test Coverage ==="
          go tool cover -func=coverage.out | tail -1

  server-lint:
    name: "Server: Lint & Vet"
    needs: detect-changes
    if: >-
      github.event_name == 'workflow_dispatch'
      || needs.detect-changes.outputs.server == 'true'
      || needs.detect-changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache-dependency-path: server/go.sum
      - name: Vet
        working-directory: server
        run: go vet ./...

  # ── Dashboard ──────────────────────────────────────────────────────────────
  dashboard-tests:
    name: "Dashboard: Test & Build"
    needs: detect-changes
    if: >-
      github.event_name == 'workflow_dispatch'
      || needs.detect-changes.outputs.dashboard == 'true'
      || needs.detect-changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install
        working-directory: dashboard
        run: npm ci
      - name: Test with coverage
        working-directory: dashboard
        run: npm run test:coverage
      - name: Build
        working-directory: dashboard
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ── Ops Portal ─────────────────────────────────────────────────────────────
  ops-tests:
    name: "Ops Portal: Test & Build"
    needs: detect-changes
    if: >-
      github.event_name == 'workflow_dispatch'
      || needs.detect-changes.outputs.ops == 'true'
      || needs.detect-changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install
        working-directory: ops
        run: npm ci
      - name: Lint
        working-directory: ops
        run: npm run lint --if-present
      - name: Build
        working-directory: ops
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ── Documentation ──────────────────────────────────────────────────────────
  docs-build:
    name: "Docs: Build Verification"
    needs: detect-changes
    if: >-
      github.event_name == 'workflow_dispatch'
      || needs.detect-changes.outputs.docs == 'true'
      || needs.detect-changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install & Build
        working-directory: docs
        run: npm install && npm run build

  # ── SDK Tests ──────────────────────────────────────────────────────────────
  go-sdk-tests:
    name: "SDK: Go Tests"
    needs: detect-changes
    if: >-
      !inputs.skip_sdk_tests
      && (
        github.event_name == 'workflow_dispatch'
        || needs.detect-changes.outputs.sdk-go == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache-dependency-path: sdks/go/go.sum
      - name: Test with coverage
        working-directory: sdks/go
        run: |
          go test ./... -count=1 -v -coverprofile=coverage.out -covermode=atomic
          echo "=== Go SDK Coverage ==="
          go tool cover -func=coverage.out | tail -1

  node-sdk-tests:
    name: "SDK: Node.js Tests"
    needs: detect-changes
    if: >-
      !inputs.skip_sdk_tests
      && (
        github.event_name == 'workflow_dispatch'
        || needs.detect-changes.outputs.sdk-node == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install & Test
        working-directory: sdks/node
        run: |
          npm install
          node --test --experimental-strip-types --experimental-test-coverage src/__tests__/client.test.ts

  python-sdk-tests:
    name: "SDK: Python Tests"
    needs: detect-changes
    if: >-
      !inputs.skip_sdk_tests
      && (
        github.event_name == 'workflow_dispatch'
        || needs.detect-changes.outputs.sdk-python == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install & Test
        working-directory: sdks/python
        run: |
          pip install -e ".[dev]" pytest-cov
          python -m pytest tests/ -v --cov=featuresignals --cov-report=term-missing

  java-sdk-tests:
    name: "SDK: Java Tests"
    needs: detect-changes
    if: >-
      !inputs.skip_sdk_tests
      && (
        github.event_name == 'workflow_dispatch'
        || needs.detect-changes.outputs.sdk-java == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          cache: maven
      - name: Test
        working-directory: sdks/java
        run: mvn -B test

  # ── Security ──────────────────────────────────────────────────────────────
  security-scan:
    name: "Security: Dependency Vulnerability Scan"
    needs: detect-changes
    if: >-
      !inputs.skip_security_scan
      && (
        github.event_name == 'workflow_dispatch'
        || needs.detect-changes.outputs.server == 'true'
        || needs.detect-changes.outputs.dashboard == 'true'
        || needs.detect-changes.outputs.ops == 'true'
        || needs.detect-changes.outputs.docs == 'true'
        || needs.detect-changes.outputs.sdk-go == 'true'
        || needs.detect-changes.outputs.sdk-node == 'true'
        || needs.detect-changes.outputs.sdk-python == 'true'
        || needs.detect-changes.outputs.sdk-java == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        if: >-
          github.event_name == 'workflow_dispatch'
          || needs.detect-changes.outputs.server == 'true'
          || needs.detect-changes.outputs.sdk-go == 'true'
        with:
          go-version: "1.25.9"
          cache-dependency-path: server/go.sum
      - uses: actions/setup-node@v5
        if: >-
          github.event_name == 'workflow_dispatch'
          || needs.detect-changes.outputs.dashboard == 'true'
          || needs.detect-changes.outputs.ops == 'true'
          || needs.detect-changes.outputs.docs == 'true'
          || needs.detect-changes.outputs.sdk-node == 'true'
        with:
          node-version: "22"
      - name: Go vulnerability check (server)
        if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.server == 'true'
        working-directory: server
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Go vulnerability check (Go SDK)
        if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.sdk-go == 'true'
        working-directory: sdks/go
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: npm audit (dashboard)
        if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.dashboard == 'true'
        working-directory: dashboard
        run: npm install && npm audit --audit-level=high
      - name: npm audit (ops portal)
        if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.ops == 'true'
        working-directory: ops
        run: npm install && npm audit --audit-level=high
      - name: npm audit (docs)
        if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.docs == 'true'
        working-directory: docs
        run: npm install && npm audit --audit-level=high
      - name: npm audit (website)
        if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.website == 'true'
        working-directory: website
        run: npm install && npm audit --audit-level=high
      - name: npm audit (Node SDK)
        if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.sdk-node == 'true'
        working-directory: sdks/node
        run: npm install && npm audit --audit-level=high

  # ── CI Gate ────────────────────────────────────────────────────────────────
  ci-gate:
    name: "CI Gate"
    if: always()
    needs:
      - server-tests
      - server-lint
      - dashboard-tests
      - ops-tests
      - docs-build
      - go-sdk-tests
      - node-sdk-tests
      - python-sdk-tests
      - java-sdk-tests
      - security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          echo "### CI Gate Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server: Test & Coverage | ${{ needs.server-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server: Lint & Vet | ${{ needs.server-lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dashboard: Test & Build | ${{ needs.dashboard-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ops Portal: Test & Build | ${{ needs.ops-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docs: Build | ${{ needs.docs-build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SDK: Go | ${{ needs.go-sdk-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SDK: Node.js | ${{ needs.node-sdk-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SDK: Python | ${{ needs.python-sdk-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SDK: Java | ${{ needs.java-sdk-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
      - name: Fail on any failure or cancellation
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "::error::One or more CI jobs failed or were cancelled"
          exit 1
