name: "Provision & Configure New VPS"

on:
  workflow_dispatch:
    inputs:
      host_secret:
        description: "GitHub secret name containing the VPS host IP (e.g., VPS_HOST, VPS_HOST_US)"
        required: true
        type: string
        default: "VPS_HOST"
      ssh_key_secret:
        description: "GitHub secret name for the SSH private key"
        required: true
        type: string
        default: "VPS_SSH_KEY"
      initial_user:
        description: "Initial SSH user for provisioning (root for fresh VPS)"
        required: false
        type: string
        default: "root"
      setup_crons:
        description: "Install backup, monitoring, and maintenance cron jobs"
        type: boolean
        default: true

jobs:
  provision:
    name: "Provision VPS"
    runs-on: ubuntu-latest
    environment: infrastructure

    steps:
      - name: System setup and deploy user creation
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[github.event.inputs.host_secret] }}
          username: ${{ github.event.inputs.initial_user }}
          key: ${{ secrets[github.event.inputs.ssh_key_secret] }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            echo "==> System updates..."
            apt update && apt upgrade -y
            apt install -y curl git ufw fail2ban

            echo "==> Configuring unattended security upgrades..."
            apt install -y unattended-upgrades
            cat > /etc/apt/apt.conf.d/20auto-upgrades << 'APT_EOF'
            APT::Periodic::Update-Package-Lists "1";
            APT::Periodic::Unattended-Upgrade "1";
            APT::Periodic::AutocleanInterval "7";
            APT_EOF
            systemctl enable unattended-upgrades

            echo "==> Creating deploy user..."
            id -u deploy &>/dev/null || adduser --disabled-password --gecos "" deploy
            cat > /etc/sudoers.d/deploy << 'SUDOERS_EOF'
            deploy ALL=(ALL) NOPASSWD: /usr/bin/systemctl restart ssh, /usr/bin/systemctl restart sshd
            deploy ALL=(ALL) NOPASSWD: /usr/sbin/ufw status
            deploy ALL=(ALL) NOPASSWD: /usr/bin/journalctl --vacuum-time=*
            deploy ALL=(ALL) NOPASSWD: /usr/bin/docker *
            SUDOERS_EOF
            chmod 440 /etc/sudoers.d/deploy

            echo "==> Configuring SSH for deploy user..."
            mkdir -p /home/deploy/.ssh
            cp /root/.ssh/authorized_keys /home/deploy/.ssh/authorized_keys
            chmod 700 /home/deploy/.ssh
            chmod 600 /home/deploy/.ssh/authorized_keys
            chown -R deploy:deploy /home/deploy/.ssh

            echo "==> Installing Docker..."
            if ! command -v docker &> /dev/null; then
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
              apt update
              apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            fi
            usermod -aG docker deploy

            echo "==> Configuring firewall..."
            ufw default deny incoming
            ufw default allow outgoing
            ufw allow 22/tcp
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw allow 443/udp
            ufw --force enable

            echo "==> Starting fail2ban..."
            systemctl enable fail2ban
            systemctl start fail2ban

            echo "==> Creating directories..."
            mkdir -p /opt/featuresignals /mnt/data/backups/daily /mnt/data/backups/weekly /mnt/data/backups/remote
            chown -R deploy:deploy /opt/featuresignals
            chown -R deploy:deploy /mnt/data

            echo "System provisioning complete."

      - name: Clone repository
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[github.event.inputs.host_secret] }}
          username: deploy
          key: ${{ secrets[github.event.inputs.ssh_key_secret] }}
          command_timeout: 5m
          envs: REPO_TOKEN
          script: |
            set -euo pipefail
            REPO_URL="https://x-access-token:${REPO_TOKEN}@github.com/dinesh-g1/featuresignals.git"
            if [ ! -d /opt/featuresignals/.git ]; then
              cd /opt/featuresignals
              git init -b main
              git remote add origin "${REPO_URL}"
              git fetch origin
              git reset --hard origin/main
            else
              cd /opt/featuresignals
              git remote set-url origin "${REPO_URL}"
              git fetch origin main
              git reset --hard origin/main
            fi
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}

      - name: Write environment file
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[github.event.inputs.host_secret] }}
          username: deploy
          key: ${{ secrets[github.event.inputs.ssh_key_secret] }}
          envs: POSTGRES_PASSWORD,JWT_SECRET,DB_ADMIN_PASSWORD,DB_READONLY_PASSWORD
          script: |
            cat > /opt/featuresignals/.env << ENVEOF
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            DB_ADMIN_PASSWORD=${DB_ADMIN_PASSWORD}
            DB_READONLY_PASSWORD=${DB_READONLY_PASSWORD}
            ENVEOF
            chmod 600 /opt/featuresignals/.env
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_ADMIN_PASSWORD: ${{ secrets.DB_ADMIN_PASSWORD }}
          DB_READONLY_PASSWORD: ${{ secrets.DB_READONLY_PASSWORD }}

      - name: Install cron jobs
        if: ${{ github.event.inputs.setup_crons == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[github.event.inputs.host_secret] }}
          username: deploy
          key: ${{ secrets[github.event.inputs.ssh_key_secret] }}
          script: |
            CRONS="
            0 3 * * * /opt/featuresignals/deploy/pg-backup.sh >> /var/log/fs-backup.log 2>&1
            30 3 * * * /opt/featuresignals/deploy/pg-backup-replicate.sh >> /var/log/fs-backup-replicate.log 2>&1
            0 4 * * 0 /opt/featuresignals/deploy/cleanup-cron.sh >> /var/log/fs-cleanup.log 2>&1
            0 5 * * 0 /opt/featuresignals/deploy/pg-maintenance.sh >> /var/log/fs-pg-maintenance.log 2>&1
            0 6 * * 0 /opt/featuresignals/deploy/pg-backup-verify.sh >> /var/log/fs-backup-verify.log 2>&1
            * * * * * /opt/featuresignals/deploy/monitoring/node-health.sh 2>&1 | logger -t fs-health
            "
            echo "$CRONS" | crontab -
            echo "Cron jobs installed:"
            crontab -l

      - name: Harden SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[github.event.inputs.host_secret] }}
          username: deploy
          key: ${{ secrets[github.event.inputs.ssh_key_secret] }}
          script: |
            sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
            sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
            sudo sed -i 's/^#*PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
            sudo sed -i 's/^#*MaxAuthTries.*/MaxAuthTries 3/' /etc/ssh/sshd_config
            sudo sed -i 's/^#*ClientAliveInterval.*/ClientAliveInterval 300/' /etc/ssh/sshd_config
            sudo sed -i 's/^#*ClientAliveCountMax.*/ClientAliveCountMax 2/' /etc/ssh/sshd_config
            grep -q "^MaxAuthTries" /etc/ssh/sshd_config || echo "MaxAuthTries 3" | sudo tee -a /etc/ssh/sshd_config
            grep -q "^ClientAliveInterval" /etc/ssh/sshd_config || echo "ClientAliveInterval 300" | sudo tee -a /etc/ssh/sshd_config
            grep -q "^ClientAliveCountMax" /etc/ssh/sshd_config || echo "ClientAliveCountMax 2" | sudo tee -a /etc/ssh/sshd_config
            sudo systemctl restart ssh || sudo systemctl restart sshd
            echo "SSH hardened: root login disabled, password auth disabled, max 3 auth attempts, 5min idle timeout."

      - name: Verify setup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[github.event.inputs.host_secret] }}
          username: deploy
          key: ${{ secrets[github.event.inputs.ssh_key_secret] }}
          script: |
            echo "==> Docker version:"
            docker --version
            echo "==> Firewall status:"
            sudo ufw status
            echo "==> Disk space:"
            df -h /mnt/data / 2>/dev/null || df -h /
            echo "==> Cron jobs:"
            crontab -l 2>/dev/null || echo "No crons"
            echo ""
            echo "VPS provisioning complete. Run a deploy workflow to start services."
