name: "Build & Publish Images"

# On-demand: build and publish Docker images for any branch, tag, or commit SHA.
# Images are tagged with a short SHA (sha-xxxxxxx) and optionally pushed to GHCR.
# Used by Ops Portal when provisioning a new environment or changing a deployment target.
on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to build from (branch name, tag, or commit SHA)"
        required: true
        default: "main"
        type: string
      push_images:
        description: "Push built images to GHCR"
        type: boolean
        default: true
      skip_tests:
        description: "Skip CI tests (build only)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  # -- Build & Publish ------------------------------------------------------
  build:
    name: "Build Images"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}

      - name: Compute image tags
        id: tags
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT

          OWNER="${{ github.repository_owner }}"
          SERVER_TAGS="ghcr.io/${OWNER}/featuresignals-server:sha-${SHA_SHORT}"
          DASH_TAGS="ghcr.io/${OWNER}/featuresignals-dashboard:sha-${SHA_SHORT}"
          OPS_TAGS="ghcr.io/${OWNER}/featuresignals-ops:sha-${SHA_SHORT}"
          WEBSITE_TAGS="ghcr.io/${OWNER}/featuresignals-website:sha-${SHA_SHORT}"
          DOCS_TAGS="ghcr.io/${OWNER}/featuresignals-docs:sha-${SHA_SHORT}"

          {
            echo "server_tags<<TAGS_EOF"
            echo "$SERVER_TAGS"
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "dashboard_tags<<TAGS_EOF"
            echo "$DASH_TAGS"
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "ops_tags<<TAGS_EOF"
            echo "$OPS_TAGS"
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "website_tags<<TAGS_EOF"
            echo "$WEBSITE_TAGS"
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "docs_tags<<TAGS_EOF"
            echo "$DOCS_TAGS"
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: inputs.push_images
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: deploy/docker/Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_images }}
          tags: ${{ steps.tags.outputs.server_tags }}

      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: deploy/docker/Dockerfile.dashboard
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_images }}
          tags: ${{ steps.tags.outputs.dashboard_tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080

      - name: Build ops portal image
        uses: docker/build-push-action@v6
        with:
          context: ./ops
          file: deploy/docker/Dockerfile.ops
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_images }}
          tags: ${{ steps.tags.outputs.ops_tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080

      - name: Build website image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: deploy/docker/Dockerfile.website
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_images }}
          tags: ${{ steps.tags.outputs.website_tags }}

      - name: Build docs image
        uses: docker/build-push-action@v6
        with:
          context: ./docs
          file: deploy/docker/Dockerfile.docs
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_images }}
          tags: ${{ steps.tags.outputs.docs_tags }}

      - name: Post build summary
        run: |
          echo "## Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Server | \`${{ steps.tags.outputs.server_tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | \`${{ steps.tags.outputs.dashboard_tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Ops Portal | \`${{ steps.tags.outputs.ops_tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Website | \`${{ steps.tags.outputs.website_tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs | \`${{ steps.tags.outputs.docs_tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ref:** \`${{ inputs.git_ref }}\` | **SHA:** \`${{ github.sha }}\` | **Pushed:** ${{ inputs.push_images }}" >> $GITHUB_STEP_SUMMARY
