name: CD Regional

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      regions:
        description: "Comma-separated regions to deploy (us,eu,in)"
        required: false
        default: "us,eu,in"

jobs:
  deploy:
    name: Deploy ${{ matrix.region }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        region: [us, eu, in]
        include:
          - region: us
            host_secret: VPS_HOST_US
            domain_api: api.us.featuresignals.com
            domain_app: app.us.featuresignals.com
            domain_main: us.featuresignals.com
            domain_docs: docs.us.featuresignals.com
            payment_gateway: stripe
          - region: eu
            host_secret: VPS_HOST_EU
            domain_api: api.eu.featuresignals.com
            domain_app: app.eu.featuresignals.com
            domain_main: eu.featuresignals.com
            domain_docs: docs.eu.featuresignals.com
            payment_gateway: stripe
          - region: in
            host_secret: VPS_HOST_IN
            domain_api: api.featuresignals.com
            domain_app: app.featuresignals.com
            domain_main: featuresignals.com
            domain_docs: docs.featuresignals.com
            payment_gateway: payu

    steps:
      - name: Check if region should deploy
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REGIONS="${{ github.event.inputs.regions }}"
            if echo "$REGIONS" | grep -q "${{ matrix.region }}"; then
              echo "deploy=true" >> $GITHUB_OUTPUT
            else
              echo "deploy=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "deploy=true" >> $GITHUB_OUTPUT
          fi

      - name: Write environment file
        if: steps.check.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_REGIONAL }}
          envs: REGION,DOMAIN_API,DOMAIN_APP,DOMAIN_MAIN,DOMAIN_DOCS,POSTGRES_PASSWORD,JWT_SECRET,DB_ADMIN_PASSWORD,DB_READONLY_PASSWORD,ZEPTOMAIL_TOKEN,OTEL_INGESTION_KEY,LOCAL_REGION,REGION_ENDPOINTS,PAYMENT_GATEWAY,PAYU_MERCHANT_KEY,PAYU_SALT,PAYU_MODE,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRICE_ID,STRIPE_MODE
          script: |
            cat > /opt/featuresignals/.env << ENVEOF
            REGION=${{ matrix.region }}
            DOMAIN_API=${{ matrix.domain_api }}
            DOMAIN_APP=${{ matrix.domain_app }}
            DOMAIN_MAIN=${{ matrix.domain_main }}
            DOMAIN_DOCS=${{ matrix.domain_docs }}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            DB_ADMIN_PASSWORD=${DB_ADMIN_PASSWORD}
            DB_READONLY_PASSWORD=${DB_READONLY_PASSWORD}
            ZEPTOMAIL_TOKEN=${ZEPTOMAIL_TOKEN}
            OTEL_ENABLED=true
            OTEL_EXPORTER_OTLP_ENDPOINT=ingest.us2.signoz.cloud:443
            OTEL_INGESTION_KEY=${OTEL_INGESTION_KEY}
            OTEL_SERVICE_NAME=featuresignals-api
            OTEL_SERVICE_REGION=${{ matrix.region }}
            OTEL_TRACES_ENABLED=true
            OTEL_METRICS_ENABLED=true
            OTEL_LOGS_ENABLED=false
            OTEL_LOG_LEVEL=warn
            OTEL_TRACE_SAMPLE_RATE=0.1
            LOCAL_REGION=${LOCAL_REGION}
            REGION_ENDPOINTS=${REGION_ENDPOINTS}
            PAYMENT_GATEWAY=${{ matrix.payment_gateway }}
            PAYU_MERCHANT_KEY=${PAYU_MERCHANT_KEY}
            PAYU_SALT=${PAYU_SALT}
            PAYU_MODE=${PAYU_MODE}
            STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
            STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
            STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
            STRIPE_MODE=${STRIPE_MODE}
            ENVEOF
            chmod 600 /opt/featuresignals/.env
        env:
          POSTGRES_PASSWORD: ${{ secrets[format('POSTGRES_PASSWORD_{0}', matrix.region)] || secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets[format('JWT_SECRET_{0}', matrix.region)] || secrets.JWT_SECRET }}
          DB_ADMIN_PASSWORD: ${{ secrets.DB_ADMIN_PASSWORD }}
          DB_READONLY_PASSWORD: ${{ secrets.DB_READONLY_PASSWORD }}
          ZEPTOMAIL_TOKEN: ${{ secrets.ZEPTOMAIL_TOKEN }}
          OTEL_INGESTION_KEY: ${{ secrets.OTEL_INGESTION_KEY }}
          LOCAL_REGION: ${{ matrix.region }}
          REGION_ENDPOINTS: ${{ matrix.region == 'in' && 'us=https://api.us.featuresignals.com,eu=https://api.eu.featuresignals.com' || '' }}
          PAYU_MERCHANT_KEY: ${{ secrets.PAYU_MERCHANT_KEY }}
          PAYU_SALT: ${{ secrets.PAYU_SALT }}
          PAYU_MODE: ${{ secrets.PAYU_MODE }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
          STRIPE_MODE: ${{ secrets.STRIPE_MODE }}

      - name: Pre-deploy database backup
        if: steps.check.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_REGIONAL }}
          script: |
            cd /opt/featuresignals
            if docker compose --project-directory . -f deploy/docker-compose.region.yml ps -q postgres 2>/dev/null | grep -q .; then
              bash deploy/pg-backup.sh || echo "Backup skipped"
            else
              echo "Postgres not running, skipping backup"
            fi

      - name: Deploy application
        if: steps.check.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_REGIONAL }}
          command_timeout: 15m
          envs: REPO_TOKEN
          script: |
            cd /opt/featuresignals
            git remote set-url origin "https://x-access-token:${REPO_TOKEN}@github.com/dinesh-g1/featuresignals.git"
            bash deploy/deploy-region.sh
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}

      - name: Health check
        if: steps.check.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_REGIONAL }}
          script: |
            echo "Waiting for services to stabilize..."
            sleep 15

            echo "==> Service status (${{ matrix.region }}):"
            cd /opt/featuresignals
            docker compose --project-directory . -f deploy/docker-compose.region.yml ps

            echo ""
            echo "==> Health check: API"
            curl -sf --max-time 10 https://${{ matrix.domain_api }}/health || echo "WARNING: API health check failed"

            echo ""
            echo "==> Health check: Dashboard"
            curl -sf --max-time 10 -o /dev/null -w "HTTP %{http_code}" https://${{ matrix.domain_app }} || echo "WARNING: Dashboard health check failed"

            echo ""
            echo "Deployment verified for ${{ matrix.region }}"
