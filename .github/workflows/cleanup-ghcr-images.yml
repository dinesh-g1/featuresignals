name: "Cleanup Old Container Images from GHCR"

on:
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch:
    inputs:
      keep_days:
        description: "Delete untagged images older than N days"
        type: number
        default: 30
      dry_run:
        description: "Preview deletions without executing"
        type: boolean
        default: false

permissions:
  packages: write

env:
  KEEP_DAYS: ${{ github.event.inputs.keep_days || 30 }}

jobs:
  cleanup:
    name: "Prune GHCR images"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package: [featuresignals-server, featuresignals-dashboard]

    steps:
      - name: Delete old untagged versions
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true

      - name: Delete old sha- tagged versions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pkg = '${{ matrix.package }}';
            const keepDays = parseInt('${{ env.KEEP_DAYS }}');
            const dryRun = '${{ github.event.inputs.dry_run }}' === 'true';
            const cutoff = new Date(Date.now() - keepDays * 86400000);

            console.log(`Package: ${pkg}, cutoff: ${cutoff.toISOString()}, dry_run: ${dryRun}`);

            const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
              package_type: 'container',
              package_name: pkg,
              username: context.repo.owner,
              per_page: 100,
            });

            const protectedTags = ['latest'];
            let deleted = 0;

            for (const v of versions.data) {
              const tags = v.metadata?.container?.tags || [];
              const updatedAt = new Date(v.updated_at);

              const isProtected = tags.some(t =>
                protectedTags.includes(t) || t.startsWith('v')
              );

              if (isProtected) continue;
              if (updatedAt >= cutoff) continue;

              const hasShaTag = tags.some(t => t.startsWith('sha-'));
              if (!hasShaTag && tags.length > 0) continue;

              if (dryRun) {
                console.log(`[DRY RUN] Would delete: ${v.id} tags=${tags} updated=${v.updated_at}`);
              } else {
                console.log(`Deleting: ${v.id} tags=${tags} updated=${v.updated_at}`);
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: 'container',
                  package_name: pkg,
                  username: context.repo.owner,
                  package_version_id: v.id,
                });
                deleted++;
              }
            }

            console.log(`Cleaned up ${deleted} old image versions for ${pkg}`);
