name: Setup VPS (Regional)

on:
  workflow_dispatch:
    inputs:
      region:
        description: "Region to provision (us, eu, in, dev)"
        required: true
        type: choice
        options:
          - us
          - eu
          - in
          - dev

jobs:
  provision:
    name: Provision VPS — ${{ github.event.inputs.region }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve host
        id: host
        run: |
          case "${{ github.event.inputs.region }}" in
            us)  echo "host_secret=VPS_HOST_US" >> $GITHUB_OUTPUT ;;
            eu)  echo "host_secret=VPS_HOST_EU" >> $GITHUB_OUTPUT ;;
            in)  echo "host_secret=VPS_HOST_IN" >> $GITHUB_OUTPUT ;;
            dev) echo "host_secret=VPS_HOST_DEV" >> $GITHUB_OUTPUT ;;
          esac

      - name: System setup and deploy user creation
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[steps.host.outputs.host_secret] }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            echo "==> System updates..."
            apt update && apt upgrade -y
            apt install -y curl git ufw fail2ban

            echo "==> Creating deploy user..."
            id -u deploy &>/dev/null || adduser --disabled-password --gecos "" deploy
            echo "deploy ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/deploy
            chmod 440 /etc/sudoers.d/deploy

            echo "==> Configuring SSH for deploy user..."
            mkdir -p /home/deploy/.ssh
            cp /root/.ssh/authorized_keys /home/deploy/.ssh/authorized_keys
            chmod 700 /home/deploy/.ssh
            chmod 600 /home/deploy/.ssh/authorized_keys
            chown -R deploy:deploy /home/deploy/.ssh

            echo "==> Installing Docker..."
            if ! command -v docker &> /dev/null; then
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
              apt update
              apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            fi
            usermod -aG docker deploy

            echo "==> Configuring firewall..."
            ufw default deny incoming
            ufw default allow outgoing
            ufw allow 22/tcp
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw allow 443/udp
            ufw --force enable

            echo "==> Starting fail2ban..."
            systemctl enable fail2ban
            systemctl start fail2ban

            echo "==> Creating project directory..."
            mkdir -p /opt/featuresignals
            chown deploy:deploy /opt/featuresignals

            echo "System provisioning complete for ${{ github.event.inputs.region }} region."

      - name: Clone repository
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[steps.host.outputs.host_secret] }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          envs: REPO_TOKEN
          script: |
            set -euo pipefail
            REPO_URL="https://x-access-token:${REPO_TOKEN}@github.com/dinesh-g1/featuresignals.git"
            if [ ! -d /opt/featuresignals/.git ]; then
              cd /opt/featuresignals
              git init -b main
              git remote add origin "${REPO_URL}"
              git fetch origin
              git reset --hard origin/main
            else
              cd /opt/featuresignals
              git remote set-url origin "${REPO_URL}"
              git pull origin main
            fi
            mkdir -p /opt/featuresignals/backups
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}

      - name: Write environment file
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[steps.host.outputs.host_secret] }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: REGION,POSTGRES_PASSWORD,JWT_SECRET,DB_ADMIN_PASSWORD,DB_READONLY_PASSWORD,OTEL_INGESTION_KEY,MSG91_AUTH_KEY,MSG91_EMAIL_TEMPLATE_ID,MSG91_EMAIL_DOMAIN,MSG91_EMAIL_FROM,MSG91_EMAIL_FROM_NAME
          script: |
            REGION="${{ github.event.inputs.region }}"

            case "$REGION" in
              us)
                DOMAIN_API="api.featuresignals.com"
                DOMAIN_APP="app.featuresignals.com"
                DOMAIN_MAIN="featuresignals.com"
                DOMAIN_DOCS="docs.featuresignals.com"
                LOG_LEVEL="info"
                SAMPLE_RATE="0.1"
                ;;
              eu)
                DOMAIN_API="api.eu.featuresignals.com"
                DOMAIN_APP="app.eu.featuresignals.com"
                DOMAIN_MAIN="eu.featuresignals.com"
                DOMAIN_DOCS="docs.eu.featuresignals.com"
                LOG_LEVEL="info"
                SAMPLE_RATE="0.1"
                ;;
              in)
                DOMAIN_API="api.in.featuresignals.com"
                DOMAIN_APP="app.in.featuresignals.com"
                DOMAIN_MAIN="in.featuresignals.com"
                DOMAIN_DOCS="docs.in.featuresignals.com"
                LOG_LEVEL="info"
                SAMPLE_RATE="0.1"
                ;;
              dev)
                DOMAIN_API="api.dev.featuresignals.com"
                DOMAIN_APP="app.dev.featuresignals.com"
                DOMAIN_MAIN="dev.featuresignals.com"
                DOMAIN_DOCS="docs.dev.featuresignals.com"
                LOG_LEVEL="debug"
                SAMPLE_RATE="1.0"
                ;;
            esac

            cat > /opt/featuresignals/.env << ENVEOF
            REGION=${REGION}
            DOMAIN_API=${DOMAIN_API}
            DOMAIN_APP=${DOMAIN_APP}
            DOMAIN_MAIN=${DOMAIN_MAIN}
            DOMAIN_DOCS=${DOMAIN_DOCS}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            DB_ADMIN_PASSWORD=${DB_ADMIN_PASSWORD}
            DB_READONLY_PASSWORD=${DB_READONLY_PASSWORD}
            LOG_LEVEL=${LOG_LEVEL}
            MSG91_AUTH_KEY=${MSG91_AUTH_KEY}
            MSG91_EMAIL_TEMPLATE_ID=${MSG91_EMAIL_TEMPLATE_ID}
            MSG91_EMAIL_DOMAIN=${MSG91_EMAIL_DOMAIN}
            MSG91_EMAIL_FROM=${MSG91_EMAIL_FROM}
            MSG91_EMAIL_FROM_NAME=${MSG91_EMAIL_FROM_NAME}
            OTEL_ENABLED=true
            OTEL_EXPORTER_OTLP_ENDPOINT=ingest.us2.signoz.cloud:443
            OTEL_INGESTION_KEY=${OTEL_INGESTION_KEY}
            OTEL_SERVICE_NAME=featuresignals-api
            OTEL_SERVICE_REGION=${REGION}
            OTEL_TRACES_ENABLED=true
            OTEL_METRICS_ENABLED=true
            OTEL_LOGS_ENABLED=false
            OTEL_LOG_LEVEL=${LOG_LEVEL}
            OTEL_TRACE_SAMPLE_RATE=${SAMPLE_RATE}
            NEXT_PUBLIC_API_URL_EU=https://api.eu.featuresignals.com
            NEXT_PUBLIC_API_URL_IN=https://api.in.featuresignals.com
            ENVEOF
            chmod 600 /opt/featuresignals/.env
        env:
          POSTGRES_PASSWORD: ${{ secrets[format('POSTGRES_PASSWORD_{0}', github.event.inputs.region)] || secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets[format('JWT_SECRET_{0}', github.event.inputs.region)] || secrets.JWT_SECRET }}
          DB_ADMIN_PASSWORD: ${{ secrets.DB_ADMIN_PASSWORD }}
          DB_READONLY_PASSWORD: ${{ secrets.DB_READONLY_PASSWORD }}
          OTEL_INGESTION_KEY: ${{ secrets.OTEL_INGESTION_KEY }}
          MSG91_AUTH_KEY: ${{ secrets.MSG91_AUTH_KEY }}
          MSG91_EMAIL_TEMPLATE_ID: ${{ secrets.MSG91_EMAIL_TEMPLATE_ID }}
          MSG91_EMAIL_DOMAIN: ${{ secrets.MSG91_EMAIL_DOMAIN }}
          MSG91_EMAIL_FROM: ${{ secrets.MSG91_EMAIL_FROM }}
          MSG91_EMAIL_FROM_NAME: ${{ secrets.MSG91_EMAIL_FROM_NAME }}

      - name: Setup backup cron
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[steps.host.outputs.host_secret] }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            (crontab -l 2>/dev/null | grep -v "pg-backup"; echo "0 3 * * * /opt/featuresignals/deploy/pg-backup.sh >> /var/log/fs-backup.log 2>&1") | crontab -
            echo "Backup cron installed (daily at 3 AM)."

      - name: Initial deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[steps.host.outputs.host_secret] }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd /opt/featuresignals
            bash deploy/deploy-region.sh

      - name: Harden SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[steps.host.outputs.host_secret] }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
            sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
            sudo sed -i 's/^#*PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
            sudo systemctl restart sshd
            echo "SSH hardened: root login disabled, password auth disabled."

      - name: Verify setup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[steps.host.outputs.host_secret] }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "==> Docker version:"
            docker --version

            echo "==> Firewall status:"
            sudo ufw status

            echo "==> Service status:"
            sleep 15
            docker compose -f /opt/featuresignals/deploy/docker-compose.region.yml ps

            echo ""
            echo "VPS setup complete for ${{ github.event.inputs.region }} region."
