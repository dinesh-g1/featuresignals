name: "Create Release & Publish Versioned Images"

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: "Generate Changelog & GitHub Release"
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

          {
            echo "changelog<<EOF"
            echo "## Changes since ${PREV_TAG}"
            echo ""

            echo "### Features"
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges --grep="^feat" | head -50
            echo ""

            echo "### Fixes"
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges --grep="^fix" | head -50
            echo ""

            echo "### Other"
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges --invert-grep --grep="^feat" --grep="^fix" | head -50
            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const changelog = `${{ steps.changelog.outputs.changelog }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `FeatureSignals ${tag}`,
              body: changelog,
              draft: false,
              prerelease: tag.includes('-rc') || tag.includes('-beta') || tag.includes('-alpha'),
            });
