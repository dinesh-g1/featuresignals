name: CD Dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest

    steps:
      - name: Write environment file
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST_DEV }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: POSTGRES_PASSWORD,JWT_SECRET,DB_ADMIN_PASSWORD,DB_READONLY_PASSWORD,MSG91_AUTH_KEY,MSG91_EMAIL_TEMPLATE_ID,MSG91_EMAIL_DOMAIN,MSG91_EMAIL_FROM,MSG91_EMAIL_FROM_NAME,OTEL_INGESTION_KEY
          script: |
            cat > /opt/featuresignals/.env << 'ENVEOF'
            REGION=dev
            DOMAIN_API=api.dev.featuresignals.com
            DOMAIN_APP=app.dev.featuresignals.com
            DOMAIN_MAIN=dev.featuresignals.com
            DOMAIN_DOCS=docs.dev.featuresignals.com
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            DB_ADMIN_PASSWORD=${DB_ADMIN_PASSWORD}
            DB_READONLY_PASSWORD=${DB_READONLY_PASSWORD}
            LOG_LEVEL=debug
            MSG91_AUTH_KEY=${MSG91_AUTH_KEY}
            MSG91_EMAIL_TEMPLATE_ID=${MSG91_EMAIL_TEMPLATE_ID}
            MSG91_EMAIL_DOMAIN=${MSG91_EMAIL_DOMAIN}
            MSG91_EMAIL_FROM=${MSG91_EMAIL_FROM}
            MSG91_EMAIL_FROM_NAME=${MSG91_EMAIL_FROM_NAME}
            OTEL_ENABLED=true
            OTEL_EXPORTER_OTLP_ENDPOINT=ingest.us2.signoz.cloud:443
            OTEL_INGESTION_KEY=${OTEL_INGESTION_KEY}
            OTEL_SERVICE_NAME=featuresignals-api
            OTEL_SERVICE_REGION=dev
            OTEL_TRACES_ENABLED=true
            OTEL_METRICS_ENABLED=true
            OTEL_LOGS_ENABLED=true
            OTEL_LOG_LEVEL=debug
            OTEL_TRACE_SAMPLE_RATE=1.0
            NEXT_PUBLIC_API_URL_EU=https://api.eu.featuresignals.com
            NEXT_PUBLIC_API_URL_IN=https://api.in.featuresignals.com
            ENVEOF
            chmod 600 /opt/featuresignals/.env
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_DEV || secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_DEV || secrets.JWT_SECRET }}
          DB_ADMIN_PASSWORD: ${{ secrets.DB_ADMIN_PASSWORD }}
          DB_READONLY_PASSWORD: ${{ secrets.DB_READONLY_PASSWORD }}
          MSG91_AUTH_KEY: ${{ secrets.MSG91_AUTH_KEY }}
          MSG91_EMAIL_TEMPLATE_ID: ${{ secrets.MSG91_EMAIL_TEMPLATE_ID }}
          MSG91_EMAIL_DOMAIN: ${{ secrets.MSG91_EMAIL_DOMAIN }}
          MSG91_EMAIL_FROM: ${{ secrets.MSG91_EMAIL_FROM }}
          MSG91_EMAIL_FROM_NAME: ${{ secrets.MSG91_EMAIL_FROM_NAME }}
          OTEL_INGESTION_KEY: ${{ secrets.OTEL_INGESTION_KEY }}

      - name: Deploy application
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST_DEV }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          envs: REPO_TOKEN
          script: |
            cd /opt/featuresignals
            git remote set-url origin "https://x-access-token:${REPO_TOKEN}@github.com/dinesh-g1/featuresignals.git"
            git fetch origin dev
            git checkout dev
            git reset --hard origin/dev
            bash deploy/deploy-region.sh
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST_DEV }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Waiting for services to stabilize..."
            sleep 15

            echo "==> Service status (dev):"
            docker compose -f /opt/featuresignals/deploy/docker-compose.region.yml ps

            echo ""
            echo "==> Health check: API"
            curl -sf --max-time 10 https://api.dev.featuresignals.com/health || echo "WARNING: API health check failed"

            echo ""
            echo "==> Health check: Dashboard"
            curl -sf --max-time 10 -o /dev/null -w "HTTP %{http_code}" https://app.dev.featuresignals.com || echo "WARNING: Dashboard health check failed"

            echo ""
            echo "Dev deployment verified."
