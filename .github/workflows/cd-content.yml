# CD - Content Deployment
#
# Builds website and docs static content from source on ubuntu-latest,
# then deploys them to the K3s VM via SCP (no Docker needed).
#
# Usage:
#   gh workflow run cd-content.yml -f run_website=true -f run_docs=true
#
# Required secrets:
#   SSH_HOST       — VM public IP
#   SSH_USER       — VM SSH user (root)
#   SSH_PRIVATE_KEY— SSH private key for VM access
#   GHCR_TOKEN     — only needed if content images are used as fallback

name: CD - Content

on:
  workflow_dispatch:
    inputs:
      run_website:
        description: "Build and deploy website (true/false)"
        required: true
        default: "true"
        type: string
      run_docs:
        description: "Build and deploy docs (true/false)"
        required: true
        default: "true"
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Build & deploy content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "✅ SSH key installed to ${{ secrets.SSH_HOST }}"

      # ── Website (includes docs) ───────────────────────────────
      - name: Build website (Next.js static export + docs)
        if: ${{ inputs.run_website == 'true' }}
        run: |
          cd website
          npm ci
          npm run build
          ls -la out/ 2>/dev/null || { echo "❌ website/out/ not found — build failed"; exit 1; }
          echo "✅ Website built ($(ls out/ | wc -l) top-level items)"
          echo "✅ Docs content API: $(ls out/docs/api/content/ 2>/dev/null | wc -l) JSON files"

      - name: Deploy website to VM
        if: ${{ inputs.run_website == 'true' }}
        run: |
          # Clean old content
          ssh -i ~/.ssh/deploy-key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "rm -rf /data/www/website/*" 2>/dev/null || true

          # Upload new content (tar pipe to avoid glob issues with scp)
          tar czf /tmp/website-content.tar.gz -C website/out .
          scp -i ~/.ssh/deploy-key -q /tmp/website-content.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/
          ssh -i ~/.ssh/deploy-key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "tar xzf /tmp/website-content.tar.gz -C /data/www/website/ && rm /tmp/website-content.tar.gz"
          echo "✅ Website deployed to /data/www/website/"

      - name: Verify website
        if: ${{ inputs.run_website == 'true' }}
        run: |
          ssh -i ~/.ssh/deploy-key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "ls -la /data/www/website/index.html && echo '✅ website/index.html OK'"
          ssh -i ~/.ssh/deploy-key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "ls -la /data/www/website/docs/index.html && echo '✅ website/docs/index.html OK'"

      # ── Summary ─────────────────────────────────────────────────
      - name: Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║           CONTENT DEPLOY COMPLETE                         ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  Website: ${{ inputs.run_website }}"
          echo "  Docs:    ${{ inputs.run_docs }}"
          echo "  Host:    ${{ secrets.SSH_HOST }}"
          echo ""
