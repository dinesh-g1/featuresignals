name: Docs Guard

on:
  pull_request:
    paths:
      - 'server/internal/api/handlers/**'
      - 'server/internal/api/router.go'
      - 'server/internal/domain/**'

jobs:
  check-docs:
    runs-on: ubuntu-latest
    if: "!contains(github.event.pull_request.labels.*.name, 'docs-skip')"
    steps:
      - uses: actions/checkout@v4
      - name: Check for documentation changes
        id: docs-check
        run: |
          DOCS_CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- 'docs/' | wc -l)
          echo "docs_changed=$DOCS_CHANGED" >> "$GITHUB_OUTPUT"
      - name: Add docs-needed label
        if: steps.docs-check.outputs.docs_changed == '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['docs-needed']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '📝 This PR modifies API handlers or domain types but no documentation files were updated. Please review whether `docs/docs/api-reference/` or the OpenAPI spec (`docs/static/openapi/featuresignals.json`) need updating.\n\nAdd the `docs-skip` label to suppress this check.'
            });
