# CI — Build & Push Ops Portal Image to GHCR
#
# Manual workflow. Provide a commit SHA to build and push the ops-portal image.
#
# Usage:
#   gh workflow run ci-ops.yml -f sha=<commit-sha>
#
# Required secrets:
#   GHCR_TOKEN — GitHub PAT with write:packages scope

name: CI - Build Ops Portal

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA (full or short — must exist in repo)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io/dinesh-g1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ops-portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0

      - name: Resolve full SHA
        id: sha
        run: |
          FULL=$(git rev-parse "${{ inputs.sha }}" 2>/dev/null || true)
          if [ -z "$FULL" ]; then
            echo "Invalid SHA: ${{ inputs.sha }}"
            exit 1
          fi
          echo "full_sha=$FULL" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u dinesh-g1 --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push ops-portal
        uses: docker/build-push-action@v6
        with:
          context: ./ops-portal
          file: ./deploy/docker/Dockerfile.ops-portal
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/featuresignals-ops-portal:${{ steps.sha.outputs.full_sha }}

      - name: Verify
        run: |
          TAG="${{ env.REGISTRY }}/featuresignals-ops-portal:${{ steps.sha.outputs.full_sha }}"
          docker manifest inspect "$TAG" >/dev/null 2>&1 && echo "✅ $TAG" || echo "⚠️  $TAG not found"
