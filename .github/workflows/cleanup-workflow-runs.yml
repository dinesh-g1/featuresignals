name: "Cleanup Old Workflow Run Logs"

on:
  schedule:
    - cron: "0 7 1 * *"
  workflow_dispatch:
    inputs:
      keep_days:
        description: "Delete workflow runs older than N days"
        type: number
        default: 90
      dry_run:
        description: "Preview deletions without executing"
        type: boolean
        default: false

permissions:
  actions: write

jobs:
  cleanup:
    name: "Prune old workflow runs"
    runs-on: ubuntu-latest

    steps:
      - name: Delete old workflow runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const keepDays = parseInt('${{ github.event.inputs.keep_days || 90 }}');
            const dryRun = '${{ github.event.inputs.dry_run }}' === 'true';
            const cutoff = new Date(Date.now() - keepDays * 86400000);

            console.log(`Cutoff: ${cutoff.toISOString()}, dry_run: ${dryRun}`);

            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            let totalDeleted = 0;

            for (const wf of workflows.data.workflows) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: wf.id,
                per_page: 100,
              });

              for (const run of runs.data.workflow_runs) {
                const runDate = new Date(run.created_at);
                if (runDate >= cutoff) continue;

                if (dryRun) {
                  console.log(`[DRY RUN] ${wf.name} #${run.run_number} (${run.created_at})`);
                } else {
                  try {
                    await github.rest.actions.deleteWorkflowRun({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      run_id: run.id,
                    });
                    totalDeleted++;
                  } catch (e) {
                    console.log(`Failed to delete run ${run.id}: ${e.message}`);
                  }
                }
              }
            }

            console.log(`Deleted ${totalDeleted} old workflow runs`);
