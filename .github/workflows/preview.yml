# =============================================================================
# FeatureSignals — Preview Environments
# =============================================================================
# Triggers on PR comments containing "/preview" to create or update a preview
# environment. The preview is deployed as a dedicated k3s namespace with its
# own ephemeral PostgreSQL database.
#
# To create a preview:
#   Comment "/preview" on any open pull request.
#
# To delete a preview:
#   Comment "/preview delete" on the PR, or run:
#   dagger call preview-delete --pr-number=<N>
# =============================================================================

name: Preview
on:
  issue_comment:
    types: [created]

# Only one preview operation per PR at a time
concurrency:
  group: preview-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  issues: write
  pull-requests: write

jobs:
  # =========================================================================
  # Preview — create, update, or delete
  # =========================================================================
  preview:
    if: >
      github.event.issue.pull_request
      && contains(github.event.comment.body, '/preview')
    runs-on: [self-hosted, k3s]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0

      - name: Check if delete
        id: check
        run: |
          if echo "${{ github.event.comment.body }}" | grep -qi "/preview delete"; then
            echo "action=delete" >> $GITHUB_OUTPUT
          else
            echo "action=create" >> $GITHUB_OUTPUT
          fi

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v6
        with:
          version: latest
          workdir: ci/
          # cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Create Preview Environment
        if: steps.check.outputs.action == 'create'
        env:
          DAGGER_LOG_FORMAT: plain
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          dagger call preview-create \
            --source=.. \
            --pr-number=${{ github.event.issue.number }}

      - name: Delete Preview Environment
        if: steps.check.outputs.action == 'delete'
        env:
          DAGGER_LOG_FORMAT: plain
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          dagger call preview-delete \
            --pr-number=${{ github.event.issue.number }}

      - name: Preview Smoke Test
        if: steps.check.outputs.action == 'create'
        env:
          DAGGER_LOG_FORMAT: plain
        run: |
          dagger call smoke-test \
            --url=https://api.preview-${{ github.event.issue.number }}.preview.featuresignals.com

      - name: Comment Preview URL
        if: steps.check.outputs.action == 'create'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const baseUrl = `https://api.preview-${prNumber}.preview.featuresignals.com`;
            const dashUrl = `https://app.preview-${prNumber}.preview.featuresignals.com`;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## 🚀 Preview Environment Ready

| Service | URL |
|---------|-----|
| **API** | [${baseUrl}](${baseUrl}) |
| **Dashboard** | [${dashUrl}](${dashUrl}) |

### What's included:
- Ephemeral PostgreSQL database (data will be lost when preview is deleted)
- Reduced resource limits (25m CPU / 64Mi RAM per service)
- Debug logging enabled

### Managing this preview:
- Comment \`/preview delete\` on this PR to tear it down
- The preview auto-deletes when the PR is closed/merged

> ⚠️ Preview environments run on shared infrastructure and should not be used for load testing or sensitive data.
`
            });
