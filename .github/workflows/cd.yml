# CD — Deploy to K3s Cluster
#
# Triggers deployment on the self-hosted GitHub Actions runner that runs
# inside the K3s cluster. The runner was registered by cloud-init during
# initial VM provisioning.
#
# Usage:
#   gh workflow run cd.yml -f version=b57a6aa37900db1a2b8db3e640a453f83c8b4155
#
# Required secrets:
#   GHCR_TOKEN — GitHub PAT with read:packages (for image pull from GHCR)

name: CD - Deploy to K3s

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (commit SHA) to deploy. Must exist in GHCR."
        required: true
        type: string

jobs:
  deploy:
    name: Deploy ${{ inputs.version }}
    runs-on: self-hosted
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    steps:
      - name: Update GHCR pull secret
        run: |
          kubectl delete secret ghcr-pull -n featuresignals --ignore-not-found
          kubectl create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username=dinesh-g1 \
            --docker-password="${{ secrets.GHCR_TOKEN }}" \
            --namespace=featuresignals
          echo "✅ GHCR pull secret updated"

      - name: Update server deployment
        run: |
          kubectl set image deployment/server \
            -n featuresignals \
            server=ghcr.io/dinesh-g1/featuresignals-server:${{ inputs.version }}
          kubectl rollout status deployment/server -n featuresignals --timeout=120s
          echo "✅ Server updated"

      - name: Update dashboard deployment
        run: |
          kubectl set image deployment/dashboard \
            -n featuresignals \
            dashboard=ghcr.io/dinesh-g1/featuresignals-dashboard:${{ inputs.version }}
          kubectl rollout status deployment/dashboard -n featuresignals --timeout=120s
          echo "✅ Dashboard updated"

      - name: Update global-router deployment
        run: |
          kubectl set image deployment/global-router \
            -n featuresignals \
            global-router=ghcr.io/dinesh-g1/featuresignals-global-router:${{ inputs.version }}
          kubectl rollout status deployment/global-router -n featuresignals --timeout=120s
          echo "✅ Global Router updated"

      - name: Deploy website content
        run: |
          VERSION="${{ inputs.version }}"
          echo "Extracting website content for $VERSION..."
          docker run --rm \
            -v /data/www/website:/target \
            --entrypoint sh \
            ghcr.io/dinesh-g1/featuresignals-website:$VERSION \
            -c "tar xzf /content.tar.gz -C /target" 2>/dev/null || {
            echo "Content image not found — building from source..."
            cd /opt/featuresignals/website
            npm ci && npm run build
            cp -r out/* /data/www/website/
          }
          echo "✅ Website content updated"

      - name: Deploy docs content
        run: |
          VERSION="${{ inputs.version }}"
          echo "Extracting docs content for $VERSION..."
          docker run --rm \
            -v /data/www/docs:/target \
            --entrypoint sh \
            ghcr.io/dinesh-g1/featuresignals-docs:$VERSION \
            -c "tar xzf /content.tar.gz -C /target" 2>/dev/null || {
            echo "Content image not found — building from source..."
            cd /opt/featuresignals/docs
            npm ci && npm run build
            cp -r build/* /data/www/docs/
          }
          echo "✅ Docs content updated"

      - name: Smoke test — server health
        run: |
          echo "Checking server health..."
          for i in $(seq 1 15); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 http://localhost:8080/health)
            if [ "$HTTP" = "200" ]; then
              echo "✅ Server healthy (HTTP 200)"
              exit 0
            fi
            echo "  Waiting... ($i/15, HTTP $HTTP)"
            sleep 4
          done
          echo "❌ Server health check failed"
          exit 1

      - name: Smoke test — public API
        run: |
          echo "Checking https://api.featuresignals.com/health..."
          for i in $(seq 1 15); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 "https://api.featuresignals.com/health")
            if [ "$HTTP" = "200" ]; then
              echo "✅ API healthy (HTTP 200)"
              exit 0
            fi
            echo "  Waiting... ($i/15, HTTP $HTTP)"
            sleep 4
          done
          echo "❌ API health check failed"
          exit 1

      - name: Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║           DEPLOY COMPLETE                                  ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  Version: ${{ inputs.version }}"
          echo "  Cluster: featuresignals-eu-001 (Falkenstein, CPX42)"
          echo "  Pods:"
          kubectl get pods -n featuresignals -o wide
          echo ""
          echo "  https://api.featuresignals.com/health"
          echo "  https://app.featuresignals.com"
