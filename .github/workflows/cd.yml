# CD — Deploy to K3s Cluster
#
# Runs on the self-hosted GitHub Actions runner inside the K3s cluster.
# The runner user has kubectl configured at ~/.kube/config (set up by cloud-init).
#
# Usage:
#   gh workflow run cd.yml -f version=<full-commit-sha>
#
# Required secrets:
#   GHCR_TOKEN — GitHub PAT with read:packages

name: CD - Deploy to K3s

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (commit SHA) to deploy. Must exist in GHCR."
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NS: featuresignals
  REGISTRY: ghcr.io/dinesh-g1

jobs:
  deploy:
    name: Deploy
    runs-on: [self-hosted, Linux, X64]
    env:
      KUBECONFIG: /home/runner/.kube/config
      PATH: /usr/local/bin:/usr/local/sbin:/usr/bin:/bin
    steps:
      # ── Auth ────────────────────────────────────────────────────
      - name: Update GHCR pull secret
        run: |
          kubectl delete secret ghcr-pull -n ${{ env.NS }} --ignore-not-found
          kubectl create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username=dinesh-g1 \
            --docker-password="${{ secrets.GHCR_TOKEN }}" \
            --namespace=${{ env.NS }}
          echo "✅ GHCR pull secret updated"

      # ── Server ──────────────────────────────────────────────────
      - name: Update server
        run: |
          kubectl set image deployment/server \
            -n ${{ env.NS }} \
            server=${{ env.REGISTRY }}/featuresignals-server:${{ inputs.version }}
          kubectl rollout status deployment/server -n ${{ env.NS }} --timeout=120s
          echo "✅ Server updated"

      # ── Dashboard ───────────────────────────────────────────────
      - name: Update dashboard
        run: |
          kubectl set image deployment/dashboard \
            -n ${{ env.NS }} \
            dashboard=${{ env.REGISTRY }}/featuresignals-dashboard:${{ inputs.version }}
          kubectl rollout status deployment/dashboard -n ${{ env.NS }} --timeout=120s
          echo "✅ Dashboard updated"

      # ── Global Router ───────────────────────────────────────────
      - name: Update global-router
        run: |
          kubectl set image deployment/global-router \
            -n ${{ env.NS }} \
            global-router=${{ env.REGISTRY }}/featuresignals-global-router:${{ inputs.version }}
          kubectl rollout status deployment/global-router -n ${{ env.NS }} --timeout=120s
          echo "✅ Global Router updated"

      # ── Smoke Tests ─────────────────────────────────────────────
      - name: Smoke test — all pods running
        run: |
          for dep in server dashboard global-router; do
            kubectl wait --for=condition=Available deployment/$dep -n ${{ env.NS }} --timeout=120s
            echo "✅ $dep deployment available"
          done

      # ── Summary ─────────────────────────────────────────────────
      - name: Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║           DEPLOY COMPLETE                                  ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  Version: ${{ inputs.version }}"
          kubectl get pods -n ${{ env.NS }} -o wide
          echo ""
