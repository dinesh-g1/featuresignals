# CD — Deploy to Cell
#
# Manual trigger. Connects to the cell VPS via the CELL_SSH_KEY (stored
# during bootstrap), pulls the specified image versions from GHCR, and
# restarts the stack with zero downtime.
#
# Usage:
#   gh workflow run cd.yml -f version=v1.0.0
#
# Required secrets:
#   GHCR_TOKEN   — GitHub PAT with read:packages
#   CELL_SSH_KEY — Base64-encoded SSH private key (stored by bootstrap)

name: CD - Deploy to Cell

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version to deploy (must already exist in GHCR)"
        required: true
        type: string

env:
  CELL_IP: 46.224.31.37
  CELL_NAME: prod-eu-001
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  deploy:
    name: Deploy ${{ inputs.version }} to ${{ env.CELL_NAME }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p /root/.ssh /tmp/ssh-key
          gh variable get CELL_SSH_KEY --repo ${{ github.repository }} 2>/dev/null \
            | base64 -d > /tmp/ssh-key/deploy-key
          chmod 600 /tmp/ssh-key/deploy-key
          echo "✅ SSH key installed from CELL_SSH_KEY variable"

      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for SSH on ${{ env.CELL_IP }}..."
          for i in $(seq 1 15); do
            if ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=5 -i /tmp/ssh-key/deploy-key \
              "root@${{ env.CELL_IP }}" "echo ready" >/dev/null 2>&1; then
              echo "✅ SSH ready after ${i}s"
              exit 0
            fi
            echo "  Waiting... ($i/15)"
            sleep 5
          done
          echo "❌ SSH not ready after 75s"
          exit 1

      - name: Deploy application
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i /tmp/ssh-key/deploy-key "root@${{ env.CELL_IP }}" \
            "GHCR_TOKEN=$GHCR_TOKEN FEATURESIGNALS_VERSION=${{ inputs.version }}" bash -s << 'REMOTE'
            set -eux

            # Log in to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u dinesh-g1 --password-stdin

            # Pull new images
            docker pull ghcr.io/dinesh-g1/featuresignals-server:$FEATURESIGNALS_VERSION
            docker pull ghcr.io/dinesh-g1/featuresignals-dashboard:$FEATURESIGNALS_VERSION

            # Update and restart stack
            cd /opt/featuresignals
            export FEATURESIGNALS_VERSION
            docker compose up -d

            # Wait for health
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
                echo "✅ Stack is healthy"
                exit 0
              fi
              sleep 2
            done
            echo "❌ Stack did not become healthy"
            exit 1
          REMOTE

      - name: Smoke test via public API
        run: |
          echo "Checking https://api.featuresignals.com/health..."
          for i in $(seq 1 15); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 "https://api.featuresignals.com/health")
            if [ "$HTTP" = "200" ]; then
              echo "✅ API healthy (HTTP 200)"
              exit 0
            fi
            echo "  Waiting... ($i/15, HTTP $HTTP)"
            sleep 4
          done
          echo "❌ API health check failed"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -rf /tmp/ssh-key
