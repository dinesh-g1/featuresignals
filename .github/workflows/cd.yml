# CD — Deploy to K3s Cluster
#
# Runs on the self-hosted GitHub Actions runner inside the K3s cluster.
# The runner user has kubectl configured at ~/.kube/config (set up by cloud-init).
#
# Usage:
#   gh workflow run cd.yml -f version=<full-commit-sha>
#
# Required secrets:
#   GHCR_TOKEN — GitHub PAT with read:packages

name: CD - Deploy to K3s

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (commit SHA) to deploy. Must exist in GHCR."
        required: true
        type: string

env:
  NS: featuresignals
  REGISTRY: ghcr.io/dinesh-g1

jobs:
  deploy:
    name: Deploy
    runs-on: [self-hosted, Linux, X64]
    env:
      KUBECONFIG: /home/runner/.kube/config
      PATH: /usr/local/bin:/usr/local/sbin:/usr/bin:/bin
    steps:
      # ── Auth ────────────────────────────────────────────────────
      - name: Update GHCR pull secret
        run: |
          kubectl delete secret ghcr-pull -n ${{ env.NS }} --ignore-not-found
          kubectl create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username=dinesh-g1 \
            --docker-password="${{ secrets.GHCR_TOKEN }}" \
            --namespace=${{ env.NS }}
          echo "✅ GHCR pull secret updated"

      # ── Server ──────────────────────────────────────────────────
      - name: Update server
        run: |
          kubectl set image deployment/server \
            -n ${{ env.NS }} \
            server=${{ env.REGISTRY }}/featuresignals-server:${{ inputs.version }}
          kubectl rollout status deployment/server -n ${{ env.NS }} --timeout=120s
          echo "✅ Server updated"

      # ── Dashboard ───────────────────────────────────────────────
      - name: Update dashboard
        run: |
          kubectl set image deployment/dashboard \
            -n ${{ env.NS }} \
            dashboard=${{ env.REGISTRY }}/featuresignals-dashboard:${{ inputs.version }}
          kubectl rollout status deployment/dashboard -n ${{ env.NS }} --timeout=120s
          echo "✅ Dashboard updated"

      # ── Global Router ───────────────────────────────────────────
      - name: Update global-router
        run: |
          kubectl set image deployment/global-router \
            -n ${{ env.NS }} \
            global-router=${{ env.REGISTRY }}/featuresignals-global-router:${{ inputs.version }}
          kubectl rollout status deployment/global-router -n ${{ env.NS }} --timeout=120s
          echo "✅ Global Router updated"

      # ── Website Content ─────────────────────────────────────────
      - name: Deploy website content
        run: |
          mkdir -p /data/www/website
          # Clear old content with permission handling (files may be owned by different user)
          find /data/www/website -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf /data/www/website/* 2>/dev/null || true
          # Try content image first, fall back to source build
          if docker run --rm -v /data/www/website:/target --entrypoint sh \
            ${{ env.REGISTRY }}/featuresignals-website:${{ inputs.version }} \
            -c "tar xzf /content.tar.gz -C /target" 2>/dev/null; then
            echo "✅ Website content updated from image"
          else
            echo "Building website from source..."
            cd /opt/featuresignals/website
            npm ci --no-optional 2>/dev/null
            npm run build 2>/dev/null
            cp -r out/* /data/www/website/ 2>/dev/null || true
            echo "✅ Website content built from source"
          fi

      # ── Docs Content ────────────────────────────────────────────
      - name: Deploy docs content
        run: |
          mkdir -p /data/www/docs
          find /data/www/docs -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf /data/www/docs/* 2>/dev/null || true
          if docker run --rm -v /data/www/docs:/target --entrypoint sh \
            ${{ env.REGISTRY }}/featuresignals-docs:${{ inputs.version }} \
            -c "tar xzf /content.tar.gz -C /target" 2>/dev/null; then
            echo "✅ Docs content updated from image"
          else
            echo "Building docs from source..."
            cd /opt/featuresignals/docs
            npm ci --no-optional 2>/dev/null
            npm run build 2>/dev/null
            cp -r build/* /data/www/docs/ 2>/dev/null || true
            echo "✅ Docs content built from source"
          fi

      # ── Smoke Tests ─────────────────────────────────────────────
      - name: Smoke test — internal server health
        run: |
          for i in $(seq 1 15); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8080/health)
            if [ "$HTTP" = "200" ]; then
              echo "✅ Server healthy (HTTP 200)"
              exit 0
            fi
            sleep 4
          done
          echo "❌ Server health check failed"
          exit 1

      - name: Smoke test — public API via router
        run: |
          for i in $(seq 1 15); do
            HTTP=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 5 "https://api.featuresignals.com/health")
            if [ "$HTTP" = "200" ]; then
              echo "✅ API healthy (HTTP 200)"
              exit 0
            fi
            sleep 4
          done
          echo "❌ API health check failed"
          exit 1

      - name: Smoke test — website and docs
        run: |
          for url in "https://featuresignals.com" "https://docs.featuresignals.com"; do
            HTTP=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 5 "$url")
            if [ "$HTTP" = "200" ]; then
              echo "✅ $url (HTTP 200)"
            else
              echo "⚠️  $url returned $HTTP"
            fi
          done

      # ── Summary ─────────────────────────────────────────────────
      - name: Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║           DEPLOY COMPLETE                                  ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  Version: ${{ inputs.version }}"
          kubectl get pods -n ${{ env.NS }} -o wide
          echo ""
