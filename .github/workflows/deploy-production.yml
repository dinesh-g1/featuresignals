name: "Deploy to Production Regions"

on:
  workflow_dispatch:
    inputs:
      regions:
        description: "Comma-separated regions to deploy (in,us,eu)"
        required: false
        default: "in,us,eu"
      image_tag:
        description: "Image tag to deploy (sha-xxx, v1.2.3, or latest)"
        required: false
        default: "latest"
      rollback_commit:
        description: "Git commit SHA to rollback to (leave empty for normal deploy)"
        required: false
        default: ""
      skip_canary_soak:
        description: "Skip the 60s canary soak period after IN deploy"
        type: boolean
        default: false
      build_locally:
        description: "Build images on the VPS instead of pulling from GHCR"
        type: boolean
        default: false

permissions:
  statuses: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Sequential rolling deploy: IN (canary) -> US -> EU.
  # fail-fast + max-parallel=1 ensures a failed canary halts the pipeline.
  deploy:
    name: "Deploy ${{ matrix.region }} region"
    runs-on: ubuntu-latest
    environment: production

    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        region: [in, us, eu]
        include:
          - region: in
            host_secret: VPS_HOST_IN
            domain_api: api.featuresignals.com
            domain_app: app.featuresignals.com
            domain_main: featuresignals.com
            domain_docs: docs.featuresignals.com
            payment_gateway: payu
          - region: us
            host_secret: VPS_HOST_US
            domain_api: api.us.featuresignals.com
            domain_app: app.us.featuresignals.com
            payment_gateway: stripe
          - region: eu
            host_secret: VPS_HOST_EU
            domain_api: api.eu.featuresignals.com
            domain_app: app.eu.featuresignals.com
            payment_gateway: stripe

    steps:
      - name: Check if region should deploy
        id: check
        run: |
          REGIONS="${{ github.event.inputs.regions }}"
          if echo "$REGIONS" | grep -q "${{ matrix.region }}"; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Write environment file
        if: steps.check.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_REGIONAL }}
          envs: REGION,DOMAIN_API,DOMAIN_APP,DOMAIN_MAIN,DOMAIN_DOCS,POSTGRES_PASSWORD,JWT_SECRET,DB_ADMIN_PASSWORD,DB_READONLY_PASSWORD,ZEPTOMAIL_TOKEN,OTEL_INGESTION_KEY,LOCAL_REGION,PAYMENT_GATEWAY,PAYU_MERCHANT_KEY,PAYU_SALT,PAYU_MODE,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRICE_ID,STRIPE_MODE,IMAGE_TAG,USE_REGISTRY
          script: |
            cat > /opt/featuresignals/.env << ENVEOF
            REGION=${{ matrix.region }}
            DOMAIN_API=${{ matrix.domain_api }}
            DOMAIN_APP=${{ matrix.domain_app }}
            ${{ matrix.domain_main && format('DOMAIN_MAIN={0}', matrix.domain_main) || '' }}
            ${{ matrix.domain_docs && format('DOMAIN_DOCS={0}', matrix.domain_docs) || '' }}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            DB_ADMIN_PASSWORD=${DB_ADMIN_PASSWORD}
            DB_READONLY_PASSWORD=${DB_READONLY_PASSWORD}
            ZEPTOMAIL_TOKEN=${ZEPTOMAIL_TOKEN}
            OTEL_ENABLED=true
            OTEL_EXPORTER_OTLP_ENDPOINT=ingest.us2.signoz.cloud:443
            OTEL_INGESTION_KEY=${OTEL_INGESTION_KEY}
            OTEL_SERVICE_NAME=featuresignals-api
            OTEL_SERVICE_REGION=${{ matrix.region }}
            OTEL_TRACES_ENABLED=true
            OTEL_METRICS_ENABLED=true
            OTEL_LOGS_ENABLED=false
            OTEL_LOG_LEVEL=warn
            OTEL_TRACE_SAMPLE_RATE=0.1
            LOCAL_REGION=${LOCAL_REGION}
            PAYMENT_GATEWAY=${{ matrix.payment_gateway }}
            PAYU_MERCHANT_KEY=${PAYU_MERCHANT_KEY}
            PAYU_SALT=${PAYU_SALT}
            PAYU_MODE=${PAYU_MODE}
            STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
            STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
            STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
            STRIPE_MODE=${STRIPE_MODE}
            IMAGE_TAG=${IMAGE_TAG}
            USE_REGISTRY=${USE_REGISTRY}
            ENVEOF
            chmod 600 /opt/featuresignals/.env
        env:
          POSTGRES_PASSWORD: ${{ secrets[format('POSTGRES_PASSWORD_{0}', matrix.region)] || secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_ADMIN_PASSWORD: ${{ secrets.DB_ADMIN_PASSWORD }}
          DB_READONLY_PASSWORD: ${{ secrets.DB_READONLY_PASSWORD }}
          ZEPTOMAIL_TOKEN: ${{ secrets.ZEPTOMAIL_TOKEN }}
          OTEL_INGESTION_KEY: ${{ secrets.OTEL_INGESTION_KEY }}
          LOCAL_REGION: ${{ matrix.region }}
          PAYU_MERCHANT_KEY: ${{ secrets.PAYU_MERCHANT_KEY }}
          PAYU_SALT: ${{ secrets.PAYU_SALT }}
          PAYU_MODE: ${{ secrets.PAYU_MODE }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
          STRIPE_MODE: ${{ secrets.STRIPE_MODE }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          USE_REGISTRY: ${{ github.event.inputs.build_locally == 'true' && 'false' || 'true' }}

      - name: Pre-deploy database backup
        if: steps.check.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_REGIONAL }}
          script: |
            cd /opt/featuresignals
            if docker compose --project-directory . -f deploy/docker-compose.region.yml ps -q postgres 2>/dev/null | grep -q .; then
              bash deploy/pg-backup.sh || echo "Backup skipped"
            else
              echo "Postgres not running, skipping backup"
            fi

      - name: Deploy application
        if: steps.check.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_REGIONAL }}
          command_timeout: 15m
          envs: REPO_TOKEN,ROLLBACK_COMMIT,IMAGE_TAG,USE_REGISTRY
          script: |
            cd /opt/featuresignals
            git remote set-url origin "https://x-access-token:${REPO_TOKEN}@github.com/dinesh-g1/featuresignals.git"
            git fetch origin main
            git reset --hard origin/main
            export ROLLBACK_COMMIT="${ROLLBACK_COMMIT}"
            export IMAGE_TAG="${IMAGE_TAG}"
            export USE_REGISTRY="${USE_REGISTRY}"
            bash deploy/deploy-region.sh
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          ROLLBACK_COMMIT: ${{ github.event.inputs.rollback_commit }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          USE_REGISTRY: ${{ github.event.inputs.build_locally == 'true' && 'false' || 'true' }}

      - name: Verify deployment health
        if: steps.check.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_REGIONAL }}
          script: |
            echo "Waiting for services to stabilize..."
            sleep 15

            echo "==> Service status (${{ matrix.region }}):"
            cd /opt/featuresignals
            docker compose --project-directory . -f deploy/docker-compose.region.yml ps

            echo ""
            echo "==> Health check: API"
            curl -sf --max-time 10 https://${{ matrix.domain_api }}/health || echo "WARNING: API health check failed"

            echo ""
            echo "==> Health check: Dashboard"
            curl -sf --max-time 10 -o /dev/null -w "HTTP %{http_code}" https://${{ matrix.domain_app }} || echo "WARNING: Dashboard health check failed"

            echo ""
            echo "Deployment verified for ${{ matrix.region }}"

      - name: Canary soak period
        if: steps.check.outputs.deploy == 'true' && matrix.region == 'in' && !inputs.skip_canary_soak
        run: |
          echo "Canary soak: waiting 60s before proceeding to next region..."
          sleep 60
          echo "Verifying canary health..."
          curl -sf --max-time 10 https://${{ matrix.domain_api }}/health || {
            echo "::error::Canary health check failed after soak period"
            exit 1
          }
          echo "Canary healthy — proceeding to remaining regions"

  notify:
    name: "Post-Deploy Notification"
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Set deploy status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "state=success" >> $GITHUB_OUTPUT
            echo "description=Production deploy succeeded" >> $GITHUB_OUTPUT
          else
            echo "state=failure" >> $GITHUB_OUTPUT
            echo "description=Production deploy failed" >> $GITHUB_OUTPUT
          fi

      - name: Create commit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ steps.status.outputs.state }}',
              description: '${{ steps.status.outputs.description }}',
              context: 'deploy/production'
            });

      - name: Post deploy summary
        run: |
          echo "## Production Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Result** | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Regions** | ${{ github.event.inputs.regions || 'in,us,eu' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | ${{ github.event.inputs.image_tag || 'latest' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Rollback** | ${{ github.event.inputs.rollback_commit || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
