name: "Test, Lint, Build & Publish Images"

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_sdk_tests:
        description: "Skip SDK tests (faster feedback for server/dashboard-only changes)"
        type: boolean
        default: false
      skip_security_scan:
        description: "Skip dependency security scan"
        type: boolean
        default: false
      force_push_images:
        description: "Push images even on non-main branches (for testing)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  # ── Change Detection ─────────────────────────────────────────────────────
  # On pull_request: detect which areas changed so downstream jobs can skip.
  # On push/dispatch: steps are skipped, outputs stay empty, and every
  # downstream job's condition falls through to "run everything".
  detect-changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      website: ${{ steps.filter.outputs.website }}
      docs: ${{ steps.filter.outputs.docs }}
      sdk-go: ${{ steps.filter.outputs.sdk-go }}
      sdk-node: ${{ steps.filter.outputs.sdk-node }}
      sdk-python: ${{ steps.filter.outputs.sdk-python }}
      sdk-java: ${{ steps.filter.outputs.sdk-java }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Detect changed paths
        id: filter
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --paginate -q '.[].filename')

          has_match() { echo "$FILES" | grep -qE "$1" && echo "true" || echo "false"; }

          SERVER=$(has_match '^server/')
          DASHBOARD=$(has_match '^dashboard/')
          WEBSITE=$(has_match '^website/')
          DOCS=$(has_match '^docs/')
          SDK_GO=$(has_match '^sdks/go/')
          SDK_NODE=$(has_match '^sdks/node/')
          SDK_PYTHON=$(has_match '^sdks/python/')
          SDK_JAVA=$(has_match '^sdks/java/')
          DEPLOY=$(has_match '^deploy/')

          {
            echo "server=$SERVER"
            echo "dashboard=$DASHBOARD"
            echo "website=$WEBSITE"
            echo "docs=$DOCS"
            echo "sdk-go=$SDK_GO"
            echo "sdk-node=$SDK_NODE"
            echo "sdk-python=$SDK_PYTHON"
            echo "sdk-java=$SDK_JAVA"
            echo "deploy=$DEPLOY"
          } >> "$GITHUB_OUTPUT"

          echo "### Detected Changes" >> "$GITHUB_STEP_SUMMARY"
          echo "| Area | Changed |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|" >> "$GITHUB_STEP_SUMMARY"
          for pair in "Server:$SERVER" "Dashboard:$DASHBOARD" "Website:$WEBSITE" "Docs:$DOCS" \
                      "SDK Go:$SDK_GO" "SDK Node:$SDK_NODE" "SDK Python:$SDK_PYTHON" \
                      "SDK Java:$SDK_JAVA" "Deploy:$DEPLOY"; do
            name="${pair%%:*}"
            val="${pair#*:}"
            echo "| $name | $val |" >> "$GITHUB_STEP_SUMMARY"
          done

  # ── Server ─────────────────────────────────────────────────────────────────
  server-tests:
    name: "Server: Test & Coverage"
    needs: detect-changes
    if: >-
      github.event_name != 'pull_request'
      || needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fs
          POSTGRES_PASSWORD: fsdev
          POSTGRES_DB: featuresignals
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache-dependency-path: server/go.sum
      - name: Run migrations (test setup)
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path server/internal/migrate/migrations -database "postgres://fs:fsdev@localhost:5432/featuresignals?sslmode=disable" up
      - name: Run tests with coverage
        working-directory: server
        run: go test ./... -count=1 -timeout 120s -v -coverprofile=coverage.out -covermode=atomic
        env:
          TEST_DATABASE_URL: postgres://fs:fsdev@localhost:5432/featuresignals?sslmode=disable
      - name: Print coverage summary
        working-directory: server
        run: |
          echo "=== Server Test Coverage ==="
          go tool cover -func=coverage.out | tail -1
          echo ""
          go tool cover -func=coverage.out
      - name: Build binaries
        working-directory: server
        run: |
          go build -o bin/server ./cmd/server
          go build -o bin/stalescan ./cmd/stalescan

  server-lint:
    name: "Server: Lint & Vet"
    needs: detect-changes
    if: >-
      github.event_name != 'pull_request'
      || needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache-dependency-path: server/go.sum
      - name: Vet
        working-directory: server
        run: go vet ./...

  # ── Dashboard ──────────────────────────────────────────────────────────────
  dashboard-tests:
    name: "Dashboard: Test, Build & Coverage"
    needs: detect-changes
    if: >-
      github.event_name != 'pull_request'
      || needs.detect-changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install
        working-directory: dashboard
        run: npm ci
      - name: Test with coverage
        working-directory: dashboard
        run: npm run test:coverage
      - name: Build
        working-directory: dashboard
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ── Documentation ──────────────────────────────────────────────────────────
  docs-build:
    name: "Docs: Build Verification"
    needs: detect-changes
    if: >-
      github.event_name != 'pull_request'
      || needs.detect-changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install & Build
        working-directory: docs
        run: npm install && npm run build

  # ── SDK Tests ──────────────────────────────────────────────────────────────
  go-sdk-tests:
    name: "SDK: Go Tests"
    needs: detect-changes
    if: >-
      !inputs.skip_sdk_tests
      && (
        github.event_name != 'pull_request'
        || needs.detect-changes.outputs.sdk-go == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache-dependency-path: sdks/go/go.sum
      - name: Test with coverage
        working-directory: sdks/go
        run: |
          go test ./... -count=1 -v -coverprofile=coverage.out -covermode=atomic
          echo "=== Go SDK Coverage ==="
          go tool cover -func=coverage.out | tail -1
      - name: Build
        working-directory: sdks/go
        run: go build ./...

  node-sdk-tests:
    name: "SDK: Node.js Tests"
    needs: detect-changes
    if: >-
      !inputs.skip_sdk_tests
      && (
        github.event_name != 'pull_request'
        || needs.detect-changes.outputs.sdk-node == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install & Test
        working-directory: sdks/node
        run: |
          npm install
          node --test --experimental-strip-types --experimental-test-coverage src/__tests__/client.test.ts

  python-sdk-tests:
    name: "SDK: Python Tests"
    needs: detect-changes
    if: >-
      !inputs.skip_sdk_tests
      && (
        github.event_name != 'pull_request'
        || needs.detect-changes.outputs.sdk-python == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install & Test
        working-directory: sdks/python
        run: |
          pip install -e ".[dev]" pytest-cov
          python -m pytest tests/ -v --cov=featuresignals --cov-report=term-missing

  java-sdk-tests:
    name: "SDK: Java Tests"
    needs: detect-changes
    if: >-
      !inputs.skip_sdk_tests
      && (
        github.event_name != 'pull_request'
        || needs.detect-changes.outputs.sdk-java == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          cache: maven
      - name: Test
        working-directory: sdks/java
        run: mvn -B test

  # ── Security ───────────────────────────────────────────────────────────────
  security-scan:
    name: "Security: Dependency Vulnerability Scan"
    needs: detect-changes
    if: >-
      !inputs.skip_security_scan
      && (
        github.event_name != 'pull_request'
        || needs.detect-changes.outputs.server == 'true'
        || needs.detect-changes.outputs.dashboard == 'true'
        || needs.detect-changes.outputs.docs == 'true'
        || needs.detect-changes.outputs.sdk-go == 'true'
        || needs.detect-changes.outputs.sdk-node == 'true'
        || needs.detect-changes.outputs.sdk-python == 'true'
        || needs.detect-changes.outputs.sdk-java == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        if: >-
          github.event_name != 'pull_request'
          || needs.detect-changes.outputs.server == 'true'
          || needs.detect-changes.outputs.sdk-go == 'true'
        with:
          go-version: "1.25.9"
          cache-dependency-path: server/go.sum
      - uses: actions/setup-node@v5
        if: >-
          github.event_name != 'pull_request'
          || needs.detect-changes.outputs.dashboard == 'true'
          || needs.detect-changes.outputs.docs == 'true'
          || needs.detect-changes.outputs.sdk-node == 'true'
        with:
          node-version: "22"
      - name: Go vulnerability check (server)
        if: github.event_name != 'pull_request' || needs.detect-changes.outputs.server == 'true'
        working-directory: server
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Go vulnerability check (Go SDK)
        if: github.event_name != 'pull_request' || needs.detect-changes.outputs.sdk-go == 'true'
        working-directory: sdks/go
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: npm audit (dashboard)
        if: github.event_name != 'pull_request' || needs.detect-changes.outputs.dashboard == 'true'
        working-directory: dashboard
        run: npm install && npm audit --audit-level=high
      - name: npm audit (docs)
        if: github.event_name != 'pull_request' || needs.detect-changes.outputs.docs == 'true'
        working-directory: docs
        run: npm install && npm audit --audit-level=high
      - name: npm audit (website)
        if: github.event_name != 'pull_request'
        working-directory: website
        run: npm install && npm audit --audit-level=high
      - name: npm audit (Node SDK)
        if: github.event_name != 'pull_request' || needs.detect-changes.outputs.sdk-node == 'true'
        working-directory: sdks/node
        run: npm install && npm audit --audit-level=high
      - name: npm audit (React SDK)
        if: github.event_name != 'pull_request'
        working-directory: sdks/react
        run: npm install && npm audit --audit-level=high
      - name: npm audit (Vue SDK)
        if: github.event_name != 'pull_request'
        working-directory: sdks/vue
        run: npm install && npm audit --audit-level=high

  # ── CI Gate ────────────────────────────────────────────────────────────────
  # Single required check for branch protection. Aggregates all job results:
  # "skipped" (no relevant changes) is treated as success; only "failure" or
  # "cancelled" blocks the PR.
  ci-gate:
    name: "CI Gate"
    if: always()
    needs:
      - server-tests
      - server-lint
      - dashboard-tests
      - docs-build
      - go-sdk-tests
      - node-sdk-tests
      - python-sdk-tests
      - java-sdk-tests
      - security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          echo "### CI Gate Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server: Test & Coverage | ${{ needs.server-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server: Lint & Vet | ${{ needs.server-lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dashboard: Test & Build | ${{ needs.dashboard-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docs: Build | ${{ needs.docs-build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SDK: Go | ${{ needs.go-sdk-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SDK: Node.js | ${{ needs.node-sdk-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SDK: Python | ${{ needs.python-sdk-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SDK: Java | ${{ needs.java-sdk-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
      - name: Fail on any failure or cancellation
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "::error::One or more CI jobs failed or were cancelled"
          exit 1

  # ── Docker Images ──────────────────────────────────────────────────────────
  build-and-publish-images:
    name: "Docker: Build & Publish to GHCR"
    needs: [detect-changes, server-tests, dashboard-tests]
    if: >-
      always()
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
      && (
        github.event_name != 'pull_request'
        || needs.detect-changes.outputs.server == 'true'
        || needs.detect-changes.outputs.dashboard == 'true'
        || needs.detect-changes.outputs.website == 'true'
        || needs.detect-changes.outputs.docs == 'true'
        || needs.detect-changes.outputs.deploy == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compute image tags
        id: tags
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT

          OWNER="${{ github.repository_owner }}"
          SERVER_TAGS="ghcr.io/${OWNER}/featuresignals-server:sha-${SHA_SHORT}"
          DASH_TAGS="ghcr.io/${OWNER}/featuresignals-dashboard:sha-${SHA_SHORT}"
          WEBSITE_TAGS="ghcr.io/${OWNER}/featuresignals-website:sha-${SHA_SHORT}"
          DOCS_TAGS="ghcr.io/${OWNER}/featuresignals-docs:sha-${SHA_SHORT}"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            SERVER_TAGS="${SERVER_TAGS}
          ghcr.io/${OWNER}/featuresignals-server:latest"
            DASH_TAGS="${DASH_TAGS}
          ghcr.io/${OWNER}/featuresignals-dashboard:latest"
            WEBSITE_TAGS="${WEBSITE_TAGS}
          ghcr.io/${OWNER}/featuresignals-website:latest"
            DOCS_TAGS="${DOCS_TAGS}
          ghcr.io/${OWNER}/featuresignals-docs:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            SERVER_TAGS="${SERVER_TAGS}
          ghcr.io/${OWNER}/featuresignals-server:${VERSION}"
            DASH_TAGS="${DASH_TAGS}
          ghcr.io/${OWNER}/featuresignals-dashboard:${VERSION}"
            WEBSITE_TAGS="${WEBSITE_TAGS}
          ghcr.io/${OWNER}/featuresignals-website:${VERSION}"
            DOCS_TAGS="${DOCS_TAGS}
          ghcr.io/${OWNER}/featuresignals-docs:${VERSION}"
          fi

          {
            echo "server_tags<<TAGS_EOF"
            echo "$SERVER_TAGS"
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "dashboard_tags<<TAGS_EOF"
            echo "$DASH_TAGS"
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "website_tags<<TAGS_EOF"
            echo "$WEBSITE_TAGS"
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "docs_tags<<TAGS_EOF"
            echo "$DOCS_TAGS"
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT

          SHOULD_PUSH="false"
          if [ "${{ github.event_name }}" = "push" ]; then
            SHOULD_PUSH="true"
          fi
          if [ "${{ inputs.force_push_images }}" = "true" ]; then
            SHOULD_PUSH="true"
          fi
          echo "should_push=$SHOULD_PUSH" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.tags.outputs.should_push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        if: github.event_name != 'pull_request' || needs.detect-changes.outputs.server == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: deploy/docker/Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.tags.outputs.should_push == 'true' }}
          tags: ${{ steps.tags.outputs.server_tags }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build & push dashboard image
        if: github.event_name != 'pull_request' || needs.detect-changes.outputs.dashboard == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: deploy/docker/Dockerfile.dashboard
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.tags.outputs.should_push == 'true' }}
          tags: ${{ steps.tags.outputs.dashboard_tags }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

      - name: Build & push website image
        if: github.event_name != 'pull_request' || needs.detect-changes.outputs.website == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: deploy/docker/Dockerfile.website
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.tags.outputs.should_push == 'true' }}
          tags: ${{ steps.tags.outputs.website_tags }}
          cache-from: type=gha,scope=website
          cache-to: type=gha,mode=max,scope=website

      - name: Build & push docs image
        if: github.event_name != 'pull_request' || needs.detect-changes.outputs.docs == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./docs
          file: deploy/docker/Dockerfile.docs
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.tags.outputs.should_push == 'true' }}
          tags: ${{ steps.tags.outputs.docs_tags }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs

      - name: Post build summary
        run: |
          echo "## Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "**Pushed:** ${{ steps.tags.outputs.should_push }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Server" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tags.outputs.server_tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "### Dashboard" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tags.outputs.dashboard_tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "### Website" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tags.outputs.website_tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "### Docs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tags.outputs.docs_tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
