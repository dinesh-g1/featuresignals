# Parameterized regional deployment template.
#
# Primary region (IN):
#   Runs the full stack: Postgres, API, Dashboard, Website, Docs, Caddy.
#   Requires: REGION, DOMAIN_API, DOMAIN_APP, DOMAIN_MAIN, DOMAIN_DOCS
#   Deploy with: docker compose --profile full -f docker-compose.region.yml up -d
#
# Satellite regions (US, EU, dev):
#   Runs API + Dashboard only: Postgres, API, Dashboard, Caddy.
#   Requires: REGION, DOMAIN_API, DOMAIN_APP
#   Deploy with: docker compose -f docker-compose.region.yml up -d
#
# The deploy-region.sh script handles profile selection automatically
# based on whether DOMAIN_MAIN is set in the .env file.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: featuresignals
      POSTGRES_USER: fs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_ADMIN_PASSWORD: ${DB_ADMIN_PASSWORD:-}
      DB_READONLY_PASSWORD: ${DB_READONLY_PASSWORD:-}
    volumes:
      - /mnt/data/pgdata:/var/lib/postgresql/data
      - ./deploy/pg-init:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fs -d featuresignals"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://fs:${POSTGRES_PASSWORD}@postgres:5432/featuresignals?sslmode=disable",
        "up",
      ]

  server:
    image: ghcr.io/dinesh-g1/featuresignals-server:${IMAGE_TAG:-latest}
    build:
      context: ./server
      dockerfile: ../deploy/docker/Dockerfile.server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://fs:${POSTGRES_PASSWORD}@postgres:5432/featuresignals?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEPLOYMENT_MODE: cloud
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-zeptomail}
      ZEPTOMAIL_TOKEN: ${ZEPTOMAIL_TOKEN:-}
      ZEPTOMAIL_FROM_EMAIL: ${ZEPTOMAIL_FROM_EMAIL:-noreply@featuresignals.com}
      ZEPTOMAIL_FROM_NAME: ${ZEPTOMAIL_FROM_NAME:-FeatureSignals}
      ZEPTOMAIL_BASE_URL: ${ZEPTOMAIL_BASE_URL:-https://api.zeptomail.in}
      APP_BASE_URL: https://${DOMAIN_API}
      DASHBOARD_URL: https://${DOMAIN_APP}
      LOCAL_REGION: ${REGION:-in}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-ingest.us2.signoz.cloud:443}
      OTEL_INGESTION_KEY: ${OTEL_INGESTION_KEY:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-featuresignals-api}
      OTEL_SERVICE_REGION: ${REGION:-us}
      OTEL_TRACES_ENABLED: ${OTEL_TRACES_ENABLED:-true}
      OTEL_METRICS_ENABLED: ${OTEL_METRICS_ENABLED:-true}
      OTEL_LOGS_ENABLED: ${OTEL_LOGS_ENABLED:-false}
      OTEL_LOG_LEVEL: ${OTEL_LOG_LEVEL:-warn}
      OTEL_TRACE_SAMPLE_RATE: ${OTEL_TRACE_SAMPLE_RATE:-0.1}
      PAYMENT_GATEWAY: ${PAYMENT_GATEWAY:-stripe}
      PAYU_MERCHANT_KEY: ${PAYU_MERCHANT_KEY:-}
      PAYU_SALT: ${PAYU_SALT:-}
      PAYU_MODE: ${PAYU_MODE:-test}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      STRIPE_MODE: ${STRIPE_MODE:-test}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  dashboard:
    image: ghcr.io/dinesh-g1/featuresignals-dashboard:${IMAGE_TAG:-latest}
    build:
      context: ./dashboard
      dockerfile: ../deploy/docker/Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN_API}
        NEXT_PUBLIC_APP_URL: https://${DOMAIN_APP}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: https://${DOMAIN_API}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>{process.exit(r.ok||r.status===308?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Primary region only — activated via --profile full
  website-build:
    profiles: ["full"]
    build:
      context: ./website
      dockerfile: ../deploy/docker/Dockerfile.website
    volumes:
      - website-dist:/srv/website

  # Primary region only — activated via --profile full
  docs-build:
    profiles: ["full"]
    build:
      context: ./docs
      dockerfile: ../deploy/docker/Dockerfile.docs
    volumes:
      - docs-dist:/srv/docs

  caddy:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.caddy
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
      dashboard:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile.active:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - website-dist:/srv/website:ro
      - docs-dist:/srv/docs:ro
    environment:
      DOMAIN_API: ${DOMAIN_API}
      DOMAIN_APP: ${DOMAIN_APP}
      DOMAIN_MAIN: ${DOMAIN_MAIN:-}
      DOMAIN_DOCS: ${DOMAIN_DOCS:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  caddy-data:
  caddy-config:
  website-dist:
  docs-dist:
