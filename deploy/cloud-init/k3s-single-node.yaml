#cloud-config
package_update: true
package_upgrade: false
packages:
  - curl
  - git
  - htop
  - file

runcmd:
  - |
    # 1. Install K3s single-node (increased request size for CNPG CRDs)
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--write-kubeconfig-mode 644 --flannel-iface eth0 --kube-apiserver-arg max-request-bytes=10485760" sh -

  - |
    # 2. Wait for K3s to be ready
    until kubectl get nodes 2>/dev/null; do sleep 2; done

  - |
    # 3. Install Helm
    curl -sL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  - |
    # 4. Install CloudNative PG operator (skip poolers CRD - too large for K3s default, not needed for single-node)
    curl -sL https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.25/releases/cnpg-1.25.1.yaml | grep -v 'name: poolers' > /tmp/cnpg.yaml
    kubectl apply -f /tmp/cnpg.yaml
    # The poolers CRD is large; apply it separately with server-side apply if needed later
    kubectl wait --for=condition=Ready pods -l app.kubernetes.io/name=cloudnative-pg -n cnpg-system --timeout=180s

  - |
    # 5. Clone deployment manifests from GitHub (retry on failure)
    for i in 1 2 3; do
      git clone https://github.com/dinesh-g1/featuresignals.git /opt/featuresignals --depth 1 && break
      sleep 5
    done

  - |
    # 6. Deploy everything via kubectl (retry once if webhook not ready)
    kubectl apply -k /opt/featuresignals/deploy/k8s/ || {
      echo "First apply failed (webhook not ready). Retrying in 30s..."
      sleep 30
      kubectl apply -k /opt/featuresignals/deploy/k8s/
    }

  - |
    # 7. Wait for all pods to be ready
    kubectl wait --for=condition=Ready pods --all -n featuresignals --timeout=180s

  - |
    # 8. Mount static content volumes and install placeholder pages
    mkdir -p /data/www/website /data/www/docs /opt/actions-runner
    echo '<h1>FeatureSignals</h1><p>Coming soon.</p>' > /data/www/website/index.html
    echo '<h1>FeatureSignals Docs</h1><p>Coming soon.</p>' > /data/www/docs/index.html

  - |
    # 9. Install GitHub Actions self-hosted runner
    cd /opt/actions-runner
    RUNNER_VERSION="2.322.0"
    curl -sL -o runner.tar.gz "https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz"
    if [ -f runner.tar.gz ] && file runner.tar.gz | grep -q gzip; then
      tar xzf runner.tar.gz
      ./config.sh --url https://github.com/dinesh-g1/featuresignals --token ${RUNNER_TOKEN} --labels self-hosted --unattended
      ./svc.sh install && ./svc.sh start
    else
      echo "Runner download failed - will retry later via CI/CD"
      rm -f runner.tar.gz
    fi

output:
  all: "| tee -a /var/log/cloud-init-output.log"
