# Shared monitoring — real-time Docker log viewer (Dozzle)
#
# Works with any environment (dev, prod, on-prem).
# Usage:
#   docker compose --env-file .env -f <main-compose> -f deploy/docker-compose.monitoring.yml up -d dozzle
#
# Access via SSH tunnel:
#   ssh -i <key> -L 8888:localhost:8888 user@host
#   open http://localhost:8888

services:
  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_NO_ANALYTICS: "true"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - default
    labels:
      - "featuresignals.monitoring=true"
