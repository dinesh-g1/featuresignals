replicaCount: 2

image:
  repository: ghcr.io/featuresignals/server
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: api.featuresignals.com
      paths:
        - path: /
          pathType: Prefix

env:
  DATABASE_URL: ""
  JWT_SECRET: ""
  PORT: "8080"
  LOG_LEVEL: "info"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

postgresql:
  enabled: true
  auth:
    database: featuresignals
    username: fs
    password: ""
