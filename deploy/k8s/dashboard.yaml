apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: featuresignals
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/dinesh-g1/featuresignals-dashboard:b57a6aa37900db1a2b8db3e640a453f83c8b4155
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.featuresignals.com"
            - name: NEXT_SERVER_API_URL
              value: "http://featuresignals-server:8080"
          resources:
            limits:
              cpu: "500m"
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: featuresignals-dashboard
  namespace: featuresignals
spec:
  selector:
    app: dashboard
  ports:
    - port: 3000
      targetPort: 3000
