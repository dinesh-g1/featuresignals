apiVersion: v1
kind: ConfigMap
metadata:
  name: router-config
  namespace: featuresignals
data:
  config.yaml: |
    router:
      domain: featuresignals.com
      email: admin@featuresignals.com
      tls:
        cache_dir: /data/certs
        port: 443
      dns:
        enabled: false
        port: 53
      domains:
        - name: featuresignals.com
          type: static
          root: /data/www/website
        - name: docs.featuresignals.com
          type: static
          root: /data/www/docs
        - name: api.featuresignals.com
          type: proxy
          target: http://featuresignals-server:8080
          rate_limit: 1000/min
        - name: app.featuresignals.com
          type: proxy
          target: http://featuresignals-dashboard:3000
          rate_limit: 100/min
        - name: signoz.featuresignals.com
          type: proxy
          target: http://signoz-frontend:3301
          rate_limit: 20/min
          auth: ops
      rate_limit:
        default: 100/min
        burst: 50
        window: 60s
      cluster:
        name: us-001
        region: us
        public_ip: ""
      peer_clusters: []
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: router-certs
  namespace: featuresignals
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: router-www
  namespace: featuresignals
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: global-router
  namespace: featuresignals
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: global-router
  template:
    metadata:
      labels:
        app: global-router
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: global-router
          image: ghcr.io/dinesh-g1/featuresignals-global-router:7fde4eaa34f1454d9595c1e999e4eeba5202ea78
          env:
            - name: CONFIG_PATH
              value: /etc/router/config.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/router
            - name: certs
              mountPath: /data/certs
            - name: www
              mountPath: /data/www
          resources:
            limits:
              cpu: "500m"
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: router-config
        - name: certs
          persistentVolumeClaim:
            claimName: router-certs
        - name: www
          persistentVolumeClaim:
            claimName: router-www
---
apiVersion: v1
kind: Service
metadata:
  name: global-router
  namespace: featuresignals
spec:
  type: NodePort
  selector:
    app: global-router
  ports:
    - port: 443
      targetPort: 443
      name: https
    - port: 80
      targetPort: 80
      name: http
