apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cells.featuresignals.com
spec:
  group: featuresignals.com
  names:
    kind: Cell
    plural: cells
    singular: cell
    shortNames:
      - cl
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                provider:
                  type: string
                  default: hetzner
                region:
                  type: string
                  default: eu-falkenstein
                replicas:
                  type: integer
                  default: 1
                  minimum: 1
                version:
                  type: string
                tenants:
                  type: array
                  items:
                    type: string
                drain:
                  type: boolean
                  default: false
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - provisioning
                    - running
                    - draining
                    - stopped
                    - failed
                observedGeneration:
                  type: integer
                  format: int64
                tenantCount:
                  type: integer
                podCount:
                  type: integer
                healthyCount:
                  type: integer
                unhealthyCount:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - "Unknown"
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
