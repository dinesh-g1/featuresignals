apiVersion: featuresignals.com/v1
kind: Cell
metadata:
  name: eu-fsn
  namespace: featuresignals-system
spec:
  provider: hetzner
  region: eu-falkenstein
  replicas: 1
  version: 0.1.0
  tenants: []
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cell-operator
  namespace: featuresignals-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cell-operator
rules:
- apiGroups: ["featuresignals.com"]
  resources: ["cells", "cells/status", "cells/finalizers"]
  verbs: ["*"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["*"]
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets", "namespaces", "persistentvolumeclaims"]
  verbs: ["*"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["*"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cell-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cell-operator
subjects:
- kind: ServiceAccount
  name: cell-operator
  namespace: featuresignals-system
