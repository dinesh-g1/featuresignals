# =============================================================================
# FeatureSignals — Production Environment Overrides
# =============================================================================
# These values override the defaults in deploy/k8s/helm/featuresignals/values.yaml
# for production deployments.
#
# Apply via:
#   helm upgrade --install featuresignals ./deploy/k8s/helm/featuresignals \
#     --namespace featuresignals \
#     --values deploy/k8s/env/production/values.yaml
# =============================================================================

global:
  environment: production
  dnsDomain: featuresignals.com

# ---------------------------------------------------------------------------
# API Server — Production tuning
# ---------------------------------------------------------------------------
server:
  replicas: 2
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  env:
    LOG_LEVEL: info
    AUDIT_RETENTION_DAYS: "90"

  envSecrets:
    - db-credentials
    - jwt-secret
    - license-key

  # Anti-affinity to spread pods across nodes
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - server
            topologyKey: kubernetes.io/hostname

# ---------------------------------------------------------------------------
# Dashboard — Production tuning
# ---------------------------------------------------------------------------
dashboard:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  env:
    NEXT_PUBLIC_API_URL: https://api.featuresignals.com
    HOSTNAME: "0.0.0.0"

# ---------------------------------------------------------------------------
# Ingress — Production DNS
# ---------------------------------------------------------------------------
ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: caddy
    caddy.ingress.kubernetes.io/allow-h2c: "true"

  api:
    host: api.featuresignals.com
    path: /

  dashboard:
    host: app.featuresignals.com
    path: /

  tls:
    - secretName: featuresignals-api-tls
      hosts:
        - api.featuresignals.com
    - secretName: featuresignals-dashboard-tls
      hosts:
        - app.featuresignals.com

# ---------------------------------------------------------------------------
# HPA — Production scaling
# ---------------------------------------------------------------------------
hpa:
  server:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    cpuUtilization: 70
    memoryUtilization: 85

  dashboard:
    enabled: false

# ---------------------------------------------------------------------------
# PodDisruptionBudget — Production HA
# ---------------------------------------------------------------------------
pdb:
  server:
    enabled: true
    maxUnavailable: 1

# ---------------------------------------------------------------------------
# NetworkPolicies — Production lockdown
# ---------------------------------------------------------------------------
networkPolicies:
  enabled: true
  ingressNamespace: ingress-nginx

# ---------------------------------------------------------------------------
# ServiceMonitor — Production observability
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: kube-prometheus-stack

# ---------------------------------------------------------------------------
# Migration — Run on production deploy
# ---------------------------------------------------------------------------
migration:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
