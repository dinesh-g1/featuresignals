
{{- if .Values.server.enabled | default true }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "featuresignals.fullname" . }}-server
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "featuresignals.serverLabels" . | nindent 4 }}
  annotations:
    {{- with .Values.server.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.hpa.server.enabled }}
  replicas: {{ .Values.server.replicas }}
  {{- end }}
  strategy:
    {{- toYaml .Values.server.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "featuresignals.serverSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "featuresignals.serverLabels" . | nindent 8 }}
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.server.prometheusScrape | default true }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.server.port }}"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.server.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.server.terminationGracePeriodSeconds }}
      {{- with .Values.server.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "featuresignals.image" (dict "registry" $.Values.global.imageRegistry "repository" .Values.server.image.repository "tag" .Values.server.image.tag) }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.server.targetPort }}
              protocol: TCP
          env:
            {{- include "featuresignals.server.env" . | nindent 12 }}
            {{- if .Values.server.extraEnv }}
            {{- toYaml .Values.server.extraEnv | nindent 12 }}
            {{- end }}
            # Construct DATABASE_URL from individual postgresql values
            - name: DB_HOST
              value: {{ .Values.postgresql.host | quote }}
            - name: DB_PORT
              value: {{ .Values.postgresql.port | quote }}
            - name: DB_DATABASE
              value: {{ .Values.postgresql.database | quote }}
            - name: DB_USER
              value: {{ .Values.postgresql.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.password }}
            - name: DATABASE_URL
              value: {{ include "featuresignals.databaseUrl" . | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret
            {{- if .Values.server.extraEnvSecrets }}
            {{- range .Values.server.extraEnvSecrets }}
            {{- range $key, $ref := . }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.name }}
                  key: {{ $ref.key | default $key }}
            {{- end }}
            {{- end }}
            {{- end }}
          envFrom:
            {{- range .Values.server.envSecrets }}
            - secretRef:
                name: {{ . }}
                optional: true
            {{- end }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          {{- if .Values.server.readinessProbe | default true }}
          readinessProbe:
            httpGet:
              path: {{ .Values.server.probePath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          {{- end }}
          {{- if .Values.server.livenessProbe | default true }}
          livenessProbe:
            httpGet:
              path: {{ .Values.server.probePath }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          {{- end }}
          {{- if .Values.server.startupProbe }}
          startupProbe:
            httpGet:
              path: {{ .Values.server.probePath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          {{- end }}
          volumeMounts:
            {{- with .Values.server.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 10
      volumes:
        {{- with .Values.server.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
