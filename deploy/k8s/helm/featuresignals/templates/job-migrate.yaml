{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "featuresignals.fullname" . }}-migrate
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "featuresignals.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      name: {{ include "featuresignals.fullname" . }}-migrate
      labels:
        {{- include "featuresignals.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.migration.securityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "featuresignals.image" (dict "registry" $.Values.global.imageRegistry "repository" .Values.server.image.repository "tag" .Values.server.image.tag) }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          command:
            - ./server
            - migrate
          env:
            - name: DB_HOST
              value: {{ .Values.postgresql.host | quote }}
            - name: DB_PORT
              value: {{ .Values.postgresql.port | quote }}
            - name: DB_DATABASE
              value: {{ .Values.postgresql.database | quote }}
            - name: DB_USER
              value: {{ .Values.postgresql.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.password }}
            - name: DATABASE_URL
              value: {{ include "featuresignals.databaseUrl" . | quote }}
            {{- if .Values.migration.extraEnv }}
            {{- toYaml .Values.migration.extraEnv | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
{{- end }}
