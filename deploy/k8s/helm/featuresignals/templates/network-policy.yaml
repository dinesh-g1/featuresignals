
{{- if .Values.networkPolicies.enabled }}
---
# =============================================================================
# Default deny all ingress traffic
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "featuresignals.fullname" . }}-default-deny-ingress
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "featuresignals.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# =============================================================================
# Allow ingress to server from ingress-nginx
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "featuresignals.fullname" . }}-allow-to-server
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "featuresignals.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "featuresignals.serverSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.ingressNamespace | default "ingress-nginx" }}
        {{- if .Values.networkPolicies.additionalApiClientNamespaces }}
        {{- range .Values.networkPolicies.additionalApiClientNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
        {{- end }}
      ports:
        - port: {{ .Values.service.server.targetPort | default 8080 }}
          protocol: TCP
        {{- if .Values.service.server.metricsPort }}
        - port: {{ .Values.service.server.metricsPort }}
          protocol: TCP
        {{- end }}
---
# =============================================================================
# Allow ingress to dashboard from ingress-nginx
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "featuresignals.fullname" . }}-allow-to-dashboard
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "featuresignals.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "featuresignals.dashboardSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.ingressNamespace | default "ingress-nginx" }}
        {{- if .Values.networkPolicies.additionalDashboardClientNamespaces }}
        {{- range .Values.networkPolicies.additionalDashboardClientNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
        {{- end }}
      ports:
        - port: {{ .Values.service.dashboard.targetPort | default 3000 }}
          protocol: TCP
{{- end }}
