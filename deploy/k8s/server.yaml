apiVersion: v1
kind: ConfigMap
metadata:
  name: server-config
  namespace: featuresignals
data:
  PORT: "8080"
  DEPLOYMENT_MODE: "cloud"
  LOG_LEVEL: "info"
  DB_MAX_CONNS: "25"
  DB_MIN_CONNS: "5"
  TOKEN_TTL_MINUTES: "60"
  REFRESH_TTL_HOURS: "168"
  AUDIT_RETENTION_DAYS: "90"
  LOCAL_REGION: "eu"
  CLUSTER_NAME: "eu-001"
  ROUTER_DOMAIN: "featuresignals.com"
  ROUTER_EMAIL: "admin@featuresignals.com"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "signoz-otel-collector.observability.svc.cluster.local:4318"
  OTEL_SERVICE_NAME: "featuresignals-api"
  OTEL_TRACES_ENABLED: "true"
  OTEL_METRICS_ENABLED: "true"
  OTEL_LOGS_ENABLED: "true"
  EMAIL_PROVIDER: "zeptomail"
  ZEPTOMAIL_FROM_EMAIL: "noreply@featuresignals.com"
  ZEPTOMAIL_FROM_NAME: "FeatureSignals"
  ZEPTOMAIL_BASE_URL: "https://api.zeptomail.in"
  SUPER_MODE_DOMAIN: "featuresignals.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: zeptomail-secret
  namespace: featuresignals
type: Opaque
stringData:
  zeptomail-token: "ZEPTOMAIL_TOKEN_PLACEHOLDER"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: featuresignals
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: server
          image: ghcr.io/dinesh-g1/featuresignals-server:7814be9e0acfa9715dbb4fcf2cd899bfa311391d
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: server-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: featuresignals-db-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: featuresignals-db-app
                  key: password
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@featuresignals-db-rw:5432/featuresignals?sslmode=disable"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret
            - name: ZEPTOMAIL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zeptomail-secret
                  key: zeptomail-token
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: featuresignals-server
  namespace: featuresignals
spec:
  selector:
    app: server
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: featuresignals
type: Opaque
stringData:
  jwt-secret: "change-this-in-production-use-a-random-64-char-string"
