apiVersion: v1
kind: ConfigMap
metadata:
  name: server-config
  namespace: featuresignals
data:
  PORT: "8080"
  DEPLOYMENT_MODE: "cloud"
  LOG_LEVEL: "info"
  DB_MAX_CONNS: "25"
  DB_MIN_CONNS: "5"
  TOKEN_TTL_MINUTES: "60"
  REFRESH_TTL_HOURS: "168"
  AUDIT_RETENTION_DAYS: "90"
  LOCAL_REGION: "eu"
  CLUSTER_NAME: "eu-001"
  ROUTER_DOMAIN: "featuresignals.com"
  ROUTER_EMAIL: "admin@featuresignals.com"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "signoz-otel-collector.observability.svc.cluster.local:4318"
  OTEL_SERVICE_NAME: "featuresignals-api"
  OTEL_TRACES_ENABLED: "true"
  OTEL_METRICS_ENABLED: "true"
  OTEL_LOGS_ENABLED: "true"
  EMAIL_PROVIDER: "zeptomail"
  ZEPTOMAIL_FROM_EMAIL: "noreply@featuresignals.com"
  ZEPTOMAIL_FROM_NAME: "FeatureSignals"
  ZEPTOMAIL_BASE_URL: "https://api.zeptomail.in"
  SUPER_MODE_DOMAIN: "featuresignals.com"
---
apiVersion: v1
kind: Service
metadata:
  name: featuresignals-server
  namespace: featuresignals
spec:
  selector:
    app: server
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: featuresignals
type: Opaque
stringData:
  jwt-secret: "change-this-in-production-use-a-random-64-char-string"
