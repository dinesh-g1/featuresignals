apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: featuresignals-db
  namespace: featuresignals
spec:
  # Single instance for single-node K3s
  instances: 1

  # Storage configuration
  storage:
    size: 10Gi

  # Bootstrap configuration
  bootstrap:
    initdb:
      database: featuresignals
      owner: featuresignals
      # Password is auto-generated by CNPG operator
      # Stored in secret: featuresignals-db-app

  # Resource limits
  resources:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

  # Backup configuration (optional for single-node)
  backup:
    volumeSnapshot:
      className: "" # Set your volume snapshot class here
      recoveryVolumeClass: "" # Set your recovery volume class here

  # Monitoring
  monitoring:
    enablePodMonitor: false # Set to true if Prometheus operator is installed

  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "512MB"
