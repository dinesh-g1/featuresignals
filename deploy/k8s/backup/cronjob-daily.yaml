# =============================================================================
# FeatureSignals — Daily PostgreSQL Backup CronJob
# =============================================================================
#
# Runs a two-phase backup every day at 02:00 UTC:
#   1. Init container: pg_dump → gzip → write to emptyDir volume
#   2. Main container:  upload gzip to Hetzner Storage Box via S3-compatible API
#
# The backup is transferred to the Hetzner Storage Box using S3-compatible
# credentials. The Storage Box serves as our off-site copy, satisfying the
# "1 off-site" requirement of the 3-2-1 backup strategy.
#
# Retention: 30 days (handled by the backup.sh script's cleanup logic)
#
# Dependencies:
#   - backup-scripts ConfigMap (generated by kustomization.yaml)
#   - storage-box-credentials secret (S3 keys + endpoint URL)
#   - PostgreSQL pod running in featuresignals-system namespace
# =============================================================================

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fs-daily-backup
  namespace: featuresignals-system
  labels:
    app.kubernetes.io/name: fs-daily-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: featuresignals
    backup-type: daily
spec:
  # Every day at 02:00 UTC — after peak hours, before maintenance windows
  schedule: "0 2 * * *"
  # Allow one job to be running at a time; if the previous run is still going,
  # skip the new one. Prevents pile-ups during long-running backups.
  concurrencyPolicy: Forbid
  # Start the job within 5 minutes of the scheduled time if the cluster was
  # down at the scheduled time.
  startingDeadlineSeconds: 300
  # Keep the last 3 successful pods for log inspection
  successfulJobsHistoryLimit: 3
  # Keep only the last failed pod
  failedJobsHistoryLimit: 1
  # Automatically clean up completed jobs after 30 days
  ttlSecondsAfterFinished: 2592000 # 30 days

  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: fs-daily-backup
        app.kubernetes.io/component: backup
        backup-type: daily
    spec:
      # Maximum 2 retries with 5-minute backoff between attempts
      backoffLimit: 2
      # Give each job attempt 15 minutes to complete
      activeDeadlineSeconds: 900

      template:
        metadata:
          labels:
            app.kubernetes.io/name: fs-daily-backup
            app.kubernetes.io/component: backup
            backup-type: daily
          annotations:
            # Ensure the pod is recreated if the underlying node is drained
            cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
        spec:
          # Don't restart the pod on completion — Jobs handle this
          restartPolicy: Never

          # Node anti-affinity: prefer not to schedule on the same node as the
          # database to reduce I/O contention during backup window (soft rule)
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 50
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/instance
                          operator: In
                          values:
                            - featuresignals-db-postgresql
                    topologyKey: kubernetes.io/hostname

          # Run as the postgres user (UID 1001 in Bitnami images) — NOT root
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001

          # ===================================================================
          # Init Container: pg_dump → gzip → write to shared emptyDir
          # ===================================================================
          initContainers:
            - name: pg-dump
              # Bitnami PostgreSQL 16 with pg_dump, gzip, and basic shell utils
              image: bitnami/postgresql:16
              imagePullPolicy: IfNotPresent

              # Resource requests: minimum guaranteed for scheduling
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 512Mi

              # Environment configuration
              env:
                # Database host — Bitnami Helm chart creates a Service named
                # <release>-postgresql in the same namespace
                - name: DB_HOST
                  value: postgresql
                # Database user — the Bitnami chart defaults to "postgres"
                - name: DB_USER
                  value: postgres
                # Database name
                - name: DB_DATABASE
                  value: featuresignals
                # PostgreSQL password — read from the secret created by the
                # Bitnami Helm chart
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      # Secret created by Bitnami PostgreSQL Helm chart
                      name: postgresql
                      key: postgres-password

              # Command runs the backup script with "daily" type
              command:
                - /bin/bash
                - /scripts/backup.sh
              args:
                - daily

              # Mount the backup script from ConfigMap and the shared volume
              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                  readOnly: true
                - name: backup-shared
                  mountPath: /backups

          # ===================================================================
          # Main Container: Upload to Hetzner Storage Box
          # ===================================================================
          containers:
            - name: s3-upload
              # AWS CLI image for S3-compatible storage uploads
              image: amazon/aws-cli:2.22.35
              imagePullPolicy: IfNotPresent

              # Resource requests: 200m CPU, 256Mi memory as specified
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi

              # Environment configuration
              env:
                # Hetzner Storage Box S3 endpoint
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: storage-box-credentials
                      key: endpoint
                # AWS-compatible access key for Hetzner Storage Box
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: storage-box-credentials
                      key: access-key-id
                # AWS-compatible secret key for Hetzner Storage Box
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: storage-box-credentials
                      key: secret-access-key
                # Database metadata used for S3 path construction
                - name: DB_HOST
                  value: postgresql
                - name: DB_USER
                  value: postgres
                - name: DB_DATABASE
                  value: featuresignals

              # Command uploads the backup file from the shared volume
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  BACKUP_TYPE="daily"
                  S3_BUCKET="s3://fs-backups"

                  echo "[INFO] Starting S3 upload for ${BACKUP_TYPE} backup..."

                  # Find the latest backup file in the shared volume
                  LATEST=$(ls -t /backups/${BACKUP_TYPE}/featuresignals-${BACKUP_TYPE}-*.sql.gz 2>/dev/null | head -1)
                  if [ -z "${LATEST}" ]; then
                    echo "[ERROR] No backup file found in /backups/${BACKUP_TYPE}/"
                    exit 1
                  fi

                  echo "[INFO] Uploading: ${LATEST}"

                  # Upload to Hetzner Storage Box
                  aws s3 cp "${LATEST}" "${S3_BUCKET}/${BACKUP_TYPE}/" \
                    --endpoint-url "${S3_ENDPOINT}" \
                    --no-progress \
                    --storage-class STANDARD

                  # Verify the upload
                  FILENAME=$(basename "${LATEST}")
                  if aws s3 ls "${S3_BUCKET}/${BACKUP_TYPE}/${FILENAME}" \
                    --endpoint-url "${S3_ENDPOINT}" >/dev/null 2>&1; then
                    echo "[INFO] Upload verified: ${FILENAME}"
                  else
                    echo "[ERROR] Upload verification failed: ${FILENAME}"
                    exit 1
                  fi

                  echo "[INFO] S3 upload complete"

              # Mount the shared volume and scripts
              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                  readOnly: true
                - name: backup-shared
                  mountPath: /backups
                  readOnly: true

          # ===================================================================
          # Volumes
          # ===================================================================
          volumes:
            - name: backup-scripts
              configMap:
                name: backup-scripts
                defaultMode: 0555 # Executable by owner/group/others
            - name: backup-shared
              emptyDir:
                sizeLimit: 10Gi
