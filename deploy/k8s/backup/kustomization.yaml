#   DB_HOST          PostgreSQL host (default: postgresql)
#   DB_USER          PostgreSQL user (default: postgres)
#   DB_DATABASE      PostgreSQL database name (default: featuresignals)
#   PGPASSWORD       PostgreSQL password (REQUIRED)
#   S3_ENDPOINT      S3-compatible endpoint URL (required for S3 restores)
#   AWS_ACCESS_KEY_ID     S3 access key (required for S3 restores)
#   AWS_SECRET_ACCESS_KEY S3 secret key (required for S3 restores)
#
# Examples:
#   PGPASSWORD=secret ./restore.sh /backups/daily/featuresignals-20240101-020000.sql.gz
#   PGPASSWORD=secret S3_ENDPOINT=https://fs.your-storage-box.de \
#     AWS_ACCESS_KEY_ID=xxx AWS_SECRET_ACCESS_KEY=yyy \
#     ./restore.sh s3://fs-backups/daily/featuresignals-20240101-020000.sql.gz
#
# WARNING: This script DROPS and recreates the target database.
# All existing data in the database will be lost.
# =============================================================================

set -euo pipefail

# ---- Constants --------------------------------------------------------------

SCRIPT_NAME="$(basename "$0")"
VERSION="1.0.0"
LOG_PREFIX="[$(date -u +%Y-%m-%dT%H:%M:%SZ)] [${SCRIPT_NAME}]"

# ---- Colors for terminal output ---------------------------------------------

RED='\033[0;31m'
YELLOW='\033[1;33m'
GREEN='\033[0;32m'
CYAN='\033[0;36m'
NC='\033[0m' # No Color

# ---- Functions --------------------------------------------------------------

log_info()  { echo -e "${LOG_PREFIX} ${GREEN}[INFO]${NC}  $*"; }
log_warn()  { echo -e "${LOG_PREFIX} ${YELLOW}[WARN]${NC}  $*" >&2; }
log_error() { echo -e "${LOG_PREFIX} ${RED}[ERROR]${NC} $*" >&2; }
log_fatal() { log_error "$@"; exit 1; }
log_step()  { echo -e "\n${CYAN}════════════════════════════════════════════════════════════${NC}"; echo -e "${CYAN}  $*${NC}"; echo -e "${CYAN}════════════════════════════════════════════════════════════${NC}\n"; }

# Cleanup handler
cleanup() {
  local exit_code=$?
  if [ -n "${TMP_DIR:-}" ] && [ -d "${TMP_DIR:-}" ]; then
    rm -rf "${TMP_DIR}"
    log_info "Cleaned up temporary directory: ${TMP_DIR}"
  fi
  # No need to terminate connections — they'll be dropped by the DROP DATABASE
  if [ "${exit_code}" -ne 0 ]; then
    log_error "Restore failed with exit code ${exit_code}"
  fi
