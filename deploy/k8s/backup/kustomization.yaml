## 2. Checking Certificate Status

### 2.1 Quick Status Check

```bash
# Check all certificates and their expiry
kubectl get certificates --all-namespaces

# Show only expiry dates
kubectl get certificates --all-namespaces \
  -o jsonpath='{range .items[*]}{.metadata.namespace}{"/"}{.metadata.name}{"\t"}{.status.notAfter}{"\n"}{end}'

# Check certificate conditions
kubectl get certificates --all-namespaces \
  -o jsonpath='{range .items[*]}{.metadata.namespace}{"/"}{.metadata.name}{"\t"}{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}'
```

### 2.2 Detailed Certificate Inspection

```bash
# Examine API certificate details
kubectl describe certificate -n featuresignals-system featuresignals-api-tls

# Examine Dashboard certificate details
kubectl describe certificate -n featuresignals-saas featuresignals-dashboard-tls

# Check the actual x509 certificate from the Secret
kubectl get secret -n featuresignals-system featuresignals-api-tls \
  -o jsonpath='{.data.tls\.crt}' \
  | base64 -d \
  | openssl x509 -noout -text \
  | grep -E "Subject:|Not Before|Not After|Issuer:|DNS:"
```

### 2.3 Check via OpenSSL (External)

```bash
# Check the actual TLS certificate presented by the server
echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -text \
  | grep -E "Subject:|Not Before|Not After|Issuer:|DNS:"

# Dates only
echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -dates

# Check the full chain
echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -issuer -subject -dates
```

### 2.4 Monitoring Certificate Expiry

```bash
# Calculate days until expiry
EXPIRY_DATE=$(echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -enddate \
  | cut -d= -f2)

echo "Certificate expires: ${EXPIRY_DATE}"

# On macOS:
DAYS_LEFT=$(( ($(date -j -f "%b %d %H:%M:%S %Y %Z" "${EXPIRY_DATE}" +%s) - $(date +%s)) / 86400 ))
echo "Days until expiry: ${DAYS_LEFT}"

# On Linux:
DAYS_LEFT=$(( ($(date -d "${EXPIRY_DATE}" +%s) - $(date +%s)) / 86400 ))
echo "Days until expiry: ${DAYS_LEFT}"
```

### 2.5 Check cert-manager Component Health

```bash
# Check cert-manager pods
kubectl get pods -n cert-manager

# Check cert-manager logs
kubectl logs -n cert-manager -l app.kubernetes.io/name=cert-manager --tail=50

# Check the ACME account status
kubectl describe clusterissuer letsencrypt-prod

# Check for recent certificate events
kubectl get events -n featuresignals-system --sort-by=.lastTimestamp \
  | grep -E "certificate|Certificate|tls"
```

