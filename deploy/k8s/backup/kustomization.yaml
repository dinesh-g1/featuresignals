## 6. Storage Box Failure

### Severity
**MEDIUM** — P2 (offsite backup unavailable)

### Trigger
- `aws s3 ls` commands fail with connection errors
- Hetzner Storage Box web interface shows maintenance or errors
- Backup CronJob logs show S3 upload failures
- Monitoring alert: `BackupUploadFailed`

### Impact
- Offsite backups (daily/weekly/monthly) are not being created
- Local hourly backups are unaffected
- 3-2-1 backup strategy is degraded (missing the offsite copy)
- Data is still protected for recent changes (hourly local), but not for disaster scenarios

### Pre-requisites
- Hetzner Cloud Console access
- Storage Box credentials
- Alternative storage credentials (if available)

### Recovery Steps

#### Step 1: Diagnose the Issue

```bash
# 1. Check recent backup job logs
kubectl logs -n featuresignals-system \
  --selector=backup-type=daily --tail=100

# 2. Test S3 connectivity from a pod
kubectl run -it --rm --restart=Never \
  --image=amazon/aws-cli:2.22 \
  s3-test -- \
  aws s3 ls s3://fs-backups/ \
  --endpoint-url ${HETZNER_STORAGE_BOX_URL}

# 3. Check if the Storage Box is reachable
kubectl run -it --rm --restart=Never \
  --image=busybox \
  net-test -- \
  wget -q -O- ${HETZNER_STORAGE_BOX_URL} --timeout=10
```

#### Step 2: Common Issues and Fixes

**Issue: Network connectivity to Storage Box**
```bash
# Check if Storage Box is accessible from outside the cluster
curl -s -o /dev/null -w "%{http_code}" ${HETZNER_STORAGE_BOX_URL}

# If unreachable, check Hetzner status page: https://status.hetzner.com
```

**Issue: Expired credentials**
```bash
# Regenerate Storage Box credentials in Hetzner Robot
# https://robot.hetzner.com/storage

# Update the Kubernetes secret
kubectl delete secret -n featuresignals-system storage-box-credentials
kubectl create secret generic -n featuresignals-system storage-box-credentials \
  --from-literal=endpoint=${HETZNER_STORAGE_BOX_URL} \
  --from-literal=access-key-id=${NEW_ACCESS_KEY} \
  --from-literal=secret-access-key=${NEW_SECRET_KEY}
```

**Issue: Storage Box full**
```bash
# Check Storage Box usage via Hetzner Robot
# Or use S3 command:
aws s3 ls s3://fs-backups/ --recursive \
  --endpoint-url ${HETZNER_STORAGE_BOX_URL} \
  --summarize | tail -5

# If full:
# 1. Reduce retention period
# 2. Manually delete old backups
# 3. Upgrade Storage Box size
```

#### Step 3: Mitigation While Storage Box is Down

```bash
# 1. Increase local backup retention temporarily
# Edit the hourly CronJob to retain more backups
kubectl edit cronjob -n featuresignals-system fs-backup-hourly
# Change retention to keep backups for 72 hours instead of 24

# 2. Create an additional backup to a different location if available
# (e.g., another S3-compatible provider)

# 3. Manually copy the latest backup off-site
scp deploy@featuresignals-prod:/mnt/data/backups/hourly/latest.sql.gz \
  ~/offline-backups/
```

### Verification
```bash
# 1. Test S3 upload
kubectl run -it --rm --restart=Never \
  --image=amazon/aws-cli:2.22 \
  s3-verify -- \
  bash -c "echo test | aws s3 cp - s3://fs-backups/health-check.txt \
    --endpoint-url ${HETZNER_STORAGE_BOX_URL}"

# 2. Verify backup CronJobs are running
kubectl get cronjobs -n featuresignals-system
```

### Rollback
- Restore previous credentials if rotation caused the issue
- If using a different Storage Box, update the `S3_ENDPOINT` in the secret

### Post-Recovery
- [ ] File a support ticket with Hetzner if it's an infrastructure issue
- [ ] Consider adding a secondary offsite backup destination
- [ ] Review and adjust retention policy if Storage Box is filling up
- [ ] Set up monitoring for backup size trends

