## 5. Manual Certificate Operations

### 5.1 Creating a Self-Signed Certificate (Emergency/Dev)

For development or emergency situations where Let's Encrypt is unavailable:

```bash
# Generate a self-signed certificate valid for 1 year
openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
  -keyout /tmp/tls.key \
  -out /tmp/tls.crt \
  -subj "/CN=api.featuresignals.com" \
  -addext "subjectAltName=DNS:api.featuresignals.com,DNS:app.featuresignals.com"

# Create the Kubernetes secret
kubectl create secret tls -n featuresignals-system featuresignals-api-tls \
  --cert=/tmp/tls.crt \
  --key=/tmp/tls.key \
  --dry-run=client -o yaml | kubectl apply -f -

# Clean up
rm /tmp/tls.key /tmp/tls.crt
```

### 5.2 Exporting Certificates for External Use

```bash
# Export the full certificate chain
kubectl get secret -n featuresignals-system featuresignals-api-tls \
  -o jsonpath='{.data.tls\.crt}' \
  | base64 -d > /tmp/featuresignals-fullchain.pem

# Export the private key (handle with care!)
kubectl get secret -n featuresignals-system featuresignals-api-tls \
  -o jsonpath='{.data.tls\.key}' \
  | base64 -d > /tmp/featuresignals-key.pem

# Export in PFX format (for Windows/IIS)
openssl pkcs12 -export \
  -in /tmp/featuresignals-fullchain.pem \
  -inkey /tmp/featuresignals-key.pem \
  -out /tmp/featuresignals.pfx \
  -passout pass:
```

### 5.3 Testing with Staging Issuer

Always test certificate changes with the staging issuer first:

```bash
# 1. Create or update the ingress to use staging
kubectl annotate ingress -n featuresignals-system featuresignals-api \
  cert-manager.io/cluster-issuer=letsencrypt-staging \
  --overwrite

# 2. Delete the existing certificate to force re-issuance
kubectl delete certificate -n featuresignals-system featuresignals-api-tls

# 3. Wait for staging certificate
kubectl get certificates -n featuresignals-system --watch

# 4. Verify the staging certificate
echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -issuer
# Expected: (STAGING) Let's Encrypt

# 5. Switch back to production
kubectl annotate ingress -n featuresignals-system featuresignals-api \
  cert-manager.io/cluster-issuer=letsencrypt-prod \
  --overwrite

# 6. Delete the staging certificate
kubectl delete certificate -n featuresignals-system featuresignals-api-tls

# 7. Wait for production certificate
kubectl get certificates -n featuresignals-system --watch
```

### 5.4 Rotating All Certificates at Once

Useful after a security incident or as part of regular rotation:

```bash
#!/usr/bin/env bash
# Full certificate rotation script
set -euo pipefail

echo "[$(date -u)] Starting certificate rotation..."

# Delete all Certificate secrets
for secret in $(kubectl get secrets --all-namespaces \
  -o jsonpath='{range .items[?(@.type=="kubernetes.io/tls")]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}'); do
  ns=$(echo ${secret} | awk '{print $1}')
  name=$(echo ${secret} | awk '{print $2}')
  echo "Deleting secret ${ns}/${name}..."
  kubectl delete secret -n "${ns}" "${name}"
done

# Delete Certificate resources
for cert in $(kubectl get certificates --all-namespaces \
  -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}'); do
  ns=$(echo ${cert} | awk '{print $1}')
  name=$(echo ${cert} | awk '{print $2}')
  echo "Deleting certificate ${ns}/${name}..."
  kubectl delete certificate -n "${ns}" "${name}"
done

# Wait for certificates to be re-issued
echo "[$(date -u)] Waiting for certificates to be re-issued..."
sleep 10

for cert in $(kubectl get certificates --all-namespaces \
  -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}'); do
  ns=$(echo ${cert} | awk '{print $1}')
  name=$(echo ${cert} | awk '{print $2}')
  echo "Waiting for certificate ${ns}/${name}..."
  kubectl wait --namespace "${ns}" \
    --for=condition=Ready "certificate/${name}" \
    --timeout=300s
done

echo "[$(date -u)] Certificate rotation complete."

# Verify
for domain in "api.featuresignals.com" "app.featuresignals.com"; do
  echo ""
  echo "=== ${domain} ==="
  echo | openssl s_client -servername "${domain}" \
    -connect "${domain}:443" 2>/dev/null \
    | openssl x509 -noout -issuer -subject -dates
done
```

