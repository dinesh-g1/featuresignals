## 6. Appendix

### A. Key Commands Quick Reference

```bash
# ─── Status Checks ─────────────────────────────────────────────────────────
kubectl get certificates --all-namespaces                          # All certificates
kubectl describe certificate -n featuresignals-system featuresignals-api-tls  # Detailed
echo | openssl s_client -connect api.featuresignals.com:443 2>/dev/null | openssl x509 -noout -dates  # External check

# ─── Renewal ──────────────────────────────────────────────────────────────
kubectl delete secret -n featuresignals-system featuresignals-api-tls  # Force re-issue
kubectl get certificates -n featuresignals-system --watch               # Monitor issuance

# ─── Debugging ────────────────────────────────────────────────────────────
kubectl logs -n cert-manager -l app.kubernetes.io/name=cert-manager     # cert-manager logs
kubectl describe clusterissuer letsencrypt-prod                          # ClusterIssuer status
kubectl get orders --all-namespaces                                      # ACME orders
kubectl get challenges --all-namespaces                                  # ACME challenges

# ─── Issuer Management ────────────────────────────────────────────────────
kubectl annotate ingress -n featuresignals-system featuresignals-api \
  cert-manager.io/cluster-issuer=letsencrypt-staging --overwrite         # Switch to staging
kubectl annotate ingress -n featuresignals-system featuresignals-api \
  cert-manager.io/cluster-issuer=letsencrypt-prod --overwrite            # Switch to prod
```

### B. Expected Certificate Timeline

```
Day 0:   Certificate issued (valid for 90 days)
Day 60:  cert-manager begins renewal attempts (30 days before expiry)
Day 60-90: Renewal retries with exponential backoff if needed
Day 90:  Certificate expires — TLS handshakes will fail
```

### C. Common Error Messages and Solutions

| Error Message | Cause | Solution |
|--------------|-------|----------|
| `Failed to determine a timeout` | Challenge solver pod not ready | Check ingress controller is running |
| `context deadline exceeded` | ACME server timeout | Check internet connectivity from cluster |
| `invalid contact URI` | Bad email in ClusterIssuer | Update `email` field in ClusterIssuer |
| `urn:ietf:params:acme:error:rateLimited` | Rate limit exceeded | Use staging issuer, wait a week |
| `urn:ietf:params:acme:error:unauthorized` | Challenge validation failed | Check DNS and ingress routing |
| `failed to find an Ingress` | No matching ingress for domain | Verify ingress exists and has correct annotations |
| `Failed to create Order` | ACME server error | Retry, check Let's Encrypt status |
| `x509: certificate has expired` | Certificate expired | Force immediate renewal |

### D. DNS Record Verification

```bash
# Verify DNS A records point to the correct IP
dig +short api.featuresignals.com
dig +short app.featuresignals.com

# Verify the domain resolves from different locations
# (useful for geo-distributed setups)
dig @8.8.8.8 api.featuresignals.com +short      # Google DNS
dig @1.1.1.1 api.featuresignals.com +short      # Cloudflare DNS
dig @9.9.9.9 api.featuresignals.com +short      # Quad9 DNS

# Check CAA records (Certificate Authority Authorization)
dig +short CAA featuresignals.com
# Expected: 0 issue "letsencrypt.org"
```

### E. Monitoring Alert Configuration

Configure the following alerts in your monitoring system:

| Alert Name | Condition | Severity | Response |
|-----------|-----------|----------|----------|
| `CertificateExpiringSoon` | Cert expires < 30 days | Warning | Verify auto-renewal |
| `CertificateExpiring` | Cert expires < 14 days | P2 | Check cert-manager logs |
| `CertificateExpiryCritical` | Cert expires < 7 days | P1 | Force renewal |
| `CertificateExpired` | Cert is expired | P0 | Emergency renewal |
| `CertManagerPodDown` | cert-manager pod not running | P1 | Restart cert-manager |
| `ClusterIssuerNotReady` | ClusterIssuer False/Unknown | P1 | Check ACME account |

### F. Incident Response Procedure

**If a certificate has already expired:**

```
1.  ACKNOWLEDGE  — Confirm via monitoring alert or customer report
                  Check using: echo | openssl s_client -connect api.featuresignals.com:443

2.  ASSESS       — Is cert-manager running?
                  Has the staging issuer worked before?
                  Is this a Let's Encrypt outage?

3.  MITIGATE     — Force immediate renewal (Section 3.2)
                  OR generate a self-signed cert (Section 5.1)
                  Target: restore TLS within 15 minutes

4.  VERIFY       — HTTPS works again
                  New certificate has correct dates and domains
                  Auto-renewal is functioning

5.  POST-MORTEM  — Why did auto-renewal fail?
                  Was monitoring alert received?
                  Update this runbook
```

