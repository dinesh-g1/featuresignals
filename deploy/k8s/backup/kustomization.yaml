# Check required tools
check_dependencies() {
  local missing=0
  for cmd in psql gunzip aws; do
    if ! command -v "${cmd}" &>/dev/null; then
      log_error "Required command not found: ${cmd}"
      missing=1
    fi
  done
  if [ "${missing}" -eq 1 ]; then
    log_fatal "Missing required dependencies. Install: postgresql-client, aws-cli, gzip"
  fi
}

# Validate environment
validate_env() {
  if [ -z "${PGPASSWORD:-}" ]; then
    log_fatal "PGPASSWORD environment variable is required"
  fi

  # Test database connectivity
  log_info "Testing database connectivity to ${DB_HOST}..."
  if ! pg_isready -h "${DB_HOST}" -U "${DB_USER}" -q -t 10 2>/dev/null; then
    log_fatal "Cannot connect to PostgreSQL at ${DB_HOST}:${DB_PORT}. Is the database running and reachable?"
  fi
  log_info "Database connection OK"
}

# Format bytes to human-readable
format_bytes() {
  local bytes=$1
  if command -v numfmt &>/dev/null; then
    numfmt --to=iec "${bytes}"
  else
    echo "${bytes} bytes"
  fi
}

# Download backup from S3 or use local file
acquire_backup() {
  local source="$1"

  if [[ "${source}" == s3://* ]]; then
    log_info "Downloading backup from S3: ${source}"

    if [ -z "${S3_ENDPOINT:-}" ]; then
      log_fatal "S3_ENDPOINT environment variable is required for S3 restores"
    fi
    if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
      log_fatal "AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are required for S3 restores"
    fi

    BACKUP_FILE="${TMP_DIR}/backup.sql.gz"

    log_info "Downloading from S3 (this may take a while for large backups)..."
    if ! aws s3 cp "${source}" "${BACKUP_FILE}" \
      --endpoint-url "${S3_ENDPOINT}" \
      --only-show-errors; then
      log_fatal "Failed to download backup from S3: ${source}"
    fi

    local file_size
    file_size="$(stat -c%s "${BACKUP_FILE}" 2>/dev/null || stat -f%z "${BACKUP_FILE}" 2>/dev/null)"
    log_info "Downloaded: $(format_bytes "${file_size}")"
  else
    # Local file
    if [ ! -f "${source}" ]; then
      log_fatal "Backup file not found: ${source}"
    fi
    BACKUP_FILE="${source}"
    local file_size
    file_size="$(stat -c%s "${BACKUP_FILE}" 2>/dev/null || stat -f%z "${BACKUP_FILE}" 2>/dev/null)"
    log_info "Using local backup file: ${source} ($(format_bytes "${file_size}"))"
  fi

