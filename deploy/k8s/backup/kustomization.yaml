## 3. Listing Available Backups

### 3.1 List Local Hourly Backups

```bash
# SSH into the VPS and check local PVC
ssh root@<server-ip>
ls -lh /var/lib/rancher/k3s/storage/fs-hourly-backups/hourly/ | tail -25

# Or check via a pod
kubectl run -it --rm --restart=Never --image=busybox \
  --namespace featuresignals-system \
  --volume-mounts="backup-storage:/backups" \
  list-backups -- \
  ls -lh /backups/hourly/
```

### 3.2 List S3 Backups

```bash
# List daily backups (last 30)
aws s3 ls s3://fs-backups/daily/ \
  --endpoint-url ${S3_ENDPOINT} \
  --output text \
  --query "reverse(sort_by(Contents, &LastModified))[:30].[Key,LastModified,Size]"

# List weekly backups
aws s3 ls s3://fs-backups/weekly/ \
  --endpoint-url ${S3_ENDPOINT} \
  --output text \
  --query "reverse(sort_by(Contents, &LastModified))[:12].[Key,LastModified,Size]"

# List monthly backups
aws s3 ls s3://fs-backups/monthly/ \
  --endpoint-url ${S3_ENDPOINT} \
  --output text \
  --query "reverse(sort_by(Contents, &LastModified))[:12].[Key,LastModified,Size]"

# List all backups (all tiers)
aws s3 ls s3://fs-backups/ \
  --endpoint-url ${S3_ENDPOINT} \
  --recursive \
  --summarize
```

### 3.3 Search for a Specific Date

```bash
# Find backups from a specific date
aws s3 ls s3://fs-backups/daily/ \
  --endpoint-url ${S3_ENDPOINT} \
  --recursive \
  | grep "20240101"  # Replace with target date YYYYMMDD

# Find the latest backup before a specific timestamp
aws s3 ls s3://fs-backups/daily/ \
  --endpoint-url ${S3_ENDPOINT} \
  --output text \
  --query "Contents[?LastModified<='2024-01-01T12:00:00Z'] | sort_by(@, &LastModified)[-1].[Key,LastModified,Size]"
```

### 3.4 Check Backup Size and Verify Integrity

```bash
# Get backup file size
aws s3 ls s3://fs-backups/daily/featuresignals-20240101-020000.sql.gz \
  --endpoint-url ${S3_ENDPOINT}

# Run full integrity verification (recommended before restore)
./deploy/k8s/backup/scripts/verify-backup.sh \
  s3://fs-backups/daily/featuresignals-20240101-020000.sql.gz
```

