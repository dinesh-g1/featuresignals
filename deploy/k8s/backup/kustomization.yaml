## 7. Verifying Data Integrity

### 7.1 Automated Verification

```bash
# Run the verify-backup script (tests a backup against a temp PostgreSQL instance)
./deploy/k8s/backup/scripts/verify-backup.sh \
  s3://fs-backups/daily/featuresignals-20240101-020000.sql.gz
```

### 7.2 Manual Verification Queries

```bash
# 1. Check for data consistency
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -c "
  -- Check for orphaned records
  SELECT 'flags with missing projects' as check_name, count(*)
  FROM flags f LEFT JOIN projects p ON f.project_id = p.id
  WHERE p.id IS NULL
  UNION ALL
  SELECT 'segments with missing flags', count(*)
  FROM segments s LEFT JOIN flags f ON s.flag_id = f.id
  WHERE f.id IS NULL;"

# 2. Check for constraint violations
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -c "
  -- Check for duplicate primary keys (should be 0)
  SELECT schemaname, tablename, 'has issues' as status
  FROM pg_catalog.pg_tables
  WHERE schemaname = 'public'
    AND tablename IN (
      SELECT relname FROM pg_class
      WHERE relkind = 'r' AND relhasindex = false
    );"

# 3. Check for negative values in numeric columns
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -c "
  -- Check for negative IDs (should be 0)
  SELECT 'negative IDs found' as issue, count(*) FROM organizations WHERE id < 0;"

# 4. Run pg_amcheck (PostgreSQL 16 native corruption check)
kubectl exec -n featuresignals-system postgresql-0 -- \
  pg_amcheck -U postgres -d featuresignals --verbose
```

### 7.3 Verify Row Counts vs Expected

```bash
# Compare against known-good row counts
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -c "
  SELECT schemaname, tablename, n_live_tup as estimated_row_count
  FROM pg_stat_user_tables
  ORDER BY n_live_tup DESC;"
```

### 7.4 Application-Level Verification

```bash
# 1. Test API health
curl -s https://api.featuresignals.com/health | jq .

# 2. List flags via API
curl -s https://api.featuresignals.com/v1/flags | jq '. | length'

# 3. Run a test evaluation
curl -s -X POST https://api.featuresignals.com/v1/evaluate \
  -H "Content-Type: application/json" \
  -d '{"flag_key": "test-flag", "entity_id": "test-user", "context": {}}' | jq .

# 4. Check dashboard loads without errors
curl -s -o /dev/null -w "%{http_code}" https://app.featuresignals.com
# Expected: 200
```

