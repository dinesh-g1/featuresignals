## 1. Overview

FeatureSignals uses **cert-manager** with **Let's Encrypt** as the certificate authority (CA) for all TLS endpoints. Certificates are automatically renewed by cert-manager when they are within 30 days of expiry.

### Certificate Inventory

| Domain | Certificate Secret | Issuer | Purpose |
|--------|-------------------|--------|---------|
| `api.featuresignals.com` | `featuresignals-api-tls` | `letsencrypt-prod` | API server HTTPS |
| `app.featuresignals.com` | `featuresignals-dashboard-tls` | `letsencrypt-prod` | Dashboard HTTPS |

### How Auto-Renewal Works

1. cert-manager monitors Certificate resources for expiry
2. At 30 days before expiry, cert-manager begins renewal process
3. ACME HTTP-01 challenge is issued (Let's Encrypt verifies domain ownership)
4. Caddy ingress routes the challenge to cert-manager's solver pod
5. On success: new certificate is issued and stored in the Secret
6. Caddy ingress detects the updated Secret and reloads automatically
7. On failure: cert-manager retries with exponential backoff (up to 5 retries)

### Key Components

| Component | Namespace | Purpose |
|-----------|-----------|---------|
| cert-manager | `cert-manager` | Certificate lifecycle management |
| ClusterIssuer `letsencrypt-prod` | Cluster-wide | ACME account and challenge configuration |
| ClusterIssuer `letsencrypt-staging` | Cluster-wide | Testing issuer (untrusted certs, no rate limits) |
| Certificate resources | Per-namespace | Per-domain certificate definitions |
| Caddy Ingress Controller | `caddy-system` | Routes ACME challenges to cert-manager |

