# =============================================================================
# FeatureSignals — Backup System Kustomization
# =============================================================================
#
# Groups all backup-related resources for deployment as a single unit.
# Apply with:
#   kubectl apply -k deploy/k8s/backup/
#
# Or via kustomize:
#   kustomize build deploy/k8s/backup/ | kubectl apply -f -
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: featuresignals-system

namePrefix: fs-

commonLabels:
  app.kubernetes.io/name: fs-backup
  app.kubernetes.io/component: backup
  app.kubernetes.io/part-of: featuresignals
  app.kubernetes.io/managed-by: kustomize

resources:
  - pvc-hourly.yaml
  - cronjob-hourly.yaml
  - cronjob-daily.yaml

configMapGenerator:
  - name: backup-scripts
    files:
      - scripts/backup.sh
      - scripts/restore.sh
      - scripts/verify-backup.sh
    options:
      labels:
        app.kubernetes.io/name: backup-scripts
        app.kubernetes.io/component: scripts

configurations:
  - nameReference:
      - kind: ConfigMap
        version: v1
        fieldSpecs:
          - path: spec/jobTemplate/spec/template/spec/containers/[]/env/[]/valueFrom/configMapKeyRef/name
          - path: spec/jobTemplate/spec/template/spec/initContainers/[]/env/[]/valueFrom/configMapKeyRef/name
```
Now the PVC:```yaml
# =============================================================================
# FeatureSignals — Hourly Backup PersistentVolumeClaim
# =============================================================================
#
# Provides 10 GiB of local storage for short-term hourly PostgreSQL backups.
# Backups older than 24 hours are automatically pruned by the hourly CronJob.
#
# Storage class is determined by the cluster default. On k3s with local-path
# provisioner, this creates a hostPath-backed PVC on the node's local disk.
# =============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hourly-backups
  namespace: featuresignals-system
  labels:
    app.kubernetes.io/name: fs-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: featuresignals
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # No storageClassName specified — uses the cluster default.
  # On k3s this is typically the local-path provisioner.
  # For production with Hetzner CSI, specify: storageClassName: hcloud-volumes
```
Now the hourly CronJob:```yaml
# =============================================================================
# FeatureSignals — Hourly PostgreSQL Backup CronJob
# =============================================================================
#
# Runs every hour at minute 0 to create a local pg_dump compressed backup.
# Retains backups for 24 hours (1 day), auto-pruning anything older.
#
# Schedule: 0 * * * * (every hour)
# Retention: 24 hours (local, via PVC)
# Image:     bitnami/postgresql:16
# Storage:   10 GiB PVC mounted at /backups/hourly
# =============================================================================

apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-hourly
  namespace: featuresignals-system
  labels:
    app.kubernetes.io/name: fs-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: featuresignals
    backup-type: hourly
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 2
  successfulJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400  # Clean up completed jobs after 24h
      template:
        metadata:
          labels:
            app.kubernetes.io/name: fs-backup
            backup-type: hourly
          annotations:
            backup.featuresignals.io/type: hourly
            backup.featuresignals.io/retention: 24h
        spec:
          restartPolicy: Never
          serviceAccountName: featuresignals
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: hourly-backups
            - name: scripts
              configMap:
                name: backup-scripts
                defaultMode: 0555
            - name: tmp
              emptyDir: {}
          containers:
            - name: pg-dump
              image: bitnami/postgresql:16
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  # Source the backup script from ConfigMap
                  source /scripts/backup.sh hourly 1

                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Hourly backup completed successfully."
              env:
                - name: DB_HOST
                  value: "postgresql.featuresignals-system.svc.cluster.local"
                - name: DB_USER
                  value: "postgres"
                - name: DB_DATABASE
                  value: "featuresignals"
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: db-password
                - name: BACKUP_DIR
                  value: "/backups/hourly"
                - name: S3_ENDPOINT
                  value: ""
                - name: AWS_ACCESS_KEY_ID
                  value: ""
                - name: AWS_SECRET_ACCESS_KEY
                  value: ""
              envFrom:
                - secretRef:
                    name: storage-box-credentials
                    optional: true
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
```
Now the daily CronJob with init container pattern:```yaml
# =============================================================================
# FeatureSignals — Daily PostgreSQL Backup CronJob (S3/Storage Box)
# =============================================================================
#
# Runs daily at 2 AM to create a compressed pg_dump and upload it to the
# Hetzner Storage Box (S3-compatible). Uses a two-container pattern:
#
#   1. Init container (pg-dump): Creates the compressed SQL dump
#   2. Main container (aws-cli):  Uploads to S3 and manages retention
#
# Retention policy:
#   - Daily:   30 days
#   - Weekly:  12 weeks (Sunday backups promoted)
#   - Monthly: 12 months (1st-of-month backups promoted)
#
# Schedule: 0 2 * * * (2 AM daily)
# Image:    bitnami/postgresql:16 (init) + amazon/aws-cli (main)
# Storage:  emptyDir shared between init and main containers
# Target:   s3://fs-backups/{type}/featuresignals-{timestamp}.sql.gz
# =============================================================================

apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-daily
  namespace: featuresignals-system
  labels:
    app.kubernetes.io/name: fs-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: featuresignals
    backup-type: daily
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 2
  successfulJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 604800  # Clean up completed jobs after 7 days
      template:
        metadata:
          labels:
            app.kubernetes.io/name: fs-backup
            backup-type: daily
          annotations:
            backup.featuresignals.io/type: daily
            backup.featuresignals.io/retention: "30d-12w-12m"
        spec:
          restartPolicy: Never
          serviceAccountName: featuresignals
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
          volumes:
            - name: shared-data
              emptyDir: {}
            - name: scripts
              configMap:
                name: backup-scripts
                defaultMode: 0555
            - name: tmp
              emptyDir: {}

          # --- Init Container: pg_dump → gzip ---
          initContainers:
            - name: pg-dump
              image: bitnami/postgresql:16
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
                  FILENAME="featuresignals-${TIMESTAMP}.sql.gz"
                  BACKUP_PATH="/shared/${FILENAME}"

                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting pg_dump..."

                  pg_dump \
                    -h "${DB_HOST}" \
                    -U "${DB_USER}" \
                    -d "${DB_DATABASE}" \
                    --no-owner \
                    --no-privileges \
                    --no-acl \
                    --compress=9 \
                    --file="${BACKUP_PATH}"

                  # Verify the dump is valid
                  if [ ! -s "${BACKUP_PATH}" ]; then
                    echo "[ERROR] pg_dump produced an empty file"
                    exit 1
                  fi

                  # Write metadata for the main container
                  echo "${FILENAME}" > /shared/filename.txt
                  echo "${BACKUP_PATH}" > /shared/backup-path.txt
                  echo "$(stat -c%s "${BACKUP_PATH}")" > /shared/backup-size.txt

                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] pg_dump complete: ${FILENAME} ($(numfmt --to=iec "$(cat /shared/backup-size.txt)"))"
              env:
                - name: DB_HOST
                  value: "postgresql.featuresignals-system.svc.cluster.local"
                - name: DB_USER
                  value: "postgres"
                - name: DB_DATABASE
                  value: "featuresignals"
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: db-password
              volumeMounts:
                - name: shared-data
                  mountPath: /shared
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL

          # --- Main Container: S3 Upload + Retention Management ---
          containers:
            - name: aws-upload
              image: amazon/aws-cli:2.22
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  # Read metadata from init container
                  FILENAME="$(cat /shared/filename.txt)"
                  BACKUP_PATH="$(cat /shared/backup-path.txt)"
                  BACKUP_SIZE="$(cat /shared/backup-size.txt)"

                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Uploading ${FILENAME} to S3..."

                  # Determine backup type based on date
                  DAY_OF_WEEK="$(date -u +%u)"    # 1=Mon..7=Sun
                  DAY_OF_MONTH="$(date -u +%d)"

                  # Always upload to daily path
                  S3_DAILY="s3://fs-backups/daily/${FILENAME}"
                  aws s3 cp "${BACKUP_PATH}" "${S3_DAILY}" \
                    --endpoint-url "${S3_ENDPOINT}" \
                    --only-show-errors

                  echo "[OK] Uploaded daily backup: ${S3_DAILY}"

                  # Promote to weekly on Sundays
                  if [ "${DAY_OF_WEEK}" -eq 7 ]; then
                    S3_WEEKLY="s3://fs-backups/weekly/${FILENAME}"
                    aws s3 cp "${BACKUP_PATH}" "${S3_WEEKLY}" \
                      --endpoint-url "${S3_ENDPOINT}" \
                      --only-show-errors
                    echo "[OK] Promoted to weekly backup: ${S3_WEEKLY}"
                  fi

                  # Promote to monthly on 1st of month
                  if [ "${DAY_OF_MONTH}" -eq 1 ]; then
                    S3_MONTHLY="s3://fs-backups/monthly/${FILENAME}"
                    aws s3 cp "${BACKUP_PATH}" "${S3_MONTHLY}" \
                      --endpoint-url "${S3_ENDPOINT}" \
                      --only-show-errors
                    echo "[OK] Promoted to monthly backup: ${S3_MONTHLY}"
                  fi

                  # --- Verify backup was uploaded ---
                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Verifying upload..."
                  aws s3 ls "${S3_DAILY}" \
                    --endpoint-url "${S3_ENDPOINT}" \
                    --output text

                  # --- Retention: Clean up old S3 backups ---
                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Running S3 retention cleanup..."

                  # Daily retention: 30 days
                  DAILY_CUTOFF="$(date -u -d '-30 days' +%Y-%m-%dT%H:%M:%SZ)"
                  echo "[INFO] Removing daily backups older than ${DAILY_CUTOFF}..."
                  aws s3 ls s3://fs-backups/daily/ \
                    --endpoint-url "${S3_ENDPOINT}" \
                    --output text \
                    --query "Contents[?LastModified<'${DAILY_CUTOFF}'].[Key]" \
                  | while read -r key; do
                      if [ -n "${key}" ]; then
                        aws s3 rm "s3://fs-backups/daily/${key}" \
                          --endpoint-url "${S3_ENDPOINT}" \
                          --only-show-errors
                        echo "[DELETED] s3://fs-backups/daily/${key}"
                      fi
                    done

                  # Weekly retention: 12 weeks
                  WEEKLY_CUTOFF="$(date -u -d '-12 weeks' +%Y-%m-%dT%H:%M:%SZ)"
                  echo "[INFO] Removing weekly backups older than ${WEEKLY_CUTOFF}..."
                  aws s3 ls s3://fs-backups/weekly/ \
                    --endpoint-url "${S3_ENDPOINT}" \
                    --output text \
                    --query "Contents[?LastModified<'${WEEKLY_CUTOFF}'].[Key]" \
                  | while read -r key; do
                      if [ -n "${key}" ]; then
                        aws s3 rm "s3://fs-backups/weekly/${key}" \
                          --endpoint-url "${S3_ENDPOINT}" \
                          --only-show-errors
                        echo "[DELETED] s3://fs-backups/weekly/${key}"
                      fi
                    done

                  # Monthly retention: 12 months
                  MONTHLY_CUTOFF="$(date -u -d '-12 months' +%Y-%m-%dT%H:%M:%SZ)"
                  echo "[INFO] Removing monthly backups older than ${MONTHLY_CUTOFF}..."
                  aws s3 ls s3://fs-backups/monthly/ \
                    --endpoint-url "${S3_ENDPOINT}" \
                    --output text \
                    --query "Contents[?LastModified<'${MONTHLY_CUTOFF}'].[Key]" \
                  | while read -r key; do
                      if [ -n "${key}" ]; then
                        aws s3 rm "s3://fs-backups/monthly/${key}" \
                          --endpoint-url "${S3_ENDPOINT}" \
                          --only-show-errors
                        echo "[DELETED] s3://fs-backups/monthly/${key}"
                      fi
                    done

                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Daily backup to Storage Box completed successfully."
                  echo "[SUMMARY] File: ${FILENAME} | Size: $(numfmt --to=iec ${BACKUP_SIZE}) | Target: ${S3_DAILY}"
              env:
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: storage-box-credentials
                      key: endpoint
                      optional: true
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: storage-box-credentials
                      key: access-key-id
                      optional: true
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: storage-box-credentials
                      key: secret-access-key
                      optional: true
                - name: AWS_DEFAULT_REGION
                  value: "eu-central-1"  # Hetzner Storage Box region
              volumeMounts:
                - name: shared-data
                  mountPath: /shared
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
```
Now the backup.sh script:```bash
#!/usr/bin/env bash
# =============================================================================
# FeatureSignals — Unified Backup Script
# =============================================================================
#
# Creates a compressed PostgreSQL dump and uploads it to S3-compatible storage
# (Hetzner Storage Box). Handles retention cleanup for local and remote backups.
#
# Usage:
#   backup.sh <type> [retention_days]
#     type:          hourly|daily|weekly|monthly
#     retention_days: Number of days to retain local backups (default: 30)
#
# Environment variables:
#   DB_HOST          PostgreSQL host (default: postgresql)
#   DB_USER          PostgreSQL user (default: postgres)
#   DB_DATABASE      PostgreSQL database name (default: featuresignals)
#   PGPASSWORD       PostgreSQL password (REQUIRED)
#   BACKUP_DIR       Local backup root directory (default: /backups)
#   S3_ENDPOINT      S3-compatible endpoint URL (optional, for S3 upload)
#   AWS_ACCESS_KEY_ID     S3 access key (optional)
#   AWS_SECRET_ACCESS_KEY S3 secret key (optional)
#   S3_BUCKET        S3 bucket name (default: fs-backups)
#
# Examples:
#   PGPASSWORD=secret backup.sh hourly 1
#   PGPASSWORD=secret backup.sh daily 30
#   PGPASSWORD=secret S3_ENDPOINT=https://fs-backup.your-storage-box.de \
#     AWS_ACCESS_KEY_ID=xxx AWS_SECRET_ACCESS_KEY=yyy backup.sh daily 30
# =============================================================================

set -euo pipefail

# ---- Constants --------------------------------------------------------------

SCRIPT_NAME="$(basename "$0")"
VERSION="1.0.0"
LOG_PREFIX="[$(date -u +%Y-%m-%dT%H:%M:%SZ)] [${SCRIPT_NAME}]"

# ---- Functions --------------------------------------------------------------

log_info()  { echo "${LOG_PREFIX} [INFO]  $*"; }
log_warn()  { echo "${LOG_PREFIX} [WARN]  $*" >&2; }
log_error() { echo "${LOG_PREFIX} [ERROR] $*" >&2; }
log_fatal() { log_error "$@"; exit 1; }

# Cleanup handler for temporary files
cleanup() {
  local exit_code=$?
  if [ -n "${TMP_BACKUP:-}" ] && [ -f "${TMP_BACKUP:-}" ]; then
    rm -f "${TMP_BACKUP}"
    log_info "Cleaned up temporary file: ${TMP_BACKUP}"
  fi
  if [ -n "${TMP_DIR:-}" ] && [ -d "${TMP_DIR:-}" ]; then
    rm -rf "${TMP_DIR}"
    log_info "Cleaned up temporary directory: ${TMP_DIR}"
  fi
  if [ "${exit_code}" -ne 0 ]; then
    log_error "Backup failed with exit code ${exit_code}"
  fi
  exit "${exit_code}"
}
trap cleanup EXIT INT TERM

# Validate that required environment variables are set
validate_env() {
  if [ -z "${PGPASSWORD:-}" ]; then
    log_fatal "PGPASSWORD environment variable is required"
  fi

  # Validate DB connectivity before proceeding
  if ! pg_isready -h "${DB_HOST}" -U "${DB_USER}" -q -t 5 2>/dev/null; then
    log_fatal "Cannot connect to PostgreSQL at ${DB_HOST}. Is the database running?"
  fi
}

# Create backup directory structure
ensure_dirs() {
  mkdir -p "${BACKUP_DIR}/${TYPE}" "${BACKUP_DIR}/tmp"
  log_info "Backup directory: ${BACKUP_DIR}/${TYPE}"
}

# Perform pg_dump with compression
create_backup() {
  log_info "Starting pg_dump of database '${DB_DATABASE}' on '${DB_HOST}'..."

  pg_dump \
    -h "${DB_HOST}" \
    -U "${DB_USER}" \
    -d "${DB_DATABASE}" \
    --no-owner \
    --no-privileges \
    --no-acl \
    --compress=9 \
    --file="${LOCAL_PATH}"

  local file_size
  file_size="$(stat -c%s "${LOCAL_PATH}" 2>/dev/null || stat -f%z "${LOCAL_PATH}" 2>/dev/null)"

  if [ ! -s "${LOCAL_PATH}" ]; then
    log_fatal "pg_dump produced an empty file at ${LOCAL_PATH}"
  fi

  # Validate the gzip file integrity
  if ! gzip -t "${LOCAL_PATH}" 2>/dev/null; then
    log_fatal "Gzip integrity check failed for ${LOCAL_PATH}"
  fi

  log_info "pg_dump complete: ${FILENAME} ($(numfmt --to=iec "${file_size}" 2>/dev/null || echo "${file_size} bytes"))"
}

# Upload to S3-compatible storage
upload_to_s3() {
  if [ -z "${S3_ENDPOINT:-}" ] || [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
    log_warn "S3 credentials not fully configured — skipping S3 upload"
    return 0
  fi

  local s3_key="${S3_BUCKET}/${TYPE}/${FILENAME}"
  local s3_uri="s3://${s3_key}"

  log_info "Uploading to S3: ${s3_uri} (endpoint: ${S3_ENDPOINT})"

  if ! aws s3 cp "${LOCAL_PATH}" "${s3_uri}" \
    --endpoint-url "${S3_ENDPOINT}" \
    --only-show-errors; then
    log_error "S3 upload failed for ${s3_uri}"
    return 1
  fi

  # Verify the upload by checking the remote file exists and has matching size
  local remote_size
  remote_size="$(aws s3 ls "${s3_uri}" --endpoint-url "${S3_ENDPOINT}" --output text 2>/dev/null | awk '{print $3}')"
  local local_size
  local_size="$(stat -c%s "${LOCAL_PATH}" 2>/dev/null || stat -f%z "${LOCAL_PATH}" 2>/dev/null)"

  if [ "${remote_size}" != "${local_size}" ]; then
    log_error "S3 upload verification failed: local size ${local_size} != remote size ${remote_size}"
    return 1
  fi

  log_info "S3 upload verified: ${s3_uri} (${remote_size} bytes)"
  return 0
}

# Clean up old local backups beyond retention period
cleanup_local() {
  local cutoff_days="${RETENTION_DAYS}"
  log_info "Cleaning local backups older than ${cutoff_days} days in ${BACKUP_DIR}/${TYPE}"

  local deleted_count=0
  while IFS= read -r -d '' file; do
    rm -f "${file}"
    deleted_count=$((deleted_count + 1))
    log_info "Deleted local backup: ${file}"
  done < <(find "${BACKUP_DIR}/${TYPE}" -name "*.sql.gz" -type f -mtime "+${cutoff_days}" -print0 2>/dev/null || true)

  log_info "Local cleanup complete: removed ${deleted_count} file(s)"
}

# Clean up old S3 backups based on retention policy
cleanup_s3() {
  if [ -z "${S3_ENDPOINT:-}" ] || [ -z "${AWS_ACCESS_KEY_ID:-}" ]; then
    return 0
  fi

  local cutoff_date
  cutoff_date="$(date -u -d "-${RETENTION_DAYS} days" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || \
                 date -u -v "-${RETENTION_DAYS}d" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || \
                 echo "unknown")"

  if [ "${cutoff_date}" = "unknown" ]; then
    log_warn "Cannot compute cutoff date — skipping S3 cleanup"
    return 0
  fi

  log_info "Cleaning S3 backups older than ${cutoff_date} in ${S3_BUCKET}/${TYPE}/"

  # List old objects and delete them
  aws s3 ls "s3://${S3_BUCKET}/${TYPE}/" \
    --endpoint-url "${S3_ENDPOINT}" \
    --output text \
    --query "Contents[?LastModified<'${cutoff_date}'].[Key]" \
    2>/dev/null \
  | while read -r key; do
      if [ -n "${key}" ]; then
        aws s3 rm "s3://${S3_BUCKET}/${key}" \
          --endpoint-url "${S3_ENDPOINT}" \
          --only-show-errors 2>/dev/null && \
        log_info "Deleted S3 backup: s3://${S3_BUCKET}/${key}"
      fi
    done

  log_info "S3 cleanup complete"
}

# Print summary of the backup operation
print_summary() {
  local file_size
  file_size="$(stat -c%s "${LOCAL_PATH}" 2>/dev/null || stat -f%z "${LOCAL_PATH}" 2>/dev/null)"
  local human_size
  human_size="$(numfmt --to=iec "${file_size}" 2>/dev/null || echo "${file_size} bytes")"

  echo ""
  echo "============================================================================="
  echo "  BACKUP SUMMARY"
  echo "============================================================================="
  echo "  Type:      ${TYPE}"
  echo "  Database:  ${DB_DATABASE} on ${DB_HOST}"
  echo "  File:      ${FILENAME}"
  echo "  Size:      ${human_size}"
  echo "  Location:  ${LOCAL_PATH}"
  if [ -n "${S3_ENDPOINT:-}" ]; then
    echo "  S3 URI:    s3://${S3_BUCKET}/${TYPE}/${FILENAME}"
  fi
  echo "  Retention: ${RETENTION_DAYS} days"
  echo "  Status:    SUCCESS"
  echo "============================================================================="
}

# ---- Main -------------------------------------------------------------------

main() {
  # Parse arguments
  TYPE="${1:-daily}"
  RETENTION_DAYS="${2:-30}"

  # Validate backup type
  case "${TYPE}" in
    hourly)   RETENTION_DAYS="${RETENTION_DAYS:-1}" ;;
    daily)    RETENTION_DAYS="${RETENTION_DAYS:-30}" ;;
    weekly)   RETENTION_DAYS="${RETENTION_DAYS:-84}" ;;   # 12 weeks
    monthly)  RETENTION_DAYS="${RETENTION_DAYS:-365}" ;;  # 12 months
    *)
      log_fatal "Invalid backup type '${TYPE}'. Must be: hourly, daily, weekly, or monthly"
      ;;
  esac

  # Configuration with defaults
  DB_HOST="${DB_HOST:-postgresql}"
  DB_USER="${DB_USER:-postgres}"
  DB_DATABASE="${DB_DATABASE:-featuresignals}"
  BACKUP_DIR="${BACKUP_DIR:-/backups}"
  S3_ENDPOINT="${S3_ENDPOINT:-}"
  S3_BUCKET="${S3_BUCKET:-fs-backups}"

  # Derived values
  TIMESTAMP="$(date -u +%Y%m%d-%H%M%S)"
  FILENAME="featuresignals-${TIMESTAMP}.sql.gz"
  LOCAL_PATH="${BACKUP_DIR}/${TYPE}/${FILENAME}"
  TMP_BACKUP=""

  echo ""
  echo "============================================================================="
  echo "  FeatureSignals Backup v${VERSION}"
  echo "============================================================================="
  log_info "Starting ${TYPE} backup..."

  # Pre-flight checks
  validate_env
  ensure_dirs

  # Execute backup
  create_backup

