## 7. etcd / Control Plane Failure

### Severity
**CRITICAL** — P0 (cluster management unavailable)

### Trigger
- `kubectl` commands fail with connection refused
- k3s service is not running
- `journalctl -u k3s` shows etcd errors
- Node is unreachable via SSH

### Impact
- Complete loss of cluster management capability
- Running workloads may continue but cannot be managed
- If etcd data is corrupted, all cluster state is lost
- This is a full rebuild scenario

### Recovery Steps

#### Step 1: Attempt to Restart k3s

```bash
# SSH into the node
ssh root@<SERVER_IP>

# Check k3s service status
systemctl status k3s

# Try restarting
systemctl restart k3s

# Check logs
journalctl -u k3s --tail=100 -n 50

# Check if the data directory exists
ls -la /var/lib/rancher/k3s/server/db/
```

#### Step 2: If k3s Cannot Start

If k3s cannot be restarted and etcd data is corrupted, the cluster must be rebuilt from scratch. Follow the [Full VPS Loss](#1-full-vps-loss) recovery procedure.

The key consideration is that **application data (PostgreSQL) is separate from cluster state (etcd)**. Since PostgreSQL runs as a Helm chart with persistent volumes, the PV data may still be intact even if etcd is lost.

#### Step 3: Preserve PV Data

```bash
# Check if PV data still exists on disk
ls -la /var/lib/rancher/k3s/storage/

# These are the PostgreSQL data files
# They can be mounted in a new cluster
```

### Verification
```bash
# After rebuilding, verify:
kubectl get nodes
kubectl get pods --all-namespaces
```

### Rollback
- If a k3s version upgrade caused the issue, downgrade k3s
- Restore etcd from backup if available (`/var/lib/rancher/k3s/server/db/etcd/`)

### Post-Recovery
- [ ] Schedule regular etcd backups
- [ ] Ensure k3s version is stable and tested
- [ ] Document the rebuild process

