## 4. Debugging Certificate Issues

### 4.1 Certificate Not Being Issued

**Symptom:** Certificate remains in a pending state:
```
NAME                      READY   SECRET                    AGE
featuresignals-api-tls    False   featuresignals-api-tls     10m
```

**Diagnosis steps:**

```bash
# 1. Check the Certificate status conditions
kubectl describe certificate -n featuresignals-system featuresignals-api-tls

# Look for conditions like:
#   Type: Ready, Status: False, Reason: DoesNotExist
#   Type: Issuing, Status: True

# 2. Check certificate request resources
kubectl get certificaterequest --all-namespaces

# 3. Describe the failed request
kubectl describe certificaterequest -n featuresignals-system \
  <certificate-request-name>

# 4. Check order and challenge resources
kubectl get orders --all-namespaces
kubectl describe order -n featuresignals-system <order-name>

kubectl get challenges --all-namespaces
kubectl describe challenge -n featuresignals-system <challenge-name>
```

**Common issues and fixes:**

| Issue | Check | Fix |
|-------|-------|-----|
| **DNS not resolving** | `dig api.featuresignals.com` returns wrong IP | Update DNS A record |
| **HTTP-01 challenge not reachable** | `curl http://api.featuresignals.com/.well-known/acme-challenge/test` returns 404 | Check ingress routing for `.well-known` path |
| **Rate limited** | cert-manager logs show `urn:ietf:params:acme:error:rateLimited` | Use staging issuer temporarily |
| **Ingress class mismatch** | `kubectl get ingress -A` shows wrong class | Set annotation `kubernetes.io/ingress.class: caddy` |
| **ACME account key invalid** | `kubectl describe clusterissuer letsencrypt-prod` shows account error | Delete the account key secret, cert-manager recreates |
| **DNS-01 challenge fails** | ClusterIssuer uses DNS-01 but DNS provider not configured | Switch to HTTP-01 challenge |

### 4.2 Certificate Expired

**Symptom:** Browser shows "Your connection is not private", `curl` returns SSL errors

**Emergency fix:**

```bash
# 1. Force immediate re-issuance
kubectl delete secret -n featuresignals-system featuresignals-api-tls

# 2. Trigger the renewal
kubectl annotate certificate -n featuresignals-system featuresignals-api-tls \
  cert-manager.io/issue-temporary-certificate="true" \
  --overwrite

# 3. Watch for the new certificate
kubectl get certificates -n featuresignals-system --watch

# 4. Once Ready=True, verify
echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -dates
```

### 4.3 cert-manager Pod Not Running

**Symptom:** No pods in `cert-manager` namespace, certificates not being issued

```bash
# 1. Check cert-manager namespace
kubectl get pods -n cert-manager

# If empty, cert-manager was never installed or was deleted:

# 2. Reinstall cert-manager
kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.15.0/cert-manager.yaml

# 3. Wait for all pods to be ready
kubectl wait --namespace cert-manager \
  --for=condition=Ready pod \
  --selector=app.kubernetes.io/name=cert-manager \
  --timeout=120s

# 4. Reapply the ClusterIssuer
export ACME_EMAIL="admin@featuresignals.com"
envsubst < deploy/k8s/infra/cert-manager/cluster-issuer.yaml \
  | kubectl apply -f -

# 5. Verify ClusterIssuer status
kubectl get clusterissuer letsencrypt-prod
# Should show: READY=True
```

### 4.4 Let's Encrypt Rate Limiting

Let's Encrypt has the following rate limits:
- **50 certificates per domain per week**
- **5 certificates per domain per week** (same set of hostnames)
- **300 orders per account per 3 hours**

**If rate limited:**

```bash
# 1. Switch to staging issuer to verify the challenge works
kubectl annotate ingress -n featuresignals-system featuresignals-api \
  cert-manager.io/cluster-issuer=letsencrypt-staging \
  --overwrite

# 2. Wait for staging certificate (will be untrusted)
kubectl get certificates -n featuresignals-system --watch

# 3. Verify the staging cert was issued (ignore browser warning)
echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -issuer
# Should show: CN = (STAGING) Let's Encrypt

# 4. Switch back to production issuer
kubectl annotate ingress -n featuresignals-system featuresignals-api \
  cert-manager.io/cluster-issuer=letsencrypt-prod \
  --overwrite

# 5. Wait for production certificate
kubectl get certificates -n featuresignals-system --watch
```

### 4.5 Caddy Not Picking Up New Certificate

**Symptom:** Certificate Secret is updated but old cert is still served

```bash
# 1. Check Caddy logs
kubectl logs -n caddy-system -l app.kubernetes.io/name=caddy --tail=50

# 2. Force Caddy to reload its configuration
kubectl delete pod -n caddy-system -l app.kubernetes.io/name=caddy

# 3. Wait for Caddy to restart and verify
kubectl get pods -n caddy-system --watch

# 4. Check the new certificate is being served
echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -dates
```

