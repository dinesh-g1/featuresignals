## 1. Full VPS Loss

### Severity
**CRITICAL** — P0 (complete service outage)

### Trigger
- VPS is unreachable via SSH
- All services return connection timeouts
- Hetzner Cloud Console shows the server as stopped or unreachable
- Monitoring alerts: `HostDown`, `APIUnreachable`, `DashboardUnreachable`

### Impact
- Complete feature flag evaluation outage for all customers
- Dashboard and management API completely unavailable
- All SDK evaluation requests will fail (unless SDKs have local cache)
- Data loss potential: up to 1 hour (RPO depends on last hourly backup)

### Pre-requisites
- Access to [Hetzner Cloud Console](https://console.hetzner.cloud)
- Hetzner API token (stored in 1Password or Bitwarden)
- SSH key pair for the VPS (stored securely)
- Latest backup files accessible (local hourly + S3 daily)
- This runbook printed or available offline
- Hetzner Storage Box credentials (for S3 backups)

### Recovery Steps

#### Phase 1: Assessment (5 minutes)

```bash
# 1. Verify server status via Hetzner API
curl -s -H "Authorization: Bearer ${HETZNER_API_TOKEN}" \
  https://api.hetzner.cloud/v1/servers \
  | jq '.servers[] | select(.name=="featuresignals-prod") | {name, status, public_net}'

# 2. Check if the server is just stopped or completely gone
#    If status is "stopped" → try restart first
#    If server is missing → proceed with re-provisioning
```

If the server is **stopped** (not deleted):
```bash
# Try restarting
curl -X POST -H "Authorization: Bearer ${HETZNER_API_TOKEN}" \
  https://api.hetzner.cloud/v1/servers/${SERVER_ID}/actions/poweron

# Wait 2 minutes, then check if services come back
ssh deploy@<SERVER_IP> "kubectl get nodes && kubectl get pods --all-namespaces"
```

If the server is **deleted** or restart fails, proceed to Phase 2.

#### Phase 2: Provision New VPS (15 minutes)

```bash
# 1. Create new CPX42 in same region
curl -X POST -H "Authorization: Bearer ${HETZNER_API_TOKEN}" \
  -H "Content-Type: application/json" \
  -d '{
    "name": "featuresignals-prod",
    "server_type": "cpx42",
    "image": "ubuntu-24.04",
    "location": "hel1",
    "ssh_keys": ["your-ssh-key-name"],
    "volumes": [],
    "networks": [],
    "automount": false
  }' \
  https://api.hetzner.cloud/v1/servers

# 2. Note the new server's IP address
# 3. Update DNS records (if IP changed)
```

**DNS Update (if IP changed):**
```bash
# Update A records for api.featuresignals.com and app.featuresignals.com
# via Cloudflare API
curl -X PUT "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${API_RECORD_ID}" \
  -H "Authorization: Bearer ${CF_API_TOKEN}" \
  -H "Content-Type: application/json" \
  -d "{\"type\":\"A\",\"name\":\"api.featuresignals.com\",\"content\":\"${NEW_IP}\",\"ttl\":120,\"proxied\":true}"
```

#### Phase 3: Bootstrap k3s (10 minutes)

```bash
# 1. SSH into the new server
ssh root@<NEW_IP>

# 2. Run the k3s bootstrap
cd /opt/featuresignals/deploy/k3s
bash bootstrap.sh

# 3. Verify cluster is operational
kubectl get nodes
kubectl get pods --all-namespaces
```

#### Phase 4: Restore Infrastructure (15 minutes)

```bash
# 1. Deploy infrastructure components
cd /opt/featuresignals/deploy/k8s/infra
bash install.sh

# 2. Deploy PostgreSQL (Bitnami Helm chart)
helm upgrade --install postgresql oci://registry-1.docker.io/bitnamicharts/postgresql \
  --namespace featuresignals-system \
  --create-namespace \
  --version ~15.5.0 \
  --values /opt/featuresignals/deploy/k8s/helm/featuresignals/values.yaml \
  --set global.postgresql.auth.existingSecret=db-credentials \
  --wait \
  --timeout 10m

# 3. Wait for PostgreSQL to be ready
kubectl wait --namespace featuresignals-system \
  --for=condition=ready pod \
  --selector=app.kubernetes.io/instance=postgresql \
  --timeout=300s
```

#### Phase 5: Restore Database from Backup (varies by size, typically 5-30 minutes)

```bash
# 1. Identify the latest S3 backup
aws s3 ls s3://fs-backups/daily/ \
  --endpoint-url ${HETZNER_STORAGE_BOX_URL} \
  --output text \
  --query "reverse(sort_by(Contents, &LastModified))[0].[Key]" \
  | awk '{print "s3://fs-backups/daily/"$1}'

# 2. Get the database password
export PGPASSWORD=$(kubectl get secret db-credentials -n featuresignals-system \
  -o jsonpath='{.data.db-password}' | base64 -d)

# 3. Download and restore the backup
aws s3 cp s3://fs-backups/daily/LATEST_BACKUP.sql.gz - \
  --endpoint-url ${HETZNER_STORAGE_BOX_URL} \
  | gunzip \
  | kubectl exec -i -n featuresignals-system \
    postgresql-0 -- \
    psql -U postgres -d featuresignals
```

#### Phase 6: Deploy Application (10 minutes)

```bash
# 1. Deploy the main application
cd /opt/featuresignals/deploy/k8s
make app-deploy

# 2. Verify all pods are running
kubectl get pods --all-namespaces

# 3. Run database migrations if needed
kubectl create job --namespace featuresignals-system \
  --from=cronjob/featuresignals-db-migrate \
  db-migrate-manual-$(date +%s)

# 4. Verify the health endpoint
curl -s https://api.featuresignals.com/health | jq .
```

#### Phase 7: Restore Backup Infrastructure (10 minutes)

```bash
# 1. Deploy backup CronJobs
kubectl apply -k /opt/featuresignals/deploy/k8s/backup/

# 2. Test backup immediately
kubectl create job --namespace featuresignals-system \
  --from=cronjob/fs-backup-hourly \
  backup-manual-verify-$(date +%s)

# 3. Verify backup ran successfully
kubectl logs --namespace featuresignals-system \
  job/backup-manual-verify-$(date +%s)
```

### Verification
```bash
# 1. Check all pods are running
kubectl get pods --all-namespaces --field-selector=status.phase!=Running

# 2. Verify API health
curl -s https://api.featuresignals.com/health
# Expected: {"status":"ok","version":"x.y.z"}

# 3. Verify dashboard loads
curl -s -o /dev/null -w "%{http_code}" https://app.featuresignals.com
# Expected: 200

# 4. Verify database has data
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -c \
  "SELECT count(*) FROM organizations;"

# 5. Verify TLS certificate
curl -sI https://api.featuresignals.com | grep -i "strict-transport-security"

# 6. Run E2E smoke test
./deploy/scripts/smoke-test.sh
```

### Rollback
- If restore fails, try a different backup (hourly → weekly → monthly)
- Keep the old VPS floating IP reassigned if possible
- If database restore is corrupted, restore to a previous backup and accept data loss

### Post-Recovery
- [ ] Update DNS TTL back to normal (300s → 3600s after propagation)
- [ ] Verify monitoring alerts are green
- [ ] Notify customers of incident resolution
- [ ] Run blameless post-mortem within 48 hours
- [ ] Verify backup CronJobs are running on schedule
- [ ] Update this runbook with lessons learned

---

## 2. Database Corruption

### Severity
**CRITICAL** — P0 (data integrity compromised)

### Trigger
- Application errors with SQL constraint violations
- `ERROR: duplicate key value violates unique constraint`
- `ERROR: missing chunk number` in PostgreSQL logs
- Monitoring alert: `QueryErrorRate > 5%`
- Users reporting data inconsistencies
- Checksum verification failures

### Impact
- Partial or complete data unavailability
- Incorrect feature flag evaluations
- Potential for cascading corruption to dependent services
- Customer trust erosion if data loss is visible

### Pre-requisites
- `kubectl` access to the cluster
- Database credentials (from `db-credentials` secret)
- S3 endpoint and credentials for backup access
- At least one known-good backup identified

### Recovery Steps

#### Step 1: Assess Corruption Scope

```bash
# 1. Check PostgreSQL logs for corruption errors
kubectl logs -n featuresignals-system postgresql-0 --tail=200 \
  | grep -iE "corrupt|checksum|missing|invalid page|WARNING"

# 2. Check application error rate
kubectl logs -n featuresignals-system \
  --selector=app.kubernetes.io/name=featuresignals \
  --tail=100 | grep -iE "ERROR|PANIC|FATAL"

# 3. Run pg_amcheck for physical corruption
kubectl exec -n featuresignals-system postgresql-0 -- \
  pg_amcheck -U postgres -d featuresignals --verbose
```

#### Step 2: Isolate and Protect

```bash
# 1. Scale down the API to prevent further writes
kubectl scale deployment -n featuresignals-system \
  featuresignals-server --replicas=0

# 2. Create a pg_dump of corrupted database for forensic analysis
kubectl exec -n featuresignals-system postgresql-0 -- \
  pg_dump -U postgres -d featuresignals \
  --no-owner --compress=9 \
  > /tmp/corrupted-dump-$(date +%Y%m%d).sql.gz
```

#### Step 3: Identify Good Backup

```bash
# 1. List available backups
echo "=== DAILY BACKUPS ==="
aws s3 ls s3://fs-backups/daily/ \
  --endpoint-url ${HETZNER_STORAGE_BOX_URL} \
  --output text --query "reverse(sort_by(Contents, &LastModified))[:10].[Key,LastModified,Size]"

echo "=== WEEKLY BACKUPS ==="
aws s3 ls s3://fs-backups/weekly/ \
  --endpoint-url ${HETZNER_STORAGE_BOX_URL} \
  --output text --query "reverse(sort_by(Contents, &LastModified))[:5].[Key,LastModified,Size]"

echo "=== HOURLY BACKUPS (local) ==="
ls -lh /mnt/data/backups/hourly/ | tail -25

# 2. Verify a specific backup integrity
./deploy/k8s/backup/scripts/verify-backup.sh \
  s3://fs-backups/daily/featuresignals-20240101-020000.sql.gz
```

#### Step 4: Restore from Clean Backup

```bash
# 1. Execute restore
export PGPASSWORD=$(kubectl get secret db-credentials -n featuresignals-system \
  -o jsonpath='{.data.db-password}' | base64 -d)

./deploy/k8s/backup/scripts/restore.sh \
  s3://fs-backups/daily/featuresignals-20240101-020000.sql.gz

# 2. Verify data integrity after restore
kubectl exec -n featuresignals-system postgresql-0 -- \
  pg_amcheck -U postgres -d featuresignals --verbose
```

#### Step 5: Restore Application

```bash
# 1. Scale the API back up
kubectl scale deployment -n featuresignals-system \
  featuresignals-server --replicas=2

# 2. Verify application health
curl -s https://api.featuresignals.com/health | jq .
```

### Verification
```bash
# 1. Run pg_amcheck (should pass with zero errors)
kubectl exec postgresql-0 -n featuresignals-system -- \
  pg_amcheck -U postgres -d featuresignals

# 2. Check table row counts match expected
kubectl exec postgresql-0 -n featuresignals-system -- \
  psql -U postgres -d featuresignals -c "
  SELECT schemaname, tablename, n_live_tup
  FROM pg_stat_user_tables
  ORDER BY n_live_tup DESC;"

# 3. Verify API responses are correct
curl -s https://api.featuresignals.com/v1/flags | jq '.data | length'
```

### Rollback
- If the restored database has issues, restore from an earlier backup
- If corruption is limited to specific tables, consider table-level restore instead of full database restore
- Keep the corrupted dump for post-mortem analysis

### Post-Recovery
- [ ] Run full backup verification against the restored database
- [ ] Schedule emergency maintenance window if needed
- [ ] Investigate root cause of corruption
- [ ] Add additional monitoring for corruption detection
- [ ] Consider enabling `data_checksums` on PostgreSQL (requires restart)

---

## 3. Accidental Data Deletion

### Severity
**HIGH** — P1 (data loss, service partially affected)

### Trigger
- User reports missing flags, segments, or projects
- `DELETE` query was run accidentally
- Application logs show unexpected deletions
- Audit log shows user action that was not intended

### Impact
- Loss of customer feature flag configuration
- Feature flag evaluations may return incorrect results
- Depending on scope: individual flag loss up to full project loss
- No customer-facing outage unless critical flags are deleted

### Pre-requisites
- Database credentials
- Audit log access (if available)
- Recent backup identified
- Knowledge of what data was deleted and when

### Recovery Steps

#### Step 1: Assess the Damage

```bash
# 1. Check audit logs for deletion events
kubectl logs -n featuresignals-system \
  --selector=app.kubernetes.io/name=featuresignals \
  --since=2h | grep -iE "DELETE|delete|removed"

# 2. Determine scope of deletion
#    - What tables were affected?
#    - Which organization/project?
#    - What time did it happen?

# 3. Check PostgreSQL for recent transactions
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -c "
  SELECT xact_start, query_start, query
  FROM pg_stat_activity
  WHERE state != 'idle'
    AND query ILIKE '%DELETE%'
  ORDER BY query_start DESC
  LIMIT 10;"
```

#### Step 2: Decide Recovery Strategy

**Option A: Table-Level Restore (if table-level backup exists)**
```bash
# Restore specific tables from a backup
gunzip -c /mnt/data/backups/daily/featuresignals-20240101-020000.sql.gz \
  | grep -E "COPY public\.(flags|segments)" \
  | kubectl exec -i -n featuresignals-system postgresql-0 -- \
    psql -U postgres -d featuresignals
```

**Option B: Point-in-Time Recovery (if WAL archiving is enabled)**
```bash
# Use pg_restore with --data-only for specific tables
```

**Option C: Full Database Restore (if multiple tables affected)**
```bash
# Follow the database restore runbook
# Then export the specific data and import into the current database
export PGPASSWORD=$(kubectl get secret db-credentials -n featuresignals-system \
  -o jsonpath='{.data.db-password}' | base64 -d)

# Restore to a temporary database and extract the needed data
./deploy/k8s/backup/scripts/restore.sh \
  /mnt/data/backups/daily/featuresignals-20240101-020000.sql.gz

# After restore, export the specific tables
pg_dump -h restored-host -U postgres -d featuresignals \
  --table=flags --table=flag_rules --data-only \
  > recovered_flags.sql

# Import into production
psql -h postgresql.featuresignals-system -U postgres -d featuresignals \
  < recovered_flags.sql
```

#### Step 3: Apply Fixes

```bash
# 1. Import the recovered data
kubectl exec -i -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals < recovered_flags.sql

# 2. Verify the data is restored
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -c \
  "SELECT key, name, enabled FROM flags WHERE deleted_at IS NULL;"
```

### Verification
```bash
# 1. Check that deleted records are restored
kubectl exec postgresql-0 -n featuresignals-system -- \
  psql -U postgres -d featuresignals -c \
  "SELECT count(*) FROM flags WHERE key = 'restored-flag-key';"

# 2. Verify via the API
curl -s https://api.featuresignals.com/v1/flags | jq '.data[] | select(.key=="restored-flag-key")'

# 3. Check dashboard displays restored data
```

### Rollback
- If restore introduces conflicts, revert to the previous state by restoring from pre-restore backup
- If point-in-time recovery is needed and data is still within retention window, use WAL archive

### Post-Recovery
- [ ] Implement soft-delete (`deleted_at`) if not already in place
- [ ] Add confirmation dialog for destructive actions in the dashboard
- [ ] Audit user permissions — was this user authorized?
- [ ] Consider adding a "recycle bin" feature
- [ ] Increase backup frequency if recovery time was too long

---

## 4. Certificate Expiration

### Severity
**HIGH** — P1 (TLS handshake failures)

### Trigger
- Monitoring alerts: `CertificateExpiring`, `TLSHandshakeFailure`
- Browser shows "Your connection is not private" warning
- `curl` returns `SSL certificate problem: certificate has expired`
- cert-manager logs show renewal failures
- Let's Encrypt expiry emails received

### Impact
- All HTTPS traffic to API and dashboard will fail
- SDKs will fail to connect (unless configured with HTTP)
- Full service disruption for external clients
- Internal cluster communication may still work (internal TLS uses different certs)

### Pre-requisites
- `kubectl` access to the cluster
- cert-manager installed and running
- ClusterIssuer configured (`letsencrypt-prod`)
- DNS records pointing to the cluster (A records for domains)

### Recovery Steps

#### Step 1: Diagnose Certificate Status

```bash
# 1. Check all certificate resources
kubectl get certificates --all-namespaces

# 2. Check certificate details
kubectl describe certificate -n featuresignals-system featuresignals-api-tls
kubectl describe certificate -n featuresignals-saas featuresignals-dashboard-tls

# 3. Check cert-manager logs for errors
kubectl logs -n cert-manager -l app.kubernetes.io/name=cert-manager --tail=50

# 4. Check certificate expiry dates
kubectl get certificates --all-namespaces -o jsonpath='{range .items[*]}{.metadata.namespace}{"/"}{.metadata.name}{" expires: "}{.status.notAfter}{"\n"}{end}'

# 5. Check the actual certificate on the endpoint
echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -dates
```

#### Step 2: Verify DNS Resolution

```bash
# 1. Verify DNS records resolve to the cluster IP
dig +short api.featuresignals.com
dig +short app.featuresignals.com

# 2. Check ingress status
kubectl get ingress --all-namespaces
kubectl describe ingress -n featuresignals-system featuresignals-api
```

#### Step 3: Force Certificate Renewal

```bash
# 1. Delete the certificate secret to force re-issuance
kubectl delete secret -n featuresignals-system featuresignals-api-tls

# 2. Delete the certificate resource
kubectl delete certificate -n featuresignals-system featuresignals-api-tls

# 3. Verify the Ingress triggers re-creation
kubectl describe ingress -n featuresignals-system featuresignals-api

# 4. Watch the renewal process
kubectl get certificates --all-namespaces --watch

# 5. Check cert-manager logs for the renewal
kubectl logs -n cert-manager -l app.kubernetes.io/name=cert-manager --tail=50
```

#### Step 4: Verify New Certificate

```bash
# 1. Wait for the certificate to be ready (typically 30-60 seconds)
kubectl wait --namespace featuresignals-system \
  --for=condition=Ready certificate featuresignals-api-tls \
  --timeout=300s

# 2. Check the new certificate expiry
echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -dates

# 3. Verify TLS handshake works
curl -sI https://api.featuresignals.com/health

# 4. Check the full certificate chain
echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -text | grep -E "Subject:|Issuer:|Not Before|Not After"
```

### Common Issues and Fixes

**Issue: cert-manager not installed**
```bash
kubectl get pods -n cert-manager
# If empty, install cert-manager:
kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.15.0/cert-manager.yaml
```

**Issue: ClusterIssuer not configured**
```bash
kubectl get clusterissuer
# If missing, apply the ClusterIssuer:
export ACME_EMAIL="admin@featuresignals.com"
envsubst < deploy/k8s/infra/cert-manager/cluster-issuer.yaml | kubectl apply -f -
```

**Issue: Let's Encrypt rate limiting**
```bash
# Check for rate limit errors in cert-manager logs
kubectl logs -n cert-manager -l app.kubernetes.io/name=cert-manager \
  | grep -i "rate limit"

# Solution: Use the staging issuer temporarily, then switch back
kubectl edit ingress -n featuresignals-system featuresignals-api
# Change annotation: cert-manager.io/cluster-issuer: letsencrypt-staging
```

**Issue: ACME challenge fails (HTTP-01)**
```bash
# Verify ingress is accessible from the internet
curl -s http://api.featuresignals.com/.well-known/acme-challenge/test

# Check Caddy ingress controller
kubectl logs -n caddy-system -l app.kubernetes.io/name=caddy --tail=50
```

### Verification
```bash
# 1. HTTPS works for both domains
curl -sI https://api.featuresignals.com/health
curl -sI https://app.featuresignals.com

# 2. Certificate is valid for at least 80 days (Let's Encrypt issues 90-day certs)
echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -dates

# 3. All certificate resources show Ready=True
kubectl get certificates --all-namespaces
```

### Rollback
- Restore the previous certificate secret from backup if available
- Switch to the staging issuer temporarily while debugging production issuer issues
- If DNS is the problem, switch to HTTP-01 challenge if DNS-01 is configured

### Post-Recovery
- [ ] Set up certificate expiry monitoring alerts at 30, 15, and 7 days before expiry
- [ ] Verify cert-manager auto-renewal is working
- [ ] Document any manual intervention steps in this runbook
- [ ] Consider setting up a dedicated certificate renewal CronJob as backup

