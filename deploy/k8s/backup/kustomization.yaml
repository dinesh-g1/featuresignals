## 3. Certificate Renewal

### 3.1 Normal Auto-Renewal (Expected Behavior)

Under normal circumstances, no action is needed. cert-manager automatically renews certificates when they reach 30 days before expiry. You can verify auto-renewal is working:

```bash
# 1. Check that the Certificate has the auto-renewal annotation
kubectl get certificate -n featuresignals-system featuresignals-api-tls \
  -o jsonpath='{.spec.renewBefore}'
# Expected output: 720h (30 days)

# 2. Verify the last renewal time
kubectl get certificate -n featuresignals-system featuresignals-api-tls \
  -o jsonpath='{.status.lastFailureTime}'
# Should be empty if no failures

kubectl get certificate -n featuresignals-system featuresignals-api-tls \
  -o jsonpath='{.status.renewalTime}'
# Shows when the certificate was last renewed

# 3. Check renewal conditions
kubectl get certificate -n featuresignals-system featuresignals-api-tls \
  -o jsonpath='{range .status.conditions[*]}{.type}{"\t"}{.status}{"\t"}{.reason}{"\t"}{.message}{"\n"}{end}'
```

### 3.2 Forced Renewal (Manual Trigger)

Use this when:
- A certificate is expiring soon and auto-renewal hasn't triggered
- A certificate configuration has changed (e.g., new SANs)
- You want to rotate certificates immediately

```bash
# Method 1: Delete the Certificate resource (recreated by Ingress controller)
# WARNING: This will cause a brief TLS interruption while the new cert is issued

kubectl delete certificate -n featuresignals-system featuresignals-api-tls

# Wait for cert-manager to re-issue
kubectl get certificates -n featuresignals-system --watch

# Method 2: Delete only the Secret (preserves Certificate resource)
# The Certificate controller will detect the missing Secret and re-issue

kubectl delete secret -n featuresignals-system featuresignals-api-tls

# Watch the re-issuance
kubectl get certificates -n featuresignals-system --watch
kubectl get events -n featuresignals-system --watch

# Method 3: Update the renewal time annotation
# This tells cert-manager to treat the cert as if it's expiring

kubectl annotate certificate -n featuresignals-system featuresignals-api-tls \
  cert-manager.io/issue-temporary-certificate="true" \
  --overwrite

# Watch the renewal
kubectl get certificates -n featuresignals-system -w
```

### 3.3 Using the Makefile Shortcut

```bash
# From the deploy/k8s directory
cd deploy/k8s
make cert-renew

# This triggers renewal for all certificates in the cluster
# by deleting Certificate resources and letting them be recreated
```

### 3.4 Verify Renewal Succeeded

```bash
# 1. Wait for the new certificate to be ready
kubectl wait --namespace featuresignals-system \
  --for=condition=Ready certificate featuresignals-api-tls \
  --timeout=300s

# 2. Verify the new certificate dates
echo | openssl s_client -servername api.featuresignals.com \
  -connect api.featuresignals.com:443 2>/dev/null \
  | openssl x509 -noout -dates

# 3. Confirm the certificate is trusted
curl -sI https://api.featuresignals.com/health | head -5

# 4. Check for any errors in cert-manager logs
kubectl logs -n cert-manager -l app.kubernetes.io/name=cert-manager --tail=20
```

