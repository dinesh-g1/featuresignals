  log_info "Validating gzip integrity..."
  if ! gzip -t "${BACKUP_FILE}" 2>/dev/null; then
    log_fatal "Gzip integrity check failed. The backup file may be corrupted: ${BACKUP_FILE}"
  fi
  log_info "Gzip integrity check passed"
}

# Inspect backup contents (show database objects)
inspect_backup() {
  log_step "Inspecting Backup Contents"

  log_info "Examining database objects in backup..."

