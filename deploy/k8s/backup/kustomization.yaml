## 8. Rolling Back a Failed Restore

### 8.1 Recognizing a Failed Restore

Signs of a failed restore:

| Symptom | Likely Cause |
|---------|-------------|
| `ERROR: relation "xyz" already exists` | Restore was run twice |
| `ERROR: duplicate key value violates unique constraint` | Data conflict |
| `ERROR: invalid input syntax for type uuid` | Corrupted backup |
| Zero rows in all tables | Backup was empty or restore failed silently |
| Application starts but shows old/wrong data | Restore targeted wrong database |
| `PANIC: could not read block` | Corrupted backup file |
| PostgreSQL won't start | Corrupted system catalogs |

### 8.2 Immediate Rollback Steps

```bash
# 1. STOP the application to prevent further writes
kubectl scale deployment -n featuresignals-system \
  featuresignals-server --replicas=0

# 2. Identify a known-good backup
#    (a previous backup that you know was verified)
aws s3 ls s3://fs-backups/daily/ \
  --endpoint-url ${S3_ENDPOINT} \
  --output text \
  --query "reverse(sort_by(Contents, &LastModified))[:5].[Key,LastModified]"

# 3. Restore from the known-good backup
export PGPASSWORD=$(kubectl get secret db-credentials -n featuresignals-system \
  -o jsonpath='{.data.db-password}' | base64 -d)

deploy/k8s/backup/scripts/restore.sh \
  s3://fs-backups/daily/previous-good-backup.sql.gz
```

### 8.3 Preserving the Failed State for Investigation

```bash
# Before rolling back, save the failed state for root cause analysis
kubectl exec -n featuresignals-system postgresql-0 -- \
  pg_dump -U postgres -d featuresignals \
  --no-owner \
  --compress=9 \
  > /tmp/failed-state-$(date +%Y%m%d-%H%M%S).sql.gz

# Move to persistent storage
mv /tmp/failed-state-*.sql.gz /mnt/data/backups/forensics/
```

### 8.4 If PostgreSQL Wont Start After Restore

```bash
# 1. Check PostgreSQL logs
kubectl logs -n featuresignals-system postgresql-0 --tail=100

# 2. Try starting with recovery mode
kubectl exec -n featuresignals-system postgresql-0 -- \
  bash -c "echo 'recovery = on' >> /var/lib/postgresql/data/postgresql.auto.conf"
kubectl delete pod -n featuresignals-system postgresql-0

# If still failing, restore the original PV data from snapshot
# (This requires PV snapshots to be configured)
```

### 8.5 Full Rollback Procedure

```bash
# 1. Scale down application
kubectl scale deployment -n featuresignals-system \
  featuresignals-server --replicas=0
kubectl scale deployment -n featuresignals-saas \
  featuresignals-dashboard --replicas=0

# 2. Note which backup was last known good
echo "Rolling back to: s3://fs-backups/daily/GOOD-BACKUP.sql.gz"

# 3. Drop and recreate database
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d postgres -c \
  "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'featuresignals' AND pid <> pg_backend_pid();"

kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d postgres -c "DROP DATABASE IF EXISTS featuresignals;"

kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d postgres -c "CREATE DATABASE featuresignals;"

# 4. Restore from good backup
aws s3 cp s3://fs-backups/daily/GOOD-BACKUP.sql.gz - \
  --endpoint-url ${S3_ENDPOINT} \
  | gunzip \
  | kubectl exec -i -n featuresignals-system postgresql-0 -- \
    psql -U postgres -d featuresignals -q --set ON_ERROR_STOP=on

# 5. Verify
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -c \
  "SELECT count(*) FROM information_schema.tables WHERE table_schema = 'public';"

# 6. Scale up application
kubectl scale deployment -n featuresignals-system \
  featuresignals-server --replicas=2

# 7. Final verification
curl -s https://api.featuresignals.com/health | jq .
```

