## 4. Restoring from Backup

### 4.1 Quick Restore (Automated Script)

```bash
# Step 1: Set environment
export PGPASSWORD=<db-password>
export S3_ENDPOINT=<storage-box-url>
export AWS_ACCESS_KEY_ID=<access-key>
export AWS_SECRET_ACCESS_KEY=<secret-key>

# Step 2: Run the restore script
# The script handles: download → decompress → terminate connections → drop DB → restore → verify
deploy/k8s/backup/scripts/restore.sh \
  s3://fs-backups/daily/featuresignals-20240101-020000.sql.gz
```

### 4.2 Manual Restore (Step-by-Step)

#### Phase 1: Prepare

```bash
# 1. SSH into the VPS
ssh root@<server-ip>

# 2. Get database password
export PGPASSWORD=$(kubectl get secret db-credentials -n featuresignals-system \
  -o jsonpath='{.data.db-password}' | base64 -d)

# 3. Create a temporary directory
TMP_DIR=$(mktemp -d /tmp/db-restore-XXXXXX)
cd ${TMP_DIR}
```

#### Phase 2: Download Backup

```bash
# Option A: Download from S3
aws s3 cp s3://fs-backups/daily/featuresignals-20240101-020000.sql.gz \
  ./backup.sql.gz \
  --endpoint-url ${S3_ENDPOINT}

# Option B: Use local backup
cp /var/lib/rancher/k3s/storage/hourly-backups/hourly/latest.sql.gz \
  ./backup.sql.gz

# Verify gzip integrity
gunzip -t backup.sql.gz && echo "INTEGRITY CHECK PASSED" || echo "INTEGRITY CHECK FAILED"
```

#### Phase 3: Inspect Backup

```bash
# Count tables in backup
gunzip -c backup.sql.gz \
  | grep -c "CREATE TABLE"

# List tables
gunzip -c backup.sql.gz \
  | grep "CREATE TABLE\|COPY " \
  | head -30

# Check for any specific data
gunzip -c backup.sql.gz \
  | grep "COPY public.organizations" -A2 | head -10
```

#### Phase 4: Restore

```bash
# 1. Terminate active connections to the target database
#    (This prevents "database is being accessed by other users" errors)
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d postgres -c \
  "SELECT pg_terminate_backend(pid)
   FROM pg_stat_activity
   WHERE datname = 'featuresignals'
     AND pid <> pg_backend_pid();"

# 2. Drop and recreate the database
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d postgres -c "DROP DATABASE IF EXISTS featuresignals;"

kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d postgres -c "CREATE DATABASE featuresignals;"

# 3. Restore the backup
gunzip -c backup.sql.gz | \
  kubectl exec -i -n featuresignals-system postgresql-0 -- \
    psql -U postgres -d featuresignals -q --set ON_ERROR_STOP=on

echo "RESTORE COMPLETED: $(date -u)"
```

#### Phase 5: Verify

```bash
# 1. Check table count
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -t -c \
  "SELECT count(*) FROM information_schema.tables
   WHERE table_schema = 'public'
     AND table_type = 'BASE TABLE';"

# 2. Check key tables have data
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -c \
  "SELECT 'organizations' as table_name, count(*) as rows FROM organizations
   UNION ALL
   SELECT 'users', count(*) FROM users
   UNION ALL
   SELECT 'projects', count(*) FROM projects
   UNION ALL
   SELECT 'flags', count(*) FROM flags
   UNION ALL
   SELECT 'segments', count(*) FROM segments;"

# 3. Run VACUUM ANALYZE to update statistics
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -c "VACUUM ANALYZE;"
```

#### Phase 6: Restart Application

```bash
# Scale API back up if it was scaled down
kubectl scale deployment -n featuresignals-system \
  featuresignals-server --replicas=2

# Verify application health
curl -s https://api.featuresignals.com/health | jq .
```

