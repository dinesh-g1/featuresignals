#!/usr/bin/env bash
# =============================================================================
# FeatureSignals — Backup Verification Script
# =============================================================================
#
# Restores the latest backup to a temporary PostgreSQL instance, runs sanity
# queries, and reports success/failure. Designed to run as a CronJob or manual
# verification step.
#
# Verification steps:
#   1. Start a temporary PostgreSQL container
#   2. Restore the backup
#   3. Count tables and rows
#   4. Check for SQL errors
#   5. Drop the temp database
#   6. Report results
#
# Usage:
#   ./verify-backup.sh [backup_file_or_s3_url]
#     If no argument is given, uses the latest hourly backup from /backups/hourly/
#
#   ./verify-backup.sh s3://fs-backups/daily/featuresignals-20240101-020000.sql.gz
#     Verifies a specific backup from S3 (requires S3_ENDPOINT and AWS credentials)
#
# Exit codes:
#   0 - Verification passed
#   1 - Backup file not found
#   2 - Gzip integrity check failed
#   3 - PostgreSQL connection failed
#   4 - Restore failed
#   5 - Verification queries failed
# =============================================================================

set -euo pipefail

# ---- Constants --------------------------------------------------------------

SCRIPT_NAME="$(basename "$0")"
VERSION="1.0.0"
LOG_PREFIX="[$(date -u +%Y-%m-%dT%H:%M:%SZ)] [${SCRIPT_NAME}]"
VERIFY_DB="fs_backup_verify"
VERIFY_USER="fs_verify"
VERIFY_PASS="$(openssl rand -base64 24 2>/dev/null || echo "verify_temp_pass_2024")"
VERIFY_PORT=5432
TMP_DIR=""

# ---- Colors for terminal output ---------------------------------------------

RED='\033[0;31m'
YELLOW='\033[1;33m'
GREEN='\033[0;32m'
CYAN='\033[0;36m'
NC='\033[0m' # No Color

# ---- Functions --------------------------------------------------------------

log_info()    { echo -e "${LOG_PREFIX} ${GREEN}[INFO]${NC}  $*"; }
log_warn()    { echo -e "${LOG_PREFIX} ${YELLOW}[WARN]${NC}  $*" >&2; }
log_error()   { echo -e "${LOG_PREFIX} ${RED}[ERROR]${NC} $*" >&2; }
log_fatal()   { log_error "$@"; exit "$1"; }
log_step()    { echo -e "\n${CYAN}════════════════════════════════════════════════════════════${NC}"; echo -e "${CYAN}  $*${NC}"; echo -e "${CYAN}════════════════════════════════════════════════════════════${NC}\n"; }
log_pass()    { echo -e "${LOG_PREFIX} ${GREEN}[PASS]${NC}  $*"; }
log_fail()    { echo -e "${LOG_PREFIX} ${RED}[FAIL]${NC}  $*"; }

# Format bytes to human-readable
format_bytes() {
  local bytes=$1
  if command -v numfmt &>/dev/null; then
    numfmt --to=iec "${bytes}"
  else
    echo "${bytes} bytes"
  fi
}

# Cleanup handler — always runs on exit
cleanup() {
  local exit_code=$?
  echo ""

  # Kill and remove temp PostgreSQL container
  if [ -n "${VERIFY_CONTAINER:-}" ]; then
    log_info "Stopping verification PostgreSQL container: ${VERIFY_CONTAINER}"
    docker rm -f "${VERIFY_CONTAINER}" 2>/dev/null || true
  fi

  # Remove temp directory
  if [ -n "${TMP_DIR:-}" ] && [ -d "${TMP_DIR:-}" ]; then
    rm -rf "${TMP_DIR}"
    log_info "Cleaned up temporary directory"
  fi

  if [ "${exit_code}" -eq 0 ]; then
    echo ""
    echo -e "${GREEN}╔════════════════════════════════════════════════════════════════╗${NC}"
    echo -e "${GREEN}║           BACKUP VERIFICATION PASSED                          ║${NC}"
    echo -e "${GREEN}╚════════════════════════════════════════════════════════════════╝${NC}"
  else
    echo ""
    echo -e "${RED}╔════════════════════════════════════════════════════════════════╗${NC}"
    echo -e "${RED}║           BACKUP VERIFICATION FAILED                           ║${NC}"
    echo -e "${RED}╚════════════════════════════════════════════════════════════════╝${NC}"
  fi

  exit "${exit_code}"
}
trap cleanup EXIT INT TERM

# Check required dependencies
check_dependencies() {
  local missing=0

  if ! command -v docker &>/dev/null; then
    log_error "Docker is required but not found"
    missing=1
  fi
  if ! command -v psql &>/dev/null; then
    log_error "psql is required but not found (install postgresql-client)"
    missing=1
  fi
  if ! command -v gunzip &>/dev/null; then
    log_error "gunzip is required but not found"
    missing=1
  fi

  if [ "${missing}" -eq 1 ]; then
    log_fatal 3 "Missing required dependencies"
  fi

  log_info "All dependencies available"
}

# Acquire the backup file (local or S3)
acquire_backup() {
  local source="${1:-}"

  # If no source provided, find the latest hourly backup
  if [ -z "${source}" ]; then
    local hourly_dir="${BACKUP_DIR:-/backups}/hourly"
    if [ -d "${hourly_dir}" ]; then
      source="$(find "${hourly_dir}" -name "*.sql.gz" -type f -printf '%T@ %p\n' 2>/dev/null \
                | sort -rn \
                | head -1 \
                | awk '{print $2}')"
    fi
    # Try daily if no hourly found
    if [ -z "${source}" ] || [ ! -f "${source}" ]; then
      local daily_dir="${BACKUP_DIR:-/backups}/daily"
      if [ -d "${daily_dir}" ]; then
        source="$(find "${daily_dir}" -name "*.sql.gz" -type f -printf '%T@ %p\n' 2>/dev/null \
                  | sort -rn \
                  | head -1 \
                  | awk '{print $2}')"
      fi
    fi
  fi

  if [ -z "${source}" ]; then
    log_fatal 1 "No backup file found and no argument provided"
  fi

  # Handle S3 URLs
  if [[ "${source}" == s3://* ]]; then
    if [ -z "${S3_ENDPOINT:-}" ]; then
      log_fatal 1 "S3_ENDPOINT environment variable required for S3 URLs"
    fi

    TMP_DIR="$(mktemp -d /tmp/fs-verify-XXXXXX)"
    local dest="${TMP_DIR}/backup.sql.gz"

    log_info "Downloading backup from S3: ${source}"
    if ! aws s3 cp "${source}" "${dest}" \
      --endpoint-url "${S3_ENDPOINT}" \
      --only-show-errors; then
      log_fatal 1 "Failed to download backup from S3"
    fi
    BACKUP_FILE="${dest}"
  else
    if [ ! -f "${source}" ]; then
      log_fatal 1 "Backup file not found: ${source}"
    fi
    BACKUP_FILE="${source}"
  fi

  local file_size
  file_size="$(stat -c%s "${BACKUP_FILE}" 2>/dev/null || stat -f%z "${BACKUP_FILE}" 2>/dev/null)"
  log_info "Backup file: ${BACKUP_FILE} ($(format_bytes "${file_size}"))"
}

# Validate gzip integrity
validate_gzip() {
  log_step "Validating Gzip Integrity"

  if gunzip -t "${BACKUP_FILE}" 2>/dev/null; then
    log_pass "Gzip integrity check passed"
  else
    log_fatal 2 "Gzip integrity check FAILED — backup file may be corrupted"
  fi
}

# Start temporary PostgreSQL container
start_temp_postgres() {
  log_step "Starting Temporary PostgreSQL Instance"

  VERIFY_CONTAINER="fs-verify-$(date +%s)-$$"

  log_info "Starting PostgreSQL container: ${VERIFY_CONTAINER}"

  if ! docker run -d \
    --name "${VERIFY_CONTAINER}" \
    -e POSTGRES_USER="${VERIFY_USER}" \
    -e POSTGRES_PASSWORD="${VERIFY_PASS}" \
    -e POSTGRES_DB="${VERIFY_DB}" \
    -p "0:${VERIFY_PORT}" \
    --rm \
    postgres:16-alpine \
    -c "max_connections=20" \
    -c "shared_buffers=32MB" \
    -c "fsync=off" \
    -c "full_page_writes=off" \
    > /dev/null 2>&1; then
    log_fatal 3 "Failed to start PostgreSQL container"
  fi

  # Get the container's IP address
  local container_ip
  container_ip="$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' "${VERIFY_CONTAINER}")"
  VERIFY_HOST="${container_ip}"

  log_info "Container started at ${VERIFY_HOST}:${VERIFY_PORT} (DB: ${VERIFY_DB})"

  # Wait for PostgreSQL to be ready
  log_info "Waiting for PostgreSQL to accept connections..."
  local max_attempts=30
  local attempt=0
  while [ "${attempt}" -lt "${max_attempts}" ]; do
    if docker exec "${VERIFY_CONTAINER}" pg_isready -U "${VERIFY_USER}" -q 2>/dev/null; then
      log_info "PostgreSQL ready after ${attempt}s"
      break
    fi
    sleep 1
    attempt=$((attempt + 1))
  done

  if [ "${attempt}" -eq "${max_attempts}" ]; then
    log_fatal 3 "PostgreSQL failed to become ready within ${max_attempts}s"
  fi
}

# Restore backup to temp database
restore_backup() {
