  gunzip -c "${BACKUP_FILE}" 2>/dev/null \
    | grep -E "^COPY public\.|^CREATE TABLE public\." \
    | sed 's/COPY public\.\([^ ]*\).*/  - \1/' \
    | sed 's/CREATE TABLE public\.\([^ ]*\).*/  - \1/' \
    | sort -u \
    | head -50

  # Estimate total size
  local raw_size
  raw_size="$(gunzip -c "${BACKUP_FILE}" 2>/dev/null | wc -c)"
  echo ""
  echo "  Raw SQL size: $(format_bytes "${raw_size}")"
  echo ""
}

# Terminate all active connections to the target database (except our own)
terminate_connections() {
  log_step "Terminating Active Connections"

  log_info "Terminating all connections to database '${DB_DATABASE}'..."
  psql -h "${DB_HOST}" -U "${DB_USER}" -d postgres -q -t -c \
    "SELECT pg_terminate_backend(pid)
     FROM pg_stat_activity
     WHERE datname = '${DB_DATABASE}'
       AND pid <> pg_backend_pid();" 2>/dev/null || true
  log_info "Active connections terminated"
}

# Drop and recreate the database
recreate_database() {
  log_step "Recreating Database"

  log_warn "DROPPING database '${DB_DATABASE}' — ALL EXISTING DATA WILL BE LOST!"
  log_warn "This action cannot be undone."

  echo ""
  echo -e "${YELLOW}Are you absolutely sure you want to proceed?${NC}"
  echo -e "  Target database: ${CYAN}${DB_DATABASE}${NC}"
  echo -e "  Target host:     ${CYAN}${DB_HOST}${NC}"
  echo -e "  Backup file:     ${CYAN}${BACKUP_FILE}${NC}"
  echo ""
  echo -n "Type 'yes' to confirm: "
  read -r confirm

  if [ "${confirm}" != "yes" ]; then
    log_info "Restore cancelled by user."
    exit 0
  fi

