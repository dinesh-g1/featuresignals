### C. Common Errors and Solutions

| Error | Cause | Solution |
|-------|-------|----------|
| `database "featuresignals" does not exist` | Database was not recreated | Run `CREATE DATABASE featuresignals;` |
| `pg_terminate_backend` fails | Insufficient permissions | Use `postgres` superuser |
| `ERROR: role "postgres" does not exist` | Wrong user | Use correct DB_USER |
| `aws: error: connect Failed to connect` | S3 endpoint wrong | Verify S3_ENDPOINT |
| `gunzip: invalid compressed data` | Corrupted backup | Download again or use different backup |
| `psql: error: connection to server failed` | PostgreSQL not running | Check pod status |
| `ERROR: permission denied` | Missing schema ownership | Use --no-owner flag in pg_dump |

