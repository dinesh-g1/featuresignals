  echo "============================================================================="
  echo "  Status:    ${GREEN}SUCCESS${NC}"
  echo "  Database:  ${DB_DATABASE} on ${DB_HOST}"
  echo "  Restored:  ${BACKUP_FILE}"
  echo "  Verified:  Yes"
  echo "============================================================================="
}

# ---- Main -------------------------------------------------------------------

main() {
