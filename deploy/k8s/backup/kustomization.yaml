#!/usr/bin/env bash
# =============================================================================
# FeatureSignals — Database Restore Script
# =============================================================================
#
# Restores a PostgreSQL database from a compressed backup file.
# Supports both local files and S3 URLs (Hetzner Storage Box).
#
# Usage:
#   restore.sh <backup_path_or_s3_url>
#     backup_path_or_s3_url: Local path to .sql.gz file OR
#                            s3://fs-backups/{type}/featuresignals-{timestamp}.sql.gz
#
