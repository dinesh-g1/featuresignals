## 6. Table-Level Restore

For restoring specific tables (e.g., when only one project's data was accidentally deleted):

### 6.1 Extract Specific Tables from Backup

```bash
# 1. Download the backup
aws s3 cp s3://fs-backups/daily/featuresignals-20240101-020000.sql.gz \
  ./backup.sql.gz \
  --endpoint-url ${S3_ENDPOINT}

# 2. Extract specific table data
TABLES="flags flag_rules segments"

for table in ${TABLES}; do
  echo "Extracting table: ${table}"
  gunzip -c backup.sql.gz \
    | grep -E "COPY public\.${table} |CREATE TABLE public\.${table}" \
    > ./${table}_restore.sql
  echo "  Extracted $(wc -l < ./${table}_restore.sql) lines"
done
```

### 6.2 Import Extracted Tables

```bash
# 1. Truncate existing data (be careful!)
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -c \
  "TRUNCATE TABLE flags CASCADE;"

# 2. Import the extracted data
for table in ${TABLES}; do
  kubectl exec -i -n featuresignals-system postgresql-0 -- \
    psql -U postgres -d featuresignals < ./${table}_restore.sql
  echo "Imported: ${table}"
done
```

### 6.3 Reset Sequences

```bash
# After table-level restore, sequences may be out of sync.
# Reset all sequences to the current max value:
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -d featuresignals -t -c \
  "SELECT 'SELECT setval(''' || sequence_name || ''', COALESCE((SELECT MAX(''' ||
   REPLACE(sequence_name, '_id_seq', '_id') || ''') FROM ' ||
   REPLACE(sequence_name, '_id_seq', '') || '), 1));'
   FROM information_schema.sequences
   WHERE sequence_schema = 'public';" \
  | kubectl exec -i -n featuresignals-system postgresql-0 -- \
    psql -U postgres -d featuresignals -q
```

