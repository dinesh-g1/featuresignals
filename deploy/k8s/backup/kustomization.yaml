## 5. Point-in-Time Recovery (PITR)

> **Note:** PITR requires PostgreSQL WAL archiving to be configured. If WAL archiving is not enabled, skip to standard backup restore.

### 5.1 Prerequisites

```bash
# Check if WAL archiving is configured
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -c "SHOW archive_mode;"
# Expected: on

kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -c "SHOW archive_command;"
# Expected: cp %p /wal-archive/%f

# Check available WAL files
kubectl exec -n featuresignals-system postgresql-0 -- \
  ls -la /wal-archive/ | tail -20
```

### 5.2 Perform PITR

```bash
# 1. Identify the target recovery time
#    Format: '2024-01-01 14:30:00 UTC'
TARGET_TIME="2024-01-01 14:30:00 UTC"

# 2. Find the base backup closest to (but before) the target time
aws s3 ls s3://fs-backups/daily/ \
  --endpoint-url ${S3_ENDPOINT} \
  --output text \
  --query "Contents[?LastModified<='${TARGET_TIME}'] | sort_by(@, &LastModified)[-1].[Key,LastModified]"

# 3. Restore with PITR recovery.conf
#    Create a recovery.conf in the PostgreSQL data directory:
cat > /tmp/recovery.conf << EOF
restore_command = 'cp /wal-archive/%f %p'
recovery_target_time = '${TARGET_TIME}'
recovery_target_timeline = 'latest'
EOF

# 4. Copy configuration and restart PostgreSQL
kubectl cp /tmp/recovery.conf featuresignals-system/postgresql-0:/tmp/recovery.conf
kubectl exec -n featuresignals-system postgresql-0 -- \
  bash -c "cp /tmp/recovery.conf /var/lib/postgresql/data/recovery.conf"

# 5. Restart PostgreSQL in recovery mode
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -c "SELECT pg_wal_replay_pause();"
kubectl delete pod -n featuresignals-system postgresql-0

# 6. Wait for recovery to complete, then promote
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -c "SELECT pg_is_in_recovery();"
# If true, recovery is still running

kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -c "SELECT pg_wal_replay_resume();"
kubectl exec -n featuresignals-system postgresql-0 -- \
  psql -U postgres -c "SELECT pg_promote();"
```

### 5.3 When PITR Is Not Available

If WAL archiving is not configured, use the standard backup restore procedure (Section 4). The closest available backup before the target time will be the restore point, and any data between the backup time and the target time will be lost.

