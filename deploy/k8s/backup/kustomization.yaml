    log_error "Restore failed during SQL execution"
    return 1
  fi

  local end_time
  end_time="$(date +%s)"
  local duration=$((end_time - start_time))

  log_info "Restore completed in ${duration} seconds"
  return 0
}

# Verify the restored database
verify_restore() {
  log_step "Verifying Restored Database"

  local errors=0

  # Check table count
  log_info "Checking table count..."
  local table_count
  table_count="$(psql -h "${DB_HOST}" -U "${DB_USER}" -d "${DB_DATABASE}" -t -c \
    "SELECT count(*) FROM information_schema.tables
