  fi

  # ---- Test 2: List all tables and row counts ----
  log_info "Test: Table row counts..."
  local tables
  tables="$(run_sql \
    "SELECT tablename FROM pg_catalog.pg_tables
     WHERE schemaname = 'public'
     ORDER BY tablename;")"

  if [ -n "${tables}" ]; then
    echo ""
    echo "  Table                       Rows"
    echo "  ─────────────────────────────────────"
    while IFS= read -r table; do
      if [ -n "${table}" ]; then
        local row_count
        row_count="$(run_sql "SELECT count(*) FROM \"${table}\";")"
        if [ -n "${row_count}" ]; then
          printf "  %-27s %s\n" "${table}" "${row_count}"
        fi
      fi
    done <<< "${tables}"
    echo ""
  fi

  # ---- Test 3: Check for orphaned sequences ----
  log_info "Test: Sequence consistency..."
  local seq_issues
  seq_issues="$(run_sql \
    "SELECT count(*) FROM (
       SELECT sequence_schema, sequence_name
       FROM information_schema.sequences s
       WHERE NOT EXISTS (
         SELECT 1 FROM information_schema.columns c
         WHERE c.column_default LIKE '%' || s.sequence_name || '%'
       )
       AND s.sequence_schema = 'public'
     ) orphaned;")"

  if [ -n "${seq_issues}" ] && [ "${seq_issues}" -gt 0 ] 2>/dev/null; then
    log_warn "${seq_issues} orphaned sequence(s) found (may be expected)"
    warnings=$((warnings + 1))
  else
    log_pass "All sequences have matching columns"
  fi

  # ---- Test 4: Check for invalid foreign keys ----
  log_info "Test: Foreign key integrity..."
  local fk_violations
  fk_violations="$(run_sql \
    "SELECT count(*) FROM (
       SELECT 1 FROM information_schema.table_constraints tc
       JOIN information_schema.key_column_usage kcu
         ON tc.constraint_name = kcu.constraint_name
       JOIN information_schema.constraint_column_usage ccu
         ON ccu.constraint_name = tc.constraint_name
       WHERE tc.constraint_type = 'FOREIGN KEY'
         AND tc.table_schema = 'public'
     ) fk_refs;")"

  if [ -n "${fk_violations}" ] && [ "${fk_violations}" -gt 0 ] 2>/dev/null; then
    log_pass "Foreign key constraints present (schema integrity OK)"
  else
    log_warn "No foreign key constraints found (may be expected for this schema)"
  fi

  # ---- Test 5: Database size ----
  log_info "Test: Database size..."
  local db_size
  db_size="$(run_sql \
    "SELECT pg_size_pretty(pg_database_size('${VERIFY_DB}'));")"

  if [ -n "${db_size}" ]; then
    log_pass "Database size: ${db_size}"
  fi

  # ---- Test 6: Run VACUUM ANALYZE ----
  log_info "Test: VACUUM ANALYZE..."
  if docker exec "${VERIFY_CONTAINER}" \
    psql -U "${VERIFY_USER}" -d "${VERIFY_DB}" -q -c \
    "VACUUM ANALYZE;" 2>/dev/null; then
    log_pass "VACUUM ANALYZE completed"
  else
    log_warn "VACUUM ANALYZE had issues (non-fatal for verification)"
  fi

  echo ""
  if [ "${errors}" -gt 0 ]; then
    log_fail "${errors} verification test(s) FAILED"
    return 1
  fi
  if [ "${warnings}" -gt 0 ]; then
    log_warn "${warnings} warning(s) — review above"
  fi
  log_pass "All verification tests passed"
  return 0
}

# Print detailed summary
print_summary() {
  local file_size
  file_size="$(stat -c%s "${BACKUP_FILE}" 2>/dev/null || stat -f%z "${BACKUP_FILE}" 2>/dev/null)"
  local table_count
  table_count="$(docker exec "${VERIFY_CONTAINER}" \
    psql -U "${VERIFY_USER}" -d "${VERIFY_DB}" -t -A -c \
    "SELECT count(*) FROM information_schema.tables
     WHERE table_schema = 'public'
       AND table_type = 'BASE TABLE';" 2>/dev/null | tr -d ' ')"

  echo ""
  echo "============================================================================="
  echo "  VERIFICATION REPORT"
  echo "============================================================================="
  echo "  Backup file:  ${BACKUP_FILE}"
  echo "  File size:    $(format_bytes "${file_size}")"
  echo "  Tables found: ${table_count:-0}"
  echo "  Status:       ${GREEN}PASSED${NC}"
  echo "============================================================================="
}

# ---- Main -------------------------------------------------------------------

main() {
  local backup_source="${1:-}"

  echo ""
  echo "============================================================================="
  echo "  FeatureSignals Backup Verification v${VERSION}"
  echo "============================================================================="
  echo ""

  # Print configuration
  log_info "Starting backup verification..."
  if [ -n "${backup_source}" ]; then
    log_info "Verifying specified backup: ${backup_source}"
  else
    log_info "No backup specified — will use latest local backup"
  fi

  # Execute verification pipeline
  check_dependencies
  acquire_backup "${backup_source}"
  validate_gzip
  start_temp_postgres
  restore_backup
  run_verification
  print_summary
}

main "$@"
```
