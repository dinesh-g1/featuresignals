## 5. Pod Crash Loop

### Severity
**MEDIUM** — P2 (partial service degradation)

### Trigger
- Pod shows `CrashLoopBackOff` status
- Monitoring alert: `PodRestarting`, `HighRestartRate`
- Service partially available (e.g., API works but dashboard doesn't)

### Impact
- Degraded service for affected component
- If API pod crashes: evaluation requests may fail or slow down
- If dashboard pod crashes: management UI unavailable
- If database pod crashes: complete service outage (escalate to P0)

### Pre-requisites
- `kubectl` access to the cluster
- Knowledge of which pod(s) are crashing

### Recovery Steps

#### Step 1: Identify the Crashing Pod

```bash
# 1. Find crashing pods
kubectl get pods --all-namespaces | grep -E "CrashLoop|Error|Init:Error"

# 2. Check restart count
kubectl get pods --all-namespaces -o wide | awk '$5 > 3 {print $0}'

# 3. Get detailed pod status
kubectl describe pod -n featuresignals-system <crashing-pod>
```

#### Step 2: Get Logs and Diagnosis

```bash
# 1. View pod logs (add --previous for last crash's logs)
kubectl logs -n featuresignals-system <crashing-pod> --previous --tail=100

# 2. Check pod events
kubectl get events -n featuresignals-system --sort-by=.lastTimestamp \
  | grep <crashing-pod>

# 3. Check resource constraints
kubectl describe pod -n featuresignals-system <crashing-pod> \
  | grep -A5 "Limits\|Requests"

# 4. Check for OOM kills
kubectl describe pod -n featuresignals-system <crashing-pod> \
  | grep -i "OOMKilled\|Exit Code: 137"
```

#### Step 3: Apply Fix Based on Root Cause

**Issue: OOMKilled (Exit Code 137)**
```bash
# Increase memory limits
kubectl set resources deployment -n featuresignals-system \
  featuresignals-server --limits=memory=1Gi

# Or edit the deployment directly
kubectl edit deployment -n featuresignals-system featuresignals-server
```

**Issue: Configuration Error**
```bash
# Check ConfigMap
kubectl describe configmap -n featuresignals-system featuresignals-config

# Check Secrets (verify keys exist)
kubectl get secret db-credentials -n featuresignals-system -o yaml

# Check if environment variable references are correct
kubectl describe pod -n featuresignals-system <crashing-pod> \
  | grep -A20 "Environment"
```

**Issue: Liveness/Readiness Probe Failure**
```bash
# Test the probe manually
kubectl exec -n featuresignals-system <any-running-pod> -- \
  curl -s http://localhost:8080/health

# Update probe configuration
kubectl edit deployment -n featuresignals-system featuresignals-server
# Adjust initialDelaySeconds, periodSeconds, failureThreshold
```

**Issue: Database Connectivity**
```bash
# Test database connection from a pod
kubectl exec -n featuresignals-system <pod> -- \
  pg_isready -h postgresql.featuresignals-system.svc.cluster.local -U postgres

# Check if database service exists
kubectl get svc -n featuresignals-system postgresql
```

**Issue: Image Pull Failure**
```bash
# Check image pull errors
kubectl describe pod -n featuresignals-system <crashing-pod> \
  | grep -i "pull"

# Fix: Update image tag or check registry credentials
kubectl edit deployment -n featuresignals-system featuresignals-server
# Set imagePullPolicy: Always or correct the image tag
```

#### Step 4: Restart the Pod

```bash
# Option 1: Delete the pod (Deployment will recreate it)
kubectl delete pod -n featuresignals-system <crashing-pod>

# Option 2: Rollout restart (zero-downtime for Deployments)
kubectl rollout restart deployment -n featuresignals-system featuresignals-server

# Option 3: Scale down and up
kubectl scale deployment -n featuresignals-system \
  featuresignals-server --replicas=0
kubectl scale deployment -n featuresignals-system \
  featuresignals-server --replicas=2
```

#### Step 5: Verify Recovery

```bash
# 1. Watch pod status
kubectl get pods -n featuresignals-system --watch

# 2. Check rollout status
kubectl rollout status deployment -n featuresignals-system featuresignals-server

# 3. Verify application health
curl -s https://api.featuresignals.com/health | jq .
```

### Verification
```bash
# 1. All pods are Running and ready
kubectl get pods --all-namespaces --field-selector=status.phase!=Running

# 2. No recent restarts
kubectl get pods --all-namespaces | awk '$5 > 0 {print $0}'

# 3. Services respond correctly
curl -s https://api.featuresignals.com/health
```

### Rollback
- If a recent change caused the crash loop, roll it back:
  ```bash
  kubectl rollout undo deployment -n featuresignals-system featuresignals-server
  ```
- If the issue persists, check if the deployment matches a known-good configuration

### Post-Recovery
- [ ] Increase resource limits if OOM was the cause
- [ ] Add readiness probe if not configured
- [ ] Check for memory leaks in the application
- [ ] Review recent deployments for problematic changes

