  psql -h "${DB_HOST}" -U "${DB_USER}" -d postgres -q -c \
    "DROP DATABASE IF EXISTS ${DB_DATABASE};"
  log_info "Database dropped"

  log_info "Creating database '${DB_DATABASE}'..."
  psql -h "${DB_HOST}" -U "${DB_USER}" -d postgres -q -c \
    "CREATE DATABASE ${DB_DATABASE};"
  log_info "Database created"
}

# Restore the backup
restore_backup() {
  log_step "Restoring Backup"

  log_info "Starting restore from: ${BACKUP_FILE}"
  local start_time
  start_time="$(date +%s)"

