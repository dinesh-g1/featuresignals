  log_info "Running VACUUM ANALYZE..."
  psql -h "${DB_HOST}" -U "${DB_USER}" -d "${DB_DATABASE}" -q -c \
    "VACUUM ANALYZE;" 2>/dev/null || log_warn "VACUUM ANALYZE failed (non-fatal)"
  log_info "Statistics updated"

  if [ "${errors}" -gt 0 ]; then
    log_error "Verification found ${errors} issue(s)"
