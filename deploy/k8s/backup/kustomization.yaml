## 1. Overview

This runbook covers all database restore scenarios for the FeatureSignals PostgreSQL database. The backup system follows a 3-2-1 strategy:

- **3 copies:** 1 local hourly + 1 Storage Box (S3) + 1 promoted (weekly/monthly)
- **2 media:** Local NVMe disk + Hetzner Storage Box
- **1 offsite:** Hetzner Storage Box (different datacenter)

### Backup Hierarchy

```
Backup Type    Frequency    Retention    RPO     Use Case
─────────────  ───────────  ───────────  ──────  ──────────────────────────
Hourly         Every hour   24 hours     1 hour  Recent data loss, quick restore
Daily          2 AM daily   30 days      24 hrs  Standard restore point
Weekly         Sundays      12 weeks     7 days  Longer-term recovery
Monthly        1st of month 12 months    30 days  Compliance / legal hold
```

**Key Decision Tree:**

| Scenario | Recommended Backup Source |
|----------|--------------------------|
| Accidental deletion within last hour | Hourly local backup |
| Database corruption discovered today | Latest daily S3 backup |
| Data loss > 24 hours ago | Weekly or monthly S3 backup |
| Compliance/legal request | Monthly S3 backup (search by date) |
| Specific table restore | Daily S3 backup (table-level extraction) |
| Point-in-time recovery | WAL archive (if configured) |

