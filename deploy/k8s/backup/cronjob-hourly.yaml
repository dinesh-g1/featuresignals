# =============================================================================
# FeatureSignals — Hourly PostgreSQL Backup CronJob
# =============================================================================
#
# Runs pg_dump every hour at minute 0, compresses with gzip, and stores the
# result on a local 10Gi PVC. Retains backups for 24 hours (mtime +1).
#
# The backup script is mounted from the backup-scripts ConfigMap (generated
# by kustomize). If the backup fails, it retries up to 2 times with a
# 5-minute backoff between attempts.
#
# Metrics & Monitoring:
#   - Pod status (Completed = success, Error = failure)
#   - PVC disk usage alerts when >80%
#   - Logs at: kubectl logs -n featuresignals-system -l job-name=hourly-backup-<id>
#
# Dependencies:
#   - pvc-hourly.yaml (fs-hourly-backups PVC, 10Gi)
#   - backup-scripts ConfigMap (generated by kustomization.yaml)
#   - PostgreSQL pod running in featuresignals-system namespace
# =============================================================================

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fs-hourly-backup
  namespace: featuresignals-system
  labels:
    app.kubernetes.io/name: fs-hourly-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: featuresignals
    backup-type: hourly
spec:
  # Every hour at minute 0
  schedule: "0 * * * *"
  # Allow one job to be running at a time; if the previous run is still going,
  # skip the new one. Prevents pile-ups during long-running backups.
  concurrencyPolicy: Forbid
  # Start the job within 2 minutes of the scheduled time if the cluster was
  # down at the scheduled time.
  startingDeadlineSeconds: 120
  # Keep the last 3 successful pods for log inspection
  successfulJobsHistoryLimit: 3
  # Keep only the last failed pod
  failedJobsHistoryLimit: 1

  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: fs-hourly-backup
        app.kubernetes.io/component: backup
        backup-type: hourly
    spec:
      # Maximum 2 retries with 5-minute backoff between attempts
      backoffLimit: 2
      # Give each job attempt 10 minutes to complete
      activeDeadlineSeconds: 600

      template:
        metadata:
          labels:
            app.kubernetes.io/name: fs-hourly-backup
            app.kubernetes.io/component: backup
            backup-type: hourly
          annotations:
            # Ensure the pod is recreated if the underlying node is drained
            cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
        spec:
          # Don't restart the pod on completion — Jobs handle this
          restartPolicy: Never

          # Node anti-affinity: prefer not to schedule on the same node as the
          # database to reduce I/O contention during backup window (soft rule)
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 50
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/instance
                          operator: In
                          values:
                            - featuresignals-db-postgresql
                    topologyKey: kubernetes.io/hostname

          # Run as the postgres user (UID 1001 in Bitnami images) — NOT root
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001

          # ===================================================================
          # ServiceAccount
          # ===================================================================
          # Uses the default service account in the namespace.
          # No special RBAC needed since we only talk to the database via pg_dump
          # and write to a pre-mounted PVC.

          # ===================================================================
          # Init Container: none needed — pg_dump does not require setup
          # ===================================================================

          # ===================================================================
          # Main Container: pg_dump → gzip → write to PVC
          # ===================================================================
          containers:
            - name: pg-dump
              # Bitnami PostgreSQL 16 with pg_dump, gzip, and basic shell utils
              image: bitnami/postgresql:16
              imagePullPolicy: IfNotPresent

              # Resource requests: minimum guaranteed for scheduling
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi

              # Environment configuration
              env:
                # Database host — Bitnami Helm chart creates a Service named
                # <release>-postgresql in the same namespace
                - name: DB_HOST
                  value: postgresql
                # Database user — the Bitnami chart defaults to "postgres"
                - name: DB_USER
                  value: postgres
                # Database name
                - name: DB_DATABASE
                  value: featuresignals
                # PostgreSQL password — read from the secret created by the
                # Bitnami Helm chart
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      # Secret created by Bitnami PostgreSQL Helm chart
                      name: postgresql
                      key: postgres-password

              # Command runs the backup script with "hourly" type and 1-day retention
              command:
                - /bin/bash
                - /scripts/backup.sh
              args:
                - hourly
                - "1"

              # Mount the backup script from ConfigMap and the PVC for storage
              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                  readOnly: true
                - name: backup-storage
                  mountPath: /backups

              # Liveness probe: not needed for a batch job
              # Readiness probe: not needed for a batch job

          # ===================================================================
          # Volumes
          # ===================================================================
          volumes:
            - name: backup-scripts
              configMap:
                name: backup-scripts
                defaultMode: 0555 # Executable by owner/group/others
            - name: backup-storage
              persistentVolumeClaim:
                claimName: fs-hourly-backups
