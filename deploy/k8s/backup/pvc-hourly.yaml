---
# =============================================================================
# FeatureSignals — Hourly Backup PersistentVolumeClaim
# =============================================================================
#
# Provides 10Gi of local storage on the k3s node for hourly database backups.
# Backups older than 24 hours are automatically deleted by the hourly CronJob,
# keeping the local footprint within the PVC capacity.
#
# Storage is allocated from the k3s node's local NVMe (160 GB on Hetzner CPX42)
# via the default storage class (local-path on k3s).
#
# Deployment:
#   kubectl apply -f pvc-hourly.yaml
# =============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fs-hourly-backups
  namespace: featuresignals-system
  labels:
    app.kubernetes.io/name: fs-backup
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: featuresignals
    app.kubernetes.io/managed-by: kustomize
  annotations:
    description: "Local storage for hourly PostgreSQL backups (24h retention)"
    backup.featuresignals.io/type: hourly
    backup.featuresignals.io/retention: "24h"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # k3s default storage class (local-path-provisioner) will bind this PVC
  # to the node's local filesystem. No storageClassName override needed.
  # storageClassName: local-path
