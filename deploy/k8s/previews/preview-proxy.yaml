# =============================================================================
# FeatureSignals — Preview Proxy
# =============================================================================
#
# Dynamic reverse proxy for preview environments. Routes all traffic from
# *.preview.featuresignals.com to the correct preview namespace based on the
# subdomain.
#
# Architecture:
#   Internet → Caddy Ingress (wildcard *.preview.featuresignals.com)
#           → preview-proxy (this deployment, namespace: featuresignals-saas)
#           → preview-pr-{N}/server:8080 or preview-pr-{N}/dashboard:3000
#
# The proxy is a lightweight Go binary that:
#   1. Listens on :8080
#   2. Parses the Host header (e.g., api.preview-42.preview.featuresignals.com)
#   3. Extracts the preview number (42) and service type (api → server)
#   4. Verifies the namespace exists via the Kubernetes API
#   5. Reverse proxies to preview-pr-42/server:8080
#
# DNS wildcard record required:
#   *.preview.featuresignals.com  A  <VPS_IP>
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: featuresignals-saas
  labels:
    name: featuresignals-saas
    app.kubernetes.io/name: featuresignals
    app.kubernetes.io/part-of: featuresignals
    app.kubernetes.io/component: preview-infra

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: preview-proxy
  namespace: featuresignals-saas
  labels:
    app.kubernetes.io/name: preview-proxy
    app.kubernetes.io/component: preview-proxy
    app.kubernetes.io/part-of: featuresignals

---
# The preview-proxy needs to list/get namespaces to verify preview existence.
# This ClusterRoleBinding grants that access using the preview-manager ClusterRole.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: preview-proxy
  labels:
    app.kubernetes.io/name: preview-proxy
    app.kubernetes.io/component: preview-proxy
    app.kubernetes.io/part-of: featuresignals
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: preview-manager
subjects:
  - kind: ServiceAccount
    name: preview-proxy
    namespace: featuresignals-saas

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: preview-proxy
  namespace: featuresignals-saas
  labels:
    app.kubernetes.io/name: preview-proxy
    app.kubernetes.io/component: preview-proxy
    app.kubernetes.io/part-of: featuresignals
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: preview-proxy
      app.kubernetes.io/component: preview-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: preview-proxy
        app.kubernetes.io/component: preview-proxy
        app.kubernetes.io/part-of: featuresignals
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: preview-proxy
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: proxy
          image: ghcr.io/featuresignals/preview-proxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: "info"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep 5"
      volumes: []

---
apiVersion: v1
kind: Service
metadata:
  name: preview-proxy
  namespace: featuresignals-saas
  labels:
    app.kubernetes.io/name: preview-proxy
    app.kubernetes.io/component: preview-proxy
    app.kubernetes.io/part-of: featuresignals
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: preview-proxy
    app.kubernetes.io/component: preview-proxy

---
# NetworkPolicy: allow inbound from Caddy only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: preview-proxy-ingress
  namespace: featuresignals-saas
  labels:
    app.kubernetes.io/name: preview-proxy
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: featuresignals
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: preview-proxy
      app.kubernetes.io/component: preview-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: caddy-system
      ports:
        - port: 8080
          protocol: TCP
