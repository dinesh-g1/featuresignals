# =============================================================================
# FeatureSignals — Preview TTL Controller
# =============================================================================
#
# Enforces time-to-live (TTL) on preview environments by periodically scanning
# all namespaces labeled app.kubernetes.io/component=preview, comparing their
# creation timestamp + TTL annotation against the current time, and deleting
# any expired namespaces.
#
# Runs as a CronJob in the featuresignals-system namespace every 15 minutes.
# Uses the preview-manager ServiceAccount (created in rbac.yaml) for RBAC.
#
# TTL is set on the namespace via the annotation:
#   preview.featuresignals.com/ttl: "24h"
#
# Supported TTL formats: 30m (minutes), 2h (hours), 86400s (seconds)
# =============================================================================

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: preview-ttl-cleaner
  namespace: featuresignals-system
  labels:
    app.kubernetes.io/name: preview-ttl-cleaner
    app.kubernetes.io/component: preview-controller
    app.kubernetes.io/part-of: featuresignals
spec:
  # Run every 15 minutes — balances responsiveness with API server load
  schedule: "*/15 * * * *"
  # Don't start a new job if the previous one is still running
  concurrencyPolicy: Forbid
  # Keep last 3 successful jobs for debugging, last failure for troubleshooting
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  # Start job within 2 minutes of scheduled time (grace period for cluster load)
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      # If a cleanup run takes longer than 5 minutes, kill it
      activeDeadlineSeconds: 300
      # Retry once if the job fails
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: preview-ttl-cleaner
            app.kubernetes.io/component: preview-controller
            app.kubernetes.io/part-of: featuresignals
        spec:
          # Use the preview-manager service account created in rbac.yaml
          serviceAccountName: preview-manager
          # Run on the control-plane node (only node in single-node k3s)
          tolerations:
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoSchedule"
          restartPolicy: Never
          containers:
            - name: cleaner
              image: bitnami/kubectl:1.31
              imagePullPolicy: IfNotPresent
              # Run as non-root
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1001
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  echo "=========================================="
                  echo "  Preview TTL Cleaner — $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
                  echo "=========================================="

                  now_epoch=$(date +%s)
                  deleted=0

                  # Parse duration string (e.g., "24h", "30m", "3600s") into seconds
                  parse_ttl() {
                    local ttl="$1"
                    case "$ttl" in
                      *h) echo "$(( ${ttl%h} * 3600 ))" ;;
                      *m) echo "$(( ${ttl%m} * 60 ))" ;;
                      *s) echo "${ttl%s}" ;;
                      *)  echo "$(( 24 * 3600 ))" ;;  # Default: 24h
                    esac
                  }

                  # Iterate over all namespaces with the preview label
                  for ns in $(kubectl get namespaces \
                    --selector=app.kubernetes.io/component=preview \
                    -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null); do

                    echo ""
                    echo "--- Checking namespace: ${ns} ---"

                    # Get TTL from annotation (default: 24h)
                    ttl=$(kubectl get namespace "${ns}" \
                      -o jsonpath='{.metadata.annotations.preview\.featuresignals\.com/ttl}' 2>/dev/null || echo "24h")
                    if [[ -z "$ttl" ]]; then
                      ttl="24h"
                    fi

                    # Get creation timestamp
                    created=$(kubectl get namespace "${ns}" \
                      -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null || echo "")

                    if [[ -z "$created" ]]; then
                      echo "  [SKIP] No creation timestamp found"
                      continue
                    fi

                    # Convert creation timestamp to epoch
                    created_epoch=$(date -d "${created}" +%s 2>/dev/null || echo 0)
                    if [[ "$created_epoch" -eq 0 ]]; then
                      echo "  [SKIP] Could not parse creation timestamp: ${created}"
                      continue
                    fi

                    # Calculate TTL in seconds
                    ttl_seconds=$(parse_ttl "$ttl")

                    # Calculate expiry
                    expiry_epoch=$((created_epoch + ttl_seconds))
                    age_seconds=$((now_epoch - created_epoch))

                    if [[ "$now_epoch" -gt "$expiry_epoch" ]]; then
                      age_hours=$((age_seconds / 3600))
                      age_mins=$(((age_seconds % 3600) / 60))
                      echo "  [DELETE] Expired (age: ${age_hours}h${age_mins}m, TTL: ${ttl})"

                      # Get PR number for logging
                      pr_number=$(kubectl get namespace "${ns}" \
                        -o jsonpath='{.metadata.annotations.preview\.featuresignals\.com/pr-number}' 2>/dev/null || echo "unknown")

                      # Delete the namespace (cascades to all resources)
                      kubectl delete namespace "${ns}" --wait=false 2>/dev/null && {
                        echo "  [OK] Deleted namespace ${ns} (PR #${pr_number})"
                        deleted=$((deleted + 1))
                      } || {
                        echo "  [FAIL] Could not delete namespace ${ns}"
                      }
                    else
                      remaining=$((expiry_epoch - now_epoch))
                      rem_hours=$((remaining / 3600))
                      rem_mins=$(((remaining % 3600) / 60))
                      echo "  [KEEP] Expires in ${rem_hours}h${rem_mins}m (TTL: ${ttl})"
                    fi
                  done

                  echo ""
                  echo "=========================================="
                  echo "  Cleanup complete. Deleted ${deleted} namespace(s)."
                  echo "=========================================="
