# =============================================================================
# FeatureSignals — Preview Management RBAC
# =============================================================================
#
# Service account and RBAC configuration for preview environment management.
# Used by:
#   - The TTL controller CronJob (ttl-controller.yaml)
#   - The Dagger PreviewCreate/PreviewDelete pipeline
#   - The preview-proxy (preview-proxy.yaml) for namespace existence checks
#
# Grants CRUD access to namespaces, workloads, and networking resources within
# the preview namespace scope. Scoped via ClusterRole with full namespace-level
# access — the preview-manager needs namespace CRUD across all preview-*
# namespaces.
# =============================================================================

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: preview-manager
  namespace: featuresignals-system
  labels:
    app.kubernetes.io/name: preview-manager
    app.kubernetes.io/component: preview-controller
    app.kubernetes.io/part-of: featuresignals
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: preview-manager
  labels:
    app.kubernetes.io/name: preview-manager
    app.kubernetes.io/component: preview-controller
    app.kubernetes.io/part-of: featuresignals
rules:
  # Namespace-level CRUD for creating/deleting preview namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Core workload resources inside preview namespaces
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "secrets", "persistentvolumeclaims", "endpoints", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Ingress resources for preview subdomain routing
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Deployments for server and dashboard
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Job resources for database migrations
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # HorizontalPodAutoscaler (though disabled for previews, needed for safety)
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # PodDisruptionBudget
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Certificates (cert-manager) for preview TLS
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "issuers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ServiceMonitors (prometheus operator)
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Allow reading node info (for scheduling decisions)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: preview-manager
  labels:
    app.kubernetes.io/name: preview-manager
    app.kubernetes.io/component: preview-controller
    app.kubernetes.io/part-of: featuresignals
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: preview-manager
subjects:
  - kind: ServiceAccount
    name: preview-manager
    namespace: featuresignals-system
