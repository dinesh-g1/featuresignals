# =============================================================================
# Caddy Ingress Controller — Helm Values
# =============================================================================
#
# Configures Caddy as the Kubernetes ingress controller for FeatureSignals.
# Running as a LoadBalancer service managed by MetalLB, TLS terminated at
# the edge with automatic Let's Encrypt certificates via cert-manager.
#
# Hardware Target: Hetzner CPX42 (8 vCPU, 16 GB RAM, 160 GB NVMe)
# =============================================================================

# -- Number of replicas. Single-node cluster = 1 is sufficient.
replicaCount: 1

# -- Container image configuration
image:
  repository: caddy
  tag: 2-alpine
  pullPolicy: IfNotPresent

# -- Service configuration: LoadBalancer so MetalLB assigns the VPS IP
service:
  type: LoadBalancer
  externalTrafficPolicy: Local
  annotations:
    metallb.universe.tf/address-pool: vps-pool

# -- Caddy global configuration
config:
  # -- Email for Let's Encrypt (overridden by ClusterIssuer, but set as fallback)
  email: ""
  # -- Disable on-demand TLS to prevent abuse
  onDemandTLS: false
  # -- HTTP/2 and HTTP/3 enabled
  http2: true
  http3: true
  # -- Global HTTP port
  httpPort: 80
  # -- Global HTTPS port
  httpsPort: 443
  # -- Admin API (disabled in production)
  admin: false

# -- Ingress controller configuration
ingressController:
  # -- Watch all namespaces for Ingress resources
  watchNamespace: ""
  # -- Default ingress class name
  defaultIngressClass: caddy
  # -- Set as the default ingress controller for the cluster
  setAsDefaultIngressClass: true

# -- Resource limits and requests (CPX42: 8 vCPU, 16 GB RAM — conservative)
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Pod disruption budget (not critical for single-node, but good practice)
podDisruptionBudget:
  enabled: false

# -- Node selector (single node, no special labels needed)
nodeSelector: {}

# -- Tolerations (allow scheduling on the control-plane node)
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

# -- Affinity rules (not meaningful on single-node, placeholder for future)
affinity: {}

# -- Security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# -- Container security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  readOnlyRootFilesystem: true

# -- Persistence for TLS certificates and Caddy storage
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

# -- Prometheus metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    namespace: caddy-system

# -- Graceful shutdown
terminationGracePeriodSeconds: 60

# -- Lifecycle hooks (graceful shutdown)
lifecycle:
  preStop:
    exec:
      command:
        - /bin/sh
        - -c
        - "sleep 5 && kill -QUIT 1"
