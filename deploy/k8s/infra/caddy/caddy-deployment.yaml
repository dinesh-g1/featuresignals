# =============================================================================
# FeatureSignals — Caddy Deployment (Manual / Non-Helm)
# =============================================================================
#
# This manifest is an alternative to the Helm-based Caddy ingress controller.
# It deploys Caddy directly as a Deployment with a Caddyfile-based ConfigMap
# that reverse-proxies to FeatureSignals backend services based on the Host
# header.
#
# Use this when you need full control over the Caddyfile configuration.
# For most deployments, the Helm chart (values.yaml) is preferred.
#
# DNS Records Required:
#   A   api.featuresignals.com       → <VPS_IP>
#   A   app.featuresignals.com        → <VPS_IP>
#   A   *.preview.featuresignals.com  → <VPS_IP>
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: caddy-system
  labels:
    name: caddy-system
    app.kubernetes.io/name: caddy
    app.kubernetes.io/part-of: featuresignals

---
# The Caddyfile ConfigMap — this is the heart of the reverse proxy configuration.
# Each host block matches an incoming Host header and routes to the appropriate
# backend Kubernetes Service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddyfile
  namespace: caddy-system
  labels:
    app.kubernetes.io/name: caddy
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: featuresignals
data:
  Caddyfile: |
    # =========================================================================
    # FeatureSignals — Global Caddy Configuration
    # =========================================================================
    # Automatic HTTPS via Let's Encrypt (cert-manager handles this, but Caddy
    # can also auto-provision certs if configured with an email).

    {
      # Global options
      email     ${ACME_EMAIL}
      admin     off
      servers   :443 {
        protocols h2 h3
      }
      ocsp_stapling on
    }

    # =========================================================================
    # API — api.featuresignals.com
    # =========================================================================
    # Routes to the FeatureSignals server API on port 8080.
    api.featuresignals.com {
      reverse_proxy featuresignals-api.featuresignals-system.svc.cluster.local:8080 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
      }

      header {
        X-Content-Type-Options "nosniff"
        X-Frame-Options "DENY"
        X-XSS-Protection "1; mode=block"
        Referrer-Policy "strict-origin-when-cross-origin"
        -Server
      }

      # Rate limiting: 1000 req/min per IP
      rate_limit {
        zone api_zone {
          key {remote_host}
          events 1000
          window 1m
        }
      }

      log {
        output net unixgram/var/log/caddy/api.log
        format json
      }
    }

    # =========================================================================
    # Dashboard — app.featuresignals.com
    # =========================================================================
    # Routes to the FeatureSignals Next.js dashboard on port 3000.
    app.featuresignals.com {
      reverse_proxy featuresignals-dashboard.featuresignals-saas.svc.cluster.local:3000 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
      }

      header {
        X-Frame-Options "DENY"
        X-Content-Type-Options "nosniff"
        X-XSS-Protection "1; mode=block"
        Referrer-Policy "strict-origin-when-cross-origin"
        -Server
      }

      # Dashboard can have relaxed rate limiting
      rate_limit {
        zone dashboard_zone {
          key {remote_host}
          events 500
          window 1m
        }
      }

      log {
        output net unixgram/var/log/caddy/dashboard.log
        format json
      }
    }

    # =========================================================================
    # Preview Environments — *.preview.featuresignals.com
    # =========================================================================
    # Routes preview environments (feature branches) to the preview proxy.
    *.preview.featuresignals.com {
      reverse_proxy preview-proxy.featuresignals-saas.svc.cluster.local:8080 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
      }

      header {
        X-Frame-Options "DENY"
        X-Content-Type-Options "nosniff"
        -Server
      }

      log {
        output net unixgram/var/log/caddy/preview.log
        format json
      }
    }

    # =========================================================================
    # Metrics Endpoint — Internal Only
    # =========================================================================
    # Caddy's own metrics endpoint, exposed internally for Prometheus scraping.
    :2019 {
      metrics /metrics {
        disable_openmetrics
      }
    }

---
# Persistent volume claim for Caddy's certificate storage and data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: caddy-data
  namespace: caddy-system
  labels:
    app.kubernetes.io/name: caddy
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: featuresignals
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # No storage class specified — uses the default (local-path on k3s)

---
# ServiceAccount for the Caddy deployment
apiVersion: v1
kind: ServiceAccount
metadata:
  name: caddy
  namespace: caddy-system
  labels:
    app.kubernetes.io/name: caddy
    app.kubernetes.io/component: service-account
    app.kubernetes.io/part-of: featuresignals

---
# Deployment running Caddy with the Caddyfile ConfigMap
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: caddy-system
  labels:
    app.kubernetes.io/name: caddy
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: featuresignals
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: caddy
      app.kubernetes.io/component: ingress
  template:
    metadata:
      labels:
        app.kubernetes.io/name: caddy
        app.kubernetes.io/component: ingress
        app.kubernetes.io/part-of: featuresignals
      annotations:
        # Prometheus scraping annotation
        prometheus.io/scrape: "true"
        prometheus.io/port: "2019"
        prometheus.io/path: "/metrics"
        # ConfigMap hash for rolling updates on config change
        checksum/config: 7a4b3c2d1e0f
    spec:
      serviceAccountName: caddy
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # Tolerate the control-plane taint to schedule on the single k3s node
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: caddy
          image: caddy:2-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: metrics
              containerPort: 2019
              protocol: TCP
          env:
            - name: ACME_AGREE
              value: "true"
            - name: CADDY_ADMIN
              value: "off"
          volumeMounts:
            - name: config
              mountPath: /etc/caddy
              readOnly: true
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 2019
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 2019
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: true
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep 5 && kill -QUIT 1"
      volumes:
        - name: config
          configMap:
            name: caddyfile
            items:
              - key: Caddyfile
                path: Caddyfile
        - name: data
          persistentVolumeClaim:
            claimName: caddy-data
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi

---
# Service that exposes Caddy as a LoadBalancer via MetalLB
apiVersion: v1
kind: Service
metadata:
  name: caddy
  namespace: caddy-system
  labels:
    app.kubernetes.io/name: caddy
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: featuresignals
  annotations:
    # Assign the VPS IP address from the MetalLB pool
    metallb.universe.tf/address-pool: vps-pool
    metallb.universe.tf/allow-shared-ip: "featuresignals"
    # External traffic reaches the correct pod immediately
    service.beta.kubernetes.io/external-traffic: Local
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
  selector:
    app.kubernetes.io/name: caddy
    app.kubernetes.io/component: ingress

---
# NetworkPolicy: restrict inbound traffic to ports 80, 443, and 2019 (metrics)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: caddy-ingress
  namespace: caddy-system
  labels:
    app.kubernetes.io/name: caddy
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: featuresignals
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: caddy
      app.kubernetes.io/component: ingress
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
      from:
        - ipBlock:
            cidr: 0.0.0.0/0
    - ports:
        - port: 2019
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
