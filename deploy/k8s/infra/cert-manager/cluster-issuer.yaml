---
# =============================================================================
# FeatureSignals — cert-manager ClusterIssuers
# =============================================================================
#
# Two ClusterIssuers are created:
#   - letsencrypt-prod:    Production Let's Encrypt (rate-limited)
#   - letsencrypt-staging: Staging Let's Encrypt (for testing, no rate limits)
#
# Replace ${ACME_EMAIL} with your actual email address before applying.
#
# Usage:
#   export ACME_EMAIL="admin@featuresignals.com"
#   envsubst < cluster-issuer.yaml | kubectl apply -f -
# =============================================================================

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/name: letsencrypt-prod
    app.kubernetes.io/component: cert-manager
    app.kubernetes.io/part-of: featuresignals
spec:
  acme:
    # You must replace this email address with your own.
    # Let's Encrypt uses this to contact you about expiring
    # certificates and issues with your account.
    email: ${ACME_EMAIL}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      # Secret resource used to store the account's private key.
      name: letsencrypt-prod-account-key
    solvers:
      # Use the HTTP-01 challenge with Caddy ingress class.
      - http01:
          ingress:
            class: caddy

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/name: letsencrypt-staging
    app.kubernetes.io/component: cert-manager
    app.kubernetes.io/part-of: featuresignals
spec:
  acme:
    email: ${ACME_EMAIL}
    # Let's Encrypt staging environment — no rate limits, but
    # certificates are NOT trusted by browsers. Use for testing.
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: caddy
