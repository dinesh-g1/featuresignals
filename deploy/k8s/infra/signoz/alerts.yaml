# =============================================================================
# FeatureSignals — SigNoz Alert Rules
# =============================================================================
#
# Alert rules for the FeatureSignals observability stack.
# These can be configured in the SigNoz UI under "Alerts" tab.
#
# SigNoz supports two alert types:
#   1. PromQL-based alerts — evaluated against the metrics store
#   2. ClickHouse query alerts — evaluated against ClickHouse directly
#
# All alerts below use PromQL syntax compatible with SigNoz's alert manager.
#
# Import via: SigNoz UI → Alerts → "Create Alert" or bulk-import via API
# =============================================================================

# ---------------------------------------------------------------------------
# 1. Critical — High Error Rate
# ---------------------------------------------------------------------------
# Triggers when > 5% of HTTP requests result in 5xx errors over 5 minutes.
# Action: Page on-call engineer immediately. Likely a deployment issue or
#         upstream dependency failure.
# expr: rate(fs_http_requests_total{status=~"5.."}[5m]) / rate(fs_http_requests_total[5m]) > 0.05
# for: 5m
# severity: critical
# labels:
#   team: backend
#   pager: true
# annotations:
#   summary: "High HTTP 5xx error rate ({{ $value | humanizePercentage }})"
#   description: |
#     Error rate on {{ $labels.endpoint }} has exceeded 5% for 5 minutes.
#     Current rate: {{ $value | humanizePercentage }}
#     Runbook: deploy/runbooks/observability-setup.md
#     Dashboard: API Performance
#

# ---------------------------------------------------------------------------
# 2. Warning — High P99 Latency
# ---------------------------------------------------------------------------
# Triggers when P99 latency exceeds 1 second for 5+ minutes.
# Action: Investigate database query performance or external dependency latency.
#         Check if a recent deployment introduced a regression.
# expr: histogram_quantile(0.99, sum(rate(fs_http_request_duration_seconds_bucket[5m])) by (le, endpoint)) > 1
# for: 5m
# severity: warning
# labels:
#   team: backend
# annotations:
#   summary: "P99 latency on {{ $labels.endpoint }} exceeds 1s"
#   description: |
#     P99 latency on {{ $labels.endpoint }} is {{ $value | humanizeDuration }}.
#     Threshold: 1s. Check DB query performance and external API calls.
#     Dashboard: API Performance
#

# ---------------------------------------------------------------------------
# 3. Warning — High Database Connections
# ---------------------------------------------------------------------------
# Triggers when more than 50 database connections are active.
# PostgreSQL max_connections is typically 100 on CPX42. At 50 active
# connections, we're at 50% capacity — time to investigate connection leaks.
# expr: fs_db_connections_active > 50
# for: 5m
# severity: warning
# labels:
#   team: backend
# annotations:
#   summary: "High database connection count ({{ $value }})"
#   description: |
#     Active database connections: {{ $value }}. Threshold is 50.
#     Check for connection leaks or increased traffic requiring pool tuning.
#     Dashboard: Database
#

# ---------------------------------------------------------------------------
# 4. Critical — Database Connection Exhaustion
# ---------------------------------------------------------------------------
# Triggers when database connections exceed 80 — near PostgreSQL's limit.
# Action: Immediate investigation. Kill idle connections, scale or tune pool.
# expr: fs_db_connections_active > 80
# for: 2m
# severity: critical
# labels:
#   team: backend
#   pager: true
# annotations:
#   summary: "Database connection pool near exhaustion ({{ $value }})"
#   description: |
#     Active connections at {{ $value }}. Near PostgreSQL max_connections.
#     Immediate investigation required. Check for connection leak.
#

# ---------------------------------------------------------------------------
# 5. Critical — Pod Restart Loop
# ---------------------------------------------------------------------------
# Triggers when any pod has restarted more than 5 times in the last hour.
# Action: Check pod logs, resource constraints, liveness probe failures.
# expr: rate(kube_pod_container_status_restarts_total[1h]) > 5
# for: 10m
# severity: critical
# labels:
#   team: platform
#   pager: true
# annotations:
#   summary: "Pod {{ $labels.pod }} restarting frequently"
#   description: |
#     Pod {{ $labels.pod }} in namespace {{ $labels.namespace }}
#     has restarted {{ $value }} times in the last hour.
#     Check: kubectl logs -n {{ $labels.namespace }} {{ $labels.pod }} --previous
#

# ---------------------------------------------------------------------------
# 6. Warning — High Memory Usage Per Pod
# ---------------------------------------------------------------------------
# Triggers when any pod exceeds 85% of its memory limit.
# Action: Investigate memory leak or adjust resource limits.
# expr: (container_memory_working_set_bytes{container!=""} / on(container, pod, namespace)
#        container_spec_memory_limit_bytes{container!=""}) * 100 > 85
# for: 5m
# severity: warning
# labels:
#   team: platform
# annotations:
#   summary: "Pod {{ $labels.pod }} memory usage at {{ $value | humanizePercentage }}"
#   description: |
#     Memory usage on {{ $labels.pod }}/{{ $labels.container }}: {{ $value }}%.
#     Threshold: 85%. Consider increasing memory limits or investigating leaks.
#

# ---------------------------------------------------------------------------
# 7. Warning — Certificate Expiring Soon
# ---------------------------------------------------------------------------
# Triggers when any Let's Encrypt certificate will expire within 7 days.
# Action: cert-manager should auto-renew, but this alerts if it fails.
# expr: certmanager_certificate_expiration_timestamp_seconds - time() < 604800
# for: 1h
# severity: warning
# labels:
#   team: platform
# annotations:
#   summary: "TLS certificate {{ $labels.name }} expiring in {{ $value | humanizeDuration }}"
#   description: |
#     Certificate {{ $labels.name }} in namespace {{ $labels.namespace }}
#     expires {{ $labels | humanizeTimestamp }}. cert-manager should auto-renew.
#     Check: kubectl get certificaterequests -n {{ $labels.namespace }}
#

# ---------------------------------------------------------------------------
# 8. Critical — Evaluation Pipeline Degraded
# ---------------------------------------------------------------------------
# Triggers when P99 evaluation latency exceeds 10ms or cache hit rate drops
# below 90%. This is the most critical business metric.
# Action: Immediate investigation — cache invalidation storm or DB overload.
# expr: |
#   histogram_quantile(0.99, rate(fs_evaluation_duration_seconds_bucket[5m])) > 0.01
#   or
#   (rate(fs_evaluation_cache_hits_total[5m]) / (rate(fs_evaluation_cache_hits_total[5m]) + rate(fs_evaluation_cache_misses_total[5m]))) < 0.9
# for: 5m
# severity: critical
# labels:
#   team: backend
#   pager: true
# annotations:
#   summary: "Evaluation pipeline degraded"
#   description: |
#     P99 evaluation latency: {{ $value | humanizeDuration }} (threshold: 10ms)
#     or cache hit rate below 90%.
#     Dashboard: Evaluation Hot Path
#

# ---------------------------------------------------------------------------
# 9. Warning — High Evaluation Error Rate
# ---------------------------------------------------------------------------
# Triggers when flag evaluation errors exceed 1% of all evaluations.
# Action: Investigate segment engine or feature flag configuration issues.
# expr: rate(fs_evaluation_errors_total[5m]) / rate(fs_evaluations_total[5m]) > 0.01
# for: 5m
# severity: warning
# labels:
#   team: backend
# annotations:
#   summary: "Evaluation error rate at {{ $value | humanizePercentage }}"
#   description: |
#     {{ $value | humanizePercentage }} of flag evaluations are failing.
#     Check segment definitions, flag configurations, and eval engine health.
#

# ---------------------------------------------------------------------------
# 10. Warning — Disk Space Low
# ---------------------------------------------------------------------------
# Triggers when any persistent volume uses more than 80% of capacity.
# Action: Clean up old data or expand PVC. SigNoz TTL should auto-clean.
# expr: (node_filesystem_avail_bytes{mountpoint="/var/lib/rancher/k3s"} / node_filesystem_size_bytes{mountpoint="/var/lib/rancher/k3s"}) * 100 < 20
# for: 10m
# severity: warning
# labels:
#   team: platform
# annotations:
#   summary: "Low disk space on {{ $labels.mountpoint }} ({{ $value | humanizePercentage }} free)"
#   description: |
#     Only {{ $value | humanizePercentage }} disk space remaining on {{ $labels.mountpoint }}.
#     CPX42 has 160 GB NVMe. Check SigNoz retention or backup PVC usage.
#

# ---------------------------------------------------------------------------
# 11. Critical — SigNoz Down
# ---------------------------------------------------------------------------
# Triggers when SigNoz query service is unreachable for 5+ minutes.
# Action: Check SigNoz pods and ClickHouse health.
# expr: up{job="signoz-query-service"} == 0
# for: 5m
# severity: critical
# labels:
#   team: platform
#   pager: true
# annotations:
#   summary: "SigNoz query service is down"
#   description: |
#     SigNoz query service is unreachable. Observability data may be lost.
#     Check: kubectl get pods -n signoz
#     Restart: helm upgrade --install signoz signoz/signoz -n signoz -f values.yaml
#

# ---------------------------------------------------------------------------
# 12. Warning — Temporal Server Down
# ---------------------------------------------------------------------------
# Triggers when Temporal server health endpoint returns non-200.
# Action: Check Temporal pods and its PostgreSQL connection.
# expr: up{job="temporal-server"} == 0
# for: 5m
# severity: warning
# labels:
#   team: platform
# annotations:
#   summary: "Temporal server is unreachable"
#   description: |
#     Temporal server health check failed. Workflow execution may be impacted.
#     Check: kubectl get pods -n temporal
#           kubectl logs -n temporal deployment/temporal
#

# =============================================================================
# Bulk Import Format (JSON — for SigNoz API)
# =============================================================================
#
# To bulk-import these alerts via the SigNoz API:
#
# ```bash
# # This requires the SigNoz API key and endpoint
# curl -X POST https://signoz.example.com/api/v1/alerts \
#   -H "Content-Type: application/json" \
#   -H "Authorization: Bearer $SIGNOZ_API_KEY" \
#   -d @alerts.json
# ```
#
# Alternatively, use the SigNoz UI → Alerts → "Import from JSON"
#
# See deploy/runbooks/observability-setup.md for step-by-step instructions.
# =============================================================================
