# =============================================================================
# SigNoz — Helm Values for FeatureSignals Observability Stack
# =============================================================================
#
# Budget-optimized SigNoz deployment for single-node k3s on Hetzner CPX42
# (8 vCPU, 16 GB RAM). Replaces the need for Prometheus + Grafana + Loki +
# Jaeger + Tempo with a single OTel-native observability platform.
#
# Architecture:
#   OTel Collector → SigNoz Query Service → ClickHouse (10Gi)
#                                  ↓
#                            Frontend (UI)
#
# Retention:
#   - Traces:  7 days  (168h)
#   - Metrics: 30 days (720h)
#   - Logs:    7 days  (168h)
#
# Hardware Target: CPX42 (8 vCPU, 16 GB RAM, 160 GB NVMe)
# Cost: Free (self-hosted, open source)
# =============================================================================

# ---------------------------------------------------------------------------
# ClickHouse — Columnar storage for traces, metrics, and logs
# ---------------------------------------------------------------------------
clickhouse:
  # -- ClickHouse cluster configuration for single-node
  cluster:
    enabled: false

  # -- Storage persistence
  persistence:
    enabled: true
    # 10Gi is sufficient for 7 days of traces, 30 days of metrics, 7 days of logs
    # on a CPX42 with moderate traffic (target: ~100 evaluations/s peak)
    size: 10Gi
    storageClass: ""  # Uses cluster default (local-path on k3s)

  # -- Resource allocation for ClickHouse
  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 500m

  # -- ClickHouse configuration
  config:
    # -- Compression settings for budget storage
    compression:
      - method: lz4
        min_part_size: 0
        min_part_size_ratio: 0
        level: 1

  # -- Zookeeper (not needed for single-node)
  zookeeper:
    enabled: false

# ---------------------------------------------------------------------------
# Query Service — Handles API requests from the frontend
# ---------------------------------------------------------------------------
queryService:
  replicaCount: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 300m

  # -- Autoscaling disabled for single-node
  autoscaling:
    enabled: false

# ---------------------------------------------------------------------------
# OpenTelemetry Collector — Ingests OTLP data from the FeatureSignals server
# ---------------------------------------------------------------------------
otelCollector:
  replicaCount: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 300m

  # -- OTel Collector configuration overrides
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 10s
        send_batch_size: 10000

    exporters:
      clickhousemetricswrite:
        endpoint: http://{{ include "signoz.fullname" . }}-clickhouse:9000
      clickhousetraces:
        datasource: tcp://{{ include "signoz.fullname" . }}-clickhouse:9000
      clickhouselogsexporter:
        dsn: tcp://{{ include "signoz.fullname" . }}-clickhouse:9000

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [clickhousetraces]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [clickhousemetricswrite]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [clickhouselogsexporter]

# ---------------------------------------------------------------------------
# Alert Manager — Disabled to save resources; use SigNoz built-in alerts
# ---------------------------------------------------------------------------
alertManager:
  enabled: false

# ---------------------------------------------------------------------------
# Frontend — SigNoz Web UI
# ---------------------------------------------------------------------------
frontend:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

  # -- Ingress configuration (disabled by default; use port-forward for access)
  ingress:
    enabled: false
    # -- Uncomment and configure for production access:
    # annotations:
    #   cert-manager.io/cluster-issuer: letsencrypt-prod
    #   kubernetes.io/ingress.class: caddy
    # hosts:
    #   - host: observability.featuresignals.com
    #     paths:
    #       - path: /
    #         pathType: Prefix
    # tls:
    #   - hosts:
    #       - observability.featuresignals.com
    #     secretName: signoz-frontend-tls

# ---------------------------------------------------------------------------
# Kubernetes Infrastructure Monitoring — Disabled on single-node
# ---------------------------------------------------------------------------
k8sInfra:
  enabled: false

  # -- Even minimal kube-state-metrics is not needed for a single-node dev cluster
  kubeStateMetrics:
    enabled: false

  # -- Node exporter not needed for a single node we SSH into directly
  nodeExporter:
    enabled: false

# ---------------------------------------------------------------------------
# Data Retention Policy
# ---------------------------------------------------------------------------
ttl:
  # -- Trace data retention: 7 days
  traces: "168h"
  # -- Metrics data retention: 30 days
  metrics: "720h"
  # -- Logs data retention: 7 days
  logs: "168h"

# ---------------------------------------------------------------------------
# Global Settings
# ---------------------------------------------------------------------------
global:
  # -- Single-node cluster — no anti-affinity needed
  podAntiAffinity: false

  # -- Cluster domain for DNS resolution
  clusterDomain: cluster.local

# ---------------------------------------------------------------------------
# Service Monitor for Prometheus Operator — Disabled (SigNoz IS the monitoring)
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: false

# ---------------------------------------------------------------------------
# Pod Security
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  readOnlyRootFilesystem: true
