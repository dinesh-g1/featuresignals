{{define "title"}}Cluster Details{{end}}
{{define "content"}}
<div class="p-6">
  <a href="/clusters" class="text-link mb-4 inline-block">&larr; Back to Clusters</a>
  <div id="clusterDetail">
    <div class="card"><p class="text-gray-500">Loading cluster details...</p></div>
  </div>
</div>
<script>
var clusterId = '{{.ID}}';

async function loadCluster() {
  var container = document.getElementById('clusterDetail');
  try {
    var resp = await fetch('/api/v1/clusters/' + clusterId);
    if (!resp.ok) {
      if (resp.status === 404) {
        container.innerHTML = '<div class="card"><div class="empty-state"><p class="empty-title">Cluster not found</p><a href="/clusters" class="btn btn-primary">Back to Clusters</a></div></div>';
        return;
      }
      var err = await resp.json();
      container.innerHTML = '<div class="card"><div class="empty-state"><p class="empty-text">' + escapeHtml(err.error || 'Failed to load cluster') + '</p><button class="btn btn-primary" onclick="loadCluster()">Retry</button></div></div>';
      return;
    }
    var c = await resp.json();
    var isProvisioned = c.hetzner_server_id && c.hetzner_server_id > 0;
    var isDecommissioned = c.status === 'decommissioned';
    var statusDotClass = c.status === 'online' ? 'status-ok' : c.status === 'degraded' ? 'status-warn' : c.status === 'offline' ? 'status-err' : 'status-unknown';
    var html = '<div class="cluster-card">';
    html += '<div class="cluster-card-header"><span class="status-dot ' + statusDotClass + '"></span><h2>' + escapeHtml(c.name) + '</h2><span class="status-badge status-badge-' + (c.status || 'unknown') + '">' + (c.status || 'unknown') + '</span></div>';
    html += '<div class="cluster-card-body">';
    html += '<div class="cluster-info"><span>ID</span><span class="mono">' + escapeHtml(c.id) + '</span></div>';
    html += '<div class="cluster-info"><span>Region</span><span>' + escapeHtml(c.region || '-') + '</span></div>';
    html += '<div class="cluster-info"><span>Provider</span><span>' + escapeHtml(c.provider || '-') + '</span></div>';
    html += '<div class="cluster-info"><span>Server Type</span><span>' + escapeHtml(c.server_type || '-') + '</span></div>';
    html += '<div class="cluster-info"><span>IP</span><span class="mono">' + escapeHtml(c.public_ip || '-') + '</span></div>';
    html += '<div class="cluster-info"><span>Version</span><span class="mono">' + escapeHtml(c.version || '-') + '</span></div>';
    html += '<div class="cluster-info"><span>Cost</span><span>$' + (c.cost_per_month || 0).toFixed(2) + '/mo</span></div>';
    html += '<div class="cluster-info"><span>Created</span><span>' + (c.created_at ? new Date(c.created_at).toLocaleString() : '-') + '</span></div>';
    if (c.signoz_url) {
      html += '<div class="cluster-info"><span>SigNoz</span><a href="' + escapeHtml(c.signoz_url) + '" target="_blank" class="text-link">Open Dashboard &rarr;</a></div>';
    }
    html += '</div>';
    html += '<div class="cluster-card-actions" style="border-top:1px solid var(--border);padding:1rem;display:flex;flex-wrap:wrap;gap:0.5rem">';
    if (!isDecommissioned) {
      if (!isProvisioned) {
        html += '<button class="btn btn-primary btn-sm" onclick="provisionCluster()">Provision VPS</button>';
      } else {
        html += '<button class="btn btn-outline btn-sm" onclick="deprovisionCluster()" style="color:var(--err);border-color:var(--err)">Deprovision VPS</button>';
      }
      html += '<a href="/clusters/' + clusterId + '/config" class="btn btn-outline btn-sm">Config</a>';
      html += '<a href="/deployments" class="btn btn-outline btn-sm">Deployments</a>';
      html += '<button class="btn btn-outline btn-sm" onclick="loadMetrics()">Metrics</button>';
      html += '<button class="btn btn-outline btn-sm" onclick="checkHealth()">Health Check</button>';
    }
    html += '</div>';
    html += '</div>';
    html += '<div id="metricsSection" class="mt-6" style="display:none"></div>';
    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = '<div class="card"><div class="empty-state"><p class="empty-text">Connection failed. Check your network and try again.</p><button class="btn btn-primary" onclick="loadCluster()">Retry</button></div></div>';
  }
}

async function provisionCluster() {
  if (!confirm('Provision a new VPS for this cluster? This will create a Hetzner server.')) return;
  try {
    var resp = await fetch('/api/v1/clusters/' + clusterId + '/provision', { method: 'POST' });
    if (resp.ok) { loadCluster(); }
    else { var err = await resp.json(); alert(err.error || 'Provisioning failed'); }
  } catch(e) { alert('Connection failed'); }
}

async function deprovisionCluster() {
  if (!confirm('WARNING: This will DELETE the Hetzner server and all its data. Are you sure?')) return;
  try {
    var resp = await fetch('/api/v1/clusters/' + clusterId + '/deprovision', { method: 'POST' });
    if (resp.ok) { loadCluster(); }
    else { var err = await resp.json(); alert(err.error || 'Deprovisioning failed'); }
  } catch(e) { alert('Connection failed'); }
}

async function checkHealth() {
  try {
    var resp = await fetch('/api/v1/clusters/' + clusterId + '/health');
    var data = await resp.json();
    if (data.services) {
      var msg = 'Health: ' + data.status + '\nServices:\n';
      for (var key in data.services) {
        if (data.services.hasOwnProperty(key)) {
          msg += '  ' + key + ': ' + data.services[key] + '\n';
        }
      }
      alert(msg);
    } else {
      alert('Health: ' + (data.status || 'unknown'));
    }
  } catch(e) { alert('Cluster unreachable'); }
}

async function loadMetrics() {
  var section = document.getElementById('metricsSection');
  section.style.display = 'block';
  section.innerHTML = '<div class="card"><p class="text-gray-500">Loading metrics...</p></div>';
  try {
    var resp = await fetch('/api/v1/clusters/' + clusterId + '/metrics');
    if (!resp.ok) {
      section.innerHTML = '<div class="card"><div class="empty-state"><p class="empty-text">Metrics unavailable.</p><button class="btn btn-primary btn-sm" onclick="loadMetrics()">Retry</button></div></div>';
      return;
    }
    var m = await resp.json();
    section.innerHTML = '<div class="card"><h3 class="mb-4">Cluster Metrics</h3><div class="grid grid-cols-3 gap-4">' +
      renderGauge('CPU', m.cpu || 0) + renderGauge('Memory', m.memory || 0) + renderGauge('Disk', m.disk || 0) +
      '</div><p class="text-xs text-gray-400 mt-3">Last updated: ' + (m.recorded_at ? new Date(m.recorded_at).toLocaleString() : 'just now') + '</p></div>';
  } catch(e) {
    section.innerHTML = '<div class="card"><div class="empty-state"><p class="empty-text">Metrics unavailable.</p><button class="btn btn-primary btn-sm" onclick="loadMetrics()">Retry</button></div></div>';
  }
}

function renderGauge(label, value) {
  var pct = Math.min(100, Math.max(0, value));
  return '<div style="text-align:center;padding:1rem">' +
    '<div style="position:relative;width:120px;height:120px;margin:0 auto">' +
    '<canvas id="gauge-' + label.replace(/\s+/g, '') + '" width="120" height="120"></canvas>' +
    '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.25rem;font-weight:700">' + pct.toFixed(0) + '%</div></div>' +
    '<p style="font-size:0.8125rem;font-weight:600;margin-top:0.25rem">' + label + '</p></div>';
}

loadCluster();
</script>
{{end}}
