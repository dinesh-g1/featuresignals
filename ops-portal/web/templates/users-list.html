{{define "title"}}Users{{end}} {{define "content"}}
<div class="p-6">
    <div class="flex items-center justify-between mb-6">
        <h1 class="page-title">Users</h1>
        <button
            class="btn btn-primary"
            data-rbac="admin"
            onclick="showAddUser()"
        >
            Add User
        </button>
    </div>
    <div id="userModal" class="modal-overlay" style="display: none">
        <div
            class="modal-content card"
            style="max-width: 500px; margin: 4rem auto"
        >
            <h3 id="userModalTitle" class="mb-4">Add User</h3>
            <form id="userForm">
                <div id="userFormResult"></div>
                <div class="form-group">
                    <label>Email</label
                    ><input
                        type="email"
                        id="userEmail"
                        class="form-input"
                        required
                    />
                </div>
                <div class="form-group">
                    <label>Name</label
                    ><input type="text" id="userName" class="form-input" />
                </div>
                <div class="form-group" id="passwordGroup">
                    <label>Password</label
                    ><input
                        type="password"
                        id="userPassword"
                        class="form-input"
                        minlength="8"
                    />
                </div>
                <div class="form-group">
                    <label>Role</label
                    ><select id="userRole" class="form-input">
                        <option value="viewer">Viewer</option>
                        <option value="engineer">Engineer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="flex gap-2 mt-3">
                    <button
                        type="submit"
                        id="userSubmitBtn"
                        class="btn btn-primary"
                    >
                        Create
                    </button>
                    <button
                        type="button"
                        class="btn btn-outline"
                        onclick="hideUserModal()"
                    >
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
    <div id="usersContainer">
        <div class="card"><p class="text-gray-500">Loading users...</p></div>
    </div>
</div>
<script>
    var editingUserId = null;

    function showAddUser() {
        editingUserId = null;
        document.getElementById("userModalTitle").textContent = "Add User";
        document.getElementById("userSubmitBtn").textContent = "Create";
        document.getElementById("userForm").reset();
        document.getElementById("passwordGroup").style.display = "block";
        document.getElementById("userPassword").required = true;
        document.getElementById("userFormResult").innerHTML = "";
        document.getElementById("userModal").style.display = "block";
    }

    function showEditUser(id, email, name, role) {
        editingUserId = id;
        document.getElementById("userModalTitle").textContent = "Edit User";
        document.getElementById("userSubmitBtn").textContent = "Save";
        document.getElementById("userEmail").value = email;
        document.getElementById("userName").value = name;
        document.getElementById("userRole").value = role;
        document.getElementById("passwordGroup").style.display = "none";
        document.getElementById("userPassword").required = false;
        document.getElementById("userFormResult").innerHTML = "";
        document.getElementById("userModal").style.display = "block";
    }

    function hideUserModal() {
        document.getElementById("userModal").style.display = "none";
        document.getElementById("userFormResult").innerHTML = "";
    }

    async function loadUsers() {
        var container = document.getElementById("usersContainer");
        container.innerHTML =
            '<div class="card"><p class="text-gray-500">Loading users...</p></div>';
        try {
            var resp = await fetch("/api/v1/users");
            if (!resp.ok) {
                var err = await resp.json();
                container.innerHTML =
                    '<div class="card"><div class="empty-state"><p class="empty-text">' +
                    escapeHtml(err.error || "Failed to load users") +
                    '</p><button class="btn btn-primary" onclick="loadUsers()">Retry</button></div></div>';
                return;
            }
            var users = await resp.json();
            if (users.length === 0) {
                container.innerHTML =
                    '<div class="card"><div class="empty-state"><p class="empty-title">No users yet</p><p class="empty-text">Add a user to get started.</p><button class="btn btn-primary" onclick="showAddUser()">Add User</button></div></div>';
                return;
            }
            var html =
                '<div class="card" style="overflow-x:auto"><table class="table"><thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Created</th><th>Last Login</th><th>Actions</th></tr></thead><tbody>';
            users.forEach(function (u) {
                var roleClass =
                    u.role === "admin"
                        ? "status-badge-online"
                        : u.role === "engineer"
                          ? "status-badge-degraded"
                          : "status-badge-unknown";
                html +=
                    "<tr><td>" +
                    escapeHtml(u.email) +
                    "</td><td>" +
                    escapeHtml(u.name || "-") +
                    '</td><td><span class="status-badge ' +
                    roleClass +
                    '">' +
                    escapeHtml(u.role) +
                    '</span></td><td class="text-sm">' +
                    (u.created_at
                        ? new Date(u.created_at).toLocaleString()
                        : "-") +
                    '</td><td class="text-sm">' +
                    (u.last_login_at
                        ? new Date(u.last_login_at).toLocaleString()
                        : "Never") +
                    "</td>";
                html +=
                    '<td><div class="flex gap-2"><button class="btn btn-outline btn-sm" onclick="showEditUser(\'' +
                    escapeHtml(escapeJsStr(u.id)) +
                    "','" +
                    escapeHtml(escapeJsStr(u.email)) +
                    "','" +
                    escapeHtml(escapeJsStr(u.name || "")) +
                    "','" +
                    escapeHtml(escapeJsStr(u.role)) +
                    '\')">Edit</button><button class="btn btn-outline btn-sm" style="color:var(--err)" onclick="deleteUser(\'' +
                    escapeHtml(escapeJsStr(u.id)) +
                    "','" +
                    escapeHtml(escapeJsStr(u.email)) +
                    "')\">Delete</button></div></td></tr>";
            });
            html += "</tbody></table></div>";
            container.innerHTML = html;
        } catch (err) {
            container.innerHTML =
                '<div class="card"><div class="empty-state"><p class="empty-text">Connection failed. Check your network and try again.</p><button class="btn btn-primary" onclick="loadUsers()">Retry</button></div></div>';
        }
    }

    document
        .getElementById("userForm")
        .addEventListener("submit", async function (e) {
            e.preventDefault();
            var resultDiv = document.getElementById("userFormResult");
            var submitBtn = document.getElementById("userSubmitBtn");
            var email = document.getElementById("userEmail").value.trim();
            var name =
                document.getElementById("userName").value.trim() || email;
            var password = document.getElementById("userPassword").value;
            var role = document.getElementById("userRole").value;
            if (editingUserId) {
                submitBtn.disabled = true;
                submitBtn.textContent = "Saving...";
                try {
                    var resp = await fetch("/api/v1/users/" + editingUserId, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name: name, role: role }),
                    });
                    if (resp.ok) {
                        hideUserModal();
                        loadUsers();
                    } else {
                        var err = await resp.json();
                        resultDiv.innerHTML =
                            '<div class="alert alert-error">' +
                            escapeHtml(err.error || "Save failed") +
                            "</div>";
                    }
                } catch (e) {
                    resultDiv.innerHTML =
                        '<div class="alert alert-error">Connection failed</div>';
                }
                submitBtn.disabled = false;
                submitBtn.textContent = "Save";
            } else {
                if (!password || password.length < 8) {
                    resultDiv.innerHTML =
                        '<div class="alert alert-error">Password must be at least 8 characters</div>';
                    return;
                }
                if (!email) {
                    resultDiv.innerHTML =
                        '<div class="alert alert-error">Email is required</div>';
                    return;
                }
                submitBtn.disabled = true;
                submitBtn.textContent = "Creating...";
                try {
                    var resp = await fetch("/api/v1/users", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            email: email,
                            password: password,
                            name: name,
                            role: role,
                        }),
                    });
                    if (resp.ok) {
                        hideUserModal();
                        loadUsers();
                    } else {
                        var err = await resp.json();
                        resultDiv.innerHTML =
                            '<div class="alert alert-error">' +
                            escapeHtml(err.error || "Create failed") +
                            "</div>";
                    }
                } catch (e) {
                    resultDiv.innerHTML =
                        '<div class="alert alert-error">Connection failed</div>';
                }
                submitBtn.disabled = false;
                submitBtn.textContent = "Create";
            }
        });

    async function deleteUser(id, email) {
        if (
            !confirm(
                "Are you sure you want to delete " +
                    email +
                    "? This cannot be undone.",
            )
        )
            return;
        try {
            var resp = await fetch("/api/v1/users/" + id, { method: "DELETE" });
            if (resp.ok) {
                loadUsers();
            } else {
                var err = await resp.json();
                alert(err.error || "Delete failed");
            }
        } catch (e) {
            alert("Connection failed");
        }
    }

    loadUsers();
</script>
{{end}}
