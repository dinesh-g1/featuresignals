{{define "title"}}Configuration{{end}}
{{define "content"}}
<div class="p-6">
  <a href="/clusters/{{.ID}}" class="text-link mb-4 inline-block">&larr; Back to Cluster</a>
  <h1 class="page-title mb-6">Cluster Configuration</h1>
  <div id="config-container">
    <div class="card"><p class="text-gray-500">Loading configuration...</p></div>
  </div>
</div>
<script>
var clusterId = '{{.ID}}';
var currentConfig = '';

async function loadConfig() {
  var container = document.getElementById('config-container');
  container.innerHTML = '<div class="card"><p class="text-gray-500">Loading configuration...</p></div>';
  try {
    var resp = await fetch('/api/v1/clusters/' + clusterId + '/config');
    if (resp.status === 503) {
      container.innerHTML = '<div class="card"><div class="empty-state"><p class="empty-text">Cluster is offline and no cached config is available.</p><button class="btn btn-primary" onclick="loadConfig()">Retry</button></div></div>';
      return;
    }
    if (!resp.ok) {
      var err = await resp.json();
      container.innerHTML = '<div class="card"><div class="empty-state"><p class="empty-text">' + escapeHtml(err.error || 'Failed to load config') + '</p><button class="btn btn-primary" onclick="loadConfig()">Retry</button></div></div>';
      return;
    }
    var data = await resp.json();
    currentConfig = typeof data.config === 'string' ? data.config : JSON.stringify(data.config, null, 2);
    var source = data.source || 'live';
    var sourceLabel = source === 'snapshot' ? 'Cached (cluster offline)' : 'Live from cluster';
    var warning = source === 'snapshot' ? '<div class="alert" style="background:#fef9c3;color:#854d0e;border:1px solid #fde68a;margin-bottom:1rem">Warning: Showing cached config from ' + (data.created_at ? new Date(data.created_at).toLocaleString() : 'unknown') + '. Cluster is offline.</div>' : '';
    var html = warning;
    html += '<div class="card">';
    html += '<div class="flex items-center justify-between mb-4"><div><span class="text-sm text-gray-500">Source: ' + sourceLabel + '</span>' + (data.version ? '<span class="text-sm text-gray-500 ml-4">Version: ' + escapeHtml(data.version) + '</span>' : '') + '</div>';
    html += '<div class="flex gap-2"><button class="btn btn-outline btn-sm" onclick="toggleEdit()">Edit</button><button class="btn btn-outline btn-sm" onclick="loadConfig()">Refresh</button></div></div>';
    html += '<pre id="configDisplay" class="mono" style="background:#1e293b;color:#e2e8f0;padding:1rem;border-radius:0.375rem;overflow-x:auto;font-size:0.75rem;line-height:1.5;white-space:pre-wrap;max-height:500px;overflow-y:auto">' + escapeHtml(currentConfig) + '</pre>';
    html += '<textarea id="configEditor" style="display:none;width:100%;min-height:400px;font-family:monospace;font-size:0.75rem;padding:0.75rem;border:1px solid var(--border);border-radius:0.375rem;background:#1e293b;color:#e2e8f0;white-space:pre;overflow:auto" class="form-input">' + escapeHtml(currentConfig) + '</textarea>';
    html += '<div id="configSaveResult"></div>';
    html += '<div id="configEditActions" style="display:none" class="flex gap-2 mt-3"><button class="btn btn-primary btn-sm" onclick="saveConfig()">Save</button><button class="btn btn-outline btn-sm" onclick="toggleEdit()">Cancel</button></div>';
    html += '</div>';
    html += '<h2 class="page-title mt-6 mb-4" style="font-size:1.25rem">History</h2>';
    html += '<div id="configHistory"><div class="card"><p class="text-gray-500">Loading history...</p></div></div>';
    container.innerHTML = html;
    loadHistory();
  } catch (err) {
    container.innerHTML = '<div class="card"><div class="empty-state"><p class="empty-text">Connection failed. Check your network and try again.</p><button class="btn btn-primary" onclick="loadConfig()">Retry</button></div></div>';
  }
}

function toggleEdit() {
  var display = document.getElementById('configDisplay');
  var editor = document.getElementById('configEditor');
  var actions = document.getElementById('configEditActions');
  if (display.style.display !== 'none') {
    display.style.display = 'none';
    editor.style.display = 'block';
    actions.style.display = 'flex';
  } else {
    display.style.display = 'block';
    editor.style.display = 'none';
    actions.style.display = 'none';
  }
}

async function saveConfig() {
  var editor = document.getElementById('configEditor');
  var saveResult = document.getElementById('configSaveResult');
  var saveBtn = document.querySelector('#configEditActions .btn-primary');
  var parsed;
  try {
    parsed = JSON.parse(editor.value);
  } catch (e) {
    saveResult.innerHTML = '<div class="alert alert-error">Invalid JSON: ' + escapeHtml(e.message) + '</div>';
    return;
  }
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving...';
  try {
    var resp = await fetch('/api/v1/clusters/' + clusterId + '/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ config: parsed })
    });
    var result = await resp.json();
    if (resp.ok || resp.status === 207) {
      if (result.warning) {
        saveResult.innerHTML = '<div class="alert" style="background:#fef9c3;color:#854d0e;border:1px solid #fde68a">' + escapeHtml(result.warning) + '</div>';
      } else {
        saveResult.innerHTML = '<div class="alert" style="background:#dcfce7;color:#166534;border:1px solid #bbf7d0">Config saved successfully</div>';
      }
      currentConfig = JSON.stringify(parsed, null, 2);
      document.getElementById('configDisplay').textContent = currentConfig;
      toggleEdit();
      loadHistory();
    } else {
      saveResult.innerHTML = '<div class="alert alert-error">' + escapeHtml(result.error || 'Save failed') + '</div>';
    }
  } catch (err) {
    saveResult.innerHTML = '<div class="alert alert-error">Connection failed</div>';
  }
  saveBtn.disabled = false;
  saveBtn.textContent = 'Save';
}

async function loadHistory() {
  var container = document.getElementById('configHistory');
  try {
    var resp = await fetch('/api/v1/clusters/' + clusterId + '/config/history');
    if (!resp.ok) {
      container.innerHTML = '<div class="card"><p class="text-gray-500">Failed to load history</p></div>';
      return;
    }
    var data = await resp.json();
    var snaps = data.data || [];
    if (snaps.length === 0) {
      container.innerHTML = '<div class="card"><p class="text-gray-500">No config history available.</p></div>';
      return;
    }
    var hhtml = '<div class="card" style="overflow-x:auto"><table class="table"><thead><tr><th>Version</th><th>Changed By</th><th>Time</th></tr></thead><tbody>';
    snaps.forEach(function (s) {
      hhtml += '<tr><td>' + escapeHtml(s.version) + '</td><td class="mono">' + (s.changed_by ? escapeHtml(s.changed_by.substring(0, 8)) : '-') + '</td><td class="text-sm">' + (s.created_at ? new Date(s.created_at).toLocaleString() : '-') + '</td></tr>';
    });
    hhtml += '</tbody></table></div>';
    container.innerHTML = hhtml;
  } catch (err) {
    container.innerHTML = '<div class="card"><p class="text-gray-500">Failed to load history</p></div>';
  }
}

loadConfig();
</script>
{{end}}
