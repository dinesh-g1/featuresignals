{{define "title"}}Deployments{{end}}
{{define "content"}}
<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="page-title">Deployments</h1>
    <a href="/deployments/new" class="btn btn-primary">New Deployment</a>
  </div>
  <div id="deployments-container">
    <div class="card"><p class="text-gray-500">Loading deployments...</p></div>
  </div>
</div>
<script>
async function loadDeployments() {
  var container = document.getElementById('deployments-container');
  try {
    var resp = await fetch('/api/v1/deployments');
    if (!resp.ok) {
      var err = await resp.json();
      container.innerHTML = '<div class="card"><div class="empty-state"><p class="empty-text">' + escapeHtml(err.error || 'Failed to load deployments') + '</p><button class="btn btn-primary" onclick="loadDeployments()">Retry</button></div></div>';
      return;
    }
    var data = await resp.json();
    var deployments = data.data || [];
    if (deployments.length === 0) {
      container.innerHTML = '<div class="card"><div class="empty-state"><p class="empty-title">No deployments yet</p><p class="empty-text">Trigger a deployment to get started.</p><a href="/deployments/new" class="btn btn-primary">Trigger Deployment</a></div></div>';
      return;
    }
    var html = '<table class="table"><thead><tr><th>Time</th><th>Cluster</th><th>Version</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
    deployments.forEach(function(d) {
      var statusClass = d.status === 'success' ? 'status-badge-online' : d.status === 'failed' ? 'status-badge-offline' : d.status === 'in_progress' ? 'status-badge-degraded' : 'status-badge-unknown';
      html += '<tr><td>' + (d.started_at ? new Date(d.started_at).toLocaleString() : '-') + '</td><td><a href="/clusters/' + d.cluster_id + '">' + (d.cluster_id ? d.cluster_id.substring(0,8) : '-') + '</a></td><td class="mono">' + (d.version ? d.version.substring(0,7) : '-') + '</td><td><span class="status-badge ' + statusClass + '">' + (d.status || 'unknown') + '</span></td><td><a href="/deployments/' + d.id + '" class="text-link">View</a></td></tr>';
    });
    html += '</tbody></table><div class="mt-3 text-sm text-gray-500">Showing ' + deployments.length + ' of ' + (data.total || deployments.length) + ' deployments</div>';
    container.innerHTML = html;
    var hasInProgress = deployments.some(function(d) { return d.status === 'in_progress' || d.status === 'canary'; });
    if (hasInProgress) {
      setTimeout(loadDeployments, 10000);
    }
  } catch (err) {
    container.innerHTML = '<div class="card"><div class="empty-state"><p class="empty-text">Connection failed. Check your network and try again.</p><button class="btn btn-primary" onclick="loadDeployments()">Retry</button></div></div>';
  }
}
loadDeployments();
</script>
{{end}}
