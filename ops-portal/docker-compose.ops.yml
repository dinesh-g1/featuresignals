version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ops-portal
      POSTGRES_USER: ops
      POSTGRES_PASSWORD: ops
    ports:
      - "5433:5432"
    volumes:
      - ops-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops -d ops-portal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ops-pgdata:
