<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d9488"/>
  <!-- Single flowing stroke: flag pole → pennant → signal wave — one continuous line -->
  <path
    d="M7 3
       C7 3, 7 18, 7 29
       C7 18, 23 8, 17 14
       C13 18, 25 22, 25 29"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Single signal dot — the moment of transmission -->
  <circle cx="24.5" cy="26" r="1.8" fill="white" opacity="0.85"/>
</svg>
